# Alembic config — sema migration'lari icin.
#
# Kullanim:
#   alembic revision --autogenerate -m "aciklama"   # yeni revision uret
#   alembic upgrade head                            # tum migration'lari uygula
#   alembic stamp head                              # mevcut DB'yi sema baz alarak isaretle
#                                                   # (init_db() ile ayni semada bir prod'a karsi)
#   alembic downgrade -1                            # bir adim geri
#
# DATABASE_URL ortam degiskeninden alinir (env.py icinde).
# postgres:// otomatik postgresql:// formatina cevrilir.

[alembic]
script_location = alembic
prepend_sys_path = .
timezone = UTC
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 40

# sqlalchemy.url calismayacak — env.py DATABASE_URL'yi env'den okur.
sqlalchemy.url =

[post_write_hooks]
# (yok)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
