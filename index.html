          {c.address&&<div><span style={{color:theme.textDim}}>Adresse:</span> <span style={{color:theme.text}}>{c.address}</span></div>}
          {c.phone&&<div><span style={{color:theme.textDim}}>Tel:</span> <span style={{color:theme.text}}>{c.phone}</span></div>}
          {c.fax&&<div><span style={{color:theme.textDim}}>Fax:</span> <span style={{color:theme.text}}>{c.fax}</span></div>}
          {c.email&&<div><span style={{color:theme.textDim}}>E-Mail:</span> <span style={{color:theme.text}}>{c.email}</span></div>}
          {c.website&&<div><span style={{color:theme.textDim}}>Web:</span> <span style={{color:theme.text}}>{c.website}</span></div>}
        </div>
      </div>)}
      {showForm?<div style={css.card}>
        <h3 style={{fontSize:15,fontWeight:700,color:theme.accent,margin:"0 0 12px"}}>{_t("add_company")}</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          {F({label:"Firmenname *",field:"company_name",ph:"z.B. Muster GmbH"})}
          {F({label:"USt-ID / Steuer-Nr.",field:"tax_id",ph:"DE123456789"})}
          {F({label:"IBAN",field:"iban",ph:"DE89 3704 0044 0532 0130 00"})}
          {F({label:"Adresse",field:"address",ph:"Musterstr. 1, 60311 Frankfurt"})}
          {F({label:"Telefon",field:"phone",ph:"+49 123 456789"})}
          {F({label:"Fax",field:"fax",ph:"+49 123 456780"})}
          {F({label:"E-Mail",field:"email",ph:"info@firma.de",type:"email"})}
          {F({label:"Webseite",field:"website",ph:"www.firma.de"})}
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button style={css.btn()} onClick={add}>{_t("save_company")}</button>
          <button style={css.btnOutline} onClick={()=>{resetForm();setShowForm(false);}}>{_t("cancel")}</button>
        </div>
      </div>
      :companies.length<2?<button style={{...css.btn(),marginTop:16,width:"100%",justifyContent:"center"}} onClick={()=>setShowForm(true)}>{"+ "+_t("add_company")}</button>
      :<div style={{...css.card,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",textAlign:"center",padding:16,marginTop:16}}>
        <div style={{color:"#f59e0b",fontWeight:600,fontSize:14}}>Maximum 2 Companies erreicht (Beta)</div>
        <div style={{color:theme.textMuted,fontSize:12,marginTop:4}}>Upgrade to Pro for unlimited companies</div>
      </div>}
    </div>}
  </div>);
}

function TableImportView({triggerRefresh,showToast,onNav}){
  const[file,setFile]=useState(null);const[rows,setRows]=useState([]);const[csv,setCsv]=useState("");const[loading,setLoading]=useState(false);const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(0);
  const[step,setStep]=useState("");const[errorMsg,setErrorMsg]=useState("");const[rawRows,setRawRows]=useState([]);const[showRaw,setShowRaw]=useState(false);
  const fileRef=useRef(null);const tableRef=useRef(null);
  const[mode,setMode]=useState("image");
  const[showTable,setShowTable]=useState(false);
  // Column mapping for CSV/XLSX
  const[rawTable,setRawTable]=useState([]);// 2D array: [[cell,cell,...],...]
  const[colMap,setColMap]=useState({date:-1,description:-1,expense:-1,income:-1});
  const[showMapping,setShowMapping]=useState(false);

  const resetAll=()=>{setFile(null);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);setShowMapping(false);setRawTable([]);setRawRows([]);setShowRaw(false);};
  const handleFile=(e)=>{const f=e.target.files?.[0];if(f){resetAll();setFile(f);}e.target.value="";};

  /* Sort table-import rows chronologically by date.
     Handles DD.MM.YYYY, DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD and 2-digit years.
     Unparseable dates keep their relative order at the end. */
  const sortRowsByDate=(arr)=>{
    const parseDate=(s)=>{
      if(!s)return Number.MAX_SAFE_INTEGER;
      const str=String(s).trim();
      // DD.MM.YYYY or DD/MM/YYYY or DD-MM-YYYY
      let m=str.match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})$/);
      if(m){
        let y=m[3];if(y.length===2)y="20"+y;
        return parseInt(y)*10000+parseInt(m[2])*100+parseInt(m[1]);
      }
      // YYYY-MM-DD (ISO)
      m=str.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
      if(m)return parseInt(m[1])*10000+parseInt(m[2])*100+parseInt(m[3]);
      return Number.MAX_SAFE_INTEGER;
    };
    return [...arr].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  };

  const applyMapping=()=>{
    if(colMap.date===-1&&colMap.description===-1){setErrorMsg("Please assign at least date or description.");return;}
    const dataRows=rawTable.slice(1);// skip header
    const mapped=[];
    for(const row of dataRows){
      const date=colMap.date>=0?(row[colMap.date]||"").trim():"";
      const desc=colMap.description>=0?(row[colMap.description]||"").trim():"Eintrag";
      const expRaw=colMap.expense>=0?(row[colMap.expense]||"").trim():"";
      const incRaw=colMap.income>=0?(row[colMap.income]||"").trim():"";
      const parseNum=(s)=>{s=s.replace(/[€$₺\s]/g,"");if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",",".");else if(s.includes(","))s=s.replace(",",".");return parseFloat(s)||0;};
      const expense=parseNum(expRaw);
      const income=parseNum(incRaw);
      if(!date&&!desc)continue;
      if(expense===0&&income===0&&!expRaw&&!incRaw)continue;
      mapped.push({date,description:desc||"Eintrag",expense,income,is_uncertain:expense===0&&income===0});
    }
    if(!mapped.length){setErrorMsg(_t("no_valid_rows"));return;}
    setRows(sortRowsByDate(mapped));setShowMapping(false);setShowTable(true);
    setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);
  };

  const steps=["Reading file...","Detecting structure...","Mapping columns...","Creating entries..."];

  const analyze=async()=>{
    if(!file)return;setLoading(true);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);
    let si=0;const iv=setInterval(()=>{si=(si+1)%steps.length;setStep(steps[si]);},1800);
    setStep(steps[0]);
    const tk=localStorage.getItem("atx_token");
    const fd=new FormData();fd.append("file",file);
    try{
      let endpoint="/api/import-image";
      if(mode==="csv")endpoint="/bookkeeping/import-csv";
      else if(mode==="xlsx")endpoint="/bookkeeping/import-xlsx";
      else if(mode==="datev")endpoint="/bookkeeping/import-datev";

      if(mode==="image"||mode==="xlsx"||mode==="datev"){
        // All modes: server-side processing
        const r=await fetch(API+endpoint,{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd});
        const d=await r.json();
        if(d.success){
          if(d.rows&&d.rows.length>0){
            setRows(d.rows);setCsv(d.csv||"");setRawRows(d.raw_rows||[]);
            // Auto-save rows to Kassenbuch+Rechnungen on server
            const validRows=d.rows.filter(rr=>!rr.is_uncertain&&(rr.income>0||rr.expense>0));
            if(validRows.length>0){
              let autoSaved=0;
              for(const rr of validRows){
                try{
                  const amount=rr.income>0?rr.income:rr.expense;
                  const entryType=rr.income>0?"income":"expense";
                  const body={description:rr.description||"Import",vendor:(rr.description||"Import").substring(0,50),gross_amount:amount,entry_type:entryType,vat_rate:"19%",category:"other",payment_method:"",reference:"",notes:"Tabelle Import",date:rr.date||""};
                  const sr=await fetch(API+"/bookkeeping",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify(body)});
                  if(sr.ok)autoSaved++;
                }catch(ex){}
              }
              if(autoSaved>0){
                if(triggerRefresh)triggerRefresh();
                if(showToast)showToast(autoSaved+" → Kassenbuch + Rechnungen","success");
              }
            }
            setTimeout(()=>{setShowTable(true);setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);},100);
          }
          else if(d.imported>0){
            clearInterval(iv);setStep("");setLoading(false);
            if(triggerRefresh)triggerRefresh();
            const _msg=getLang()==="de"
              ?"✅ "+d.imported+" Einträge erfolgreich importiert.\n\n📒 Gespeichert in: Kassenbuch & Rechnungen\n📁 Quelldatei: "+(file?.name||"Excel")+"\n\nJetzt zum Kassenbuch wechseln?"
              :"✅ "+d.imported+" entries imported successfully.\n\n📒 Saved to: Cash Book & Invoices\n📁 Source: "+(file?.name||"Excel")+"\n\nGo to Cash Book now?";
            const goTo=confirm(_msg);
            if(goTo&&onNav)onNav("bookkeeping");
            return;}
          else{setRawRows(d.raw_rows||[]);setErrorMsg(_t("no_table"));}
        }else{setErrorMsg(_extractErr(d)||"Import failed");}
      }else{
        // CSV only: parse client-side for column mapping
        try{
          const text=await file.text();
          const sep=text.includes(";")?";":","
          const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.trim().startsWith("#")&&!l.trim().toUpperCase().startsWith("HINWEIS"));
          const table=lines.map(l=>{
            const cells=[];let cur="";let inQ=false;
            for(let c=0;c<l.length;c++){if(l[c]==='"'){inQ=!inQ;}else if(l[c]===sep&&!inQ){cells.push(cur.trim());cur="";}else{cur+=l[c];}}
            cells.push(cur.trim());return cells;
          });
          if(table.length<2){setErrorMsg("File empty or invalid.");clearInterval(iv);setStep("");setLoading(false);return;}
          setRawTable(table);
          // Auto-detect columns from header
          const hdr=table[0].map(h=>h.toLowerCase());
          const newMap={date:-1,description:-1,expense:-1,income:-1};
          hdr.forEach((h,i)=>{
            if(/datum|date|tarih/.test(h))newMap.date=i;
            else if(/beschreibung|description|vendor|lieferant|text|bezeichnung/.test(h))newMap.description=i;
            else if(/ausgabe|expense|betrag|amount|kosten/.test(h))newMap.expense=i;
            else if(/einnahme|income|revenue|umsatz/.test(h))newMap.income=i;
          });
          // If no expense found, try amount column
          if(newMap.expense===-1){hdr.forEach((h,i)=>{if(i!==newMap.date&&i!==newMap.description&&i!==newMap.income&&/\d/.test(table[1]?.[i]||""))newMap.expense=i;});}
          setColMap(newMap);setShowMapping(true);
          setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);
        }catch(ex){setErrorMsg("CSV/Excel could not be read: "+ex.message);}
      }
    }catch(e){setErrorMsg("Verbindungsfehler — bitte erneut versuchen.");}
    clearInterval(iv);setStep("");setLoading(false);
  };

  const isTable=rows.length>1; // true=Kassenbuch table, false=single invoice
  const saveRows=async()=>{
    if(!rows.length)return;
    if(!isTable){setErrorMsg("Single receipt — please use Upload. Table Import is for cash book tables (multiple entries).");return;}
    const validRows=rows.filter(r=>!r.is_uncertain);
    const uncertainCount=rows.length-validRows.length;
    if(!validRows.length){setErrorMsg("No valid entries — please check amounts (⚠ markierte Zeilen).");return;}
    setSaving(true);setStep("Einträge werden gespeichert...");setErrorMsg("");
    const tk=localStorage.getItem("atx_token");
    let ok=0;
    try{
      // Check for duplicates first
      const existingRes=await fetch(API+"/bookkeeping?limit=1000",{headers:{"Authorization":"Bearer "+tk}});
      const existingData=await existingRes.json();
      const existingEntries=(existingData.items||[]);
      const existingKeys=new Set(existingEntries.map(e=>e.vendor+"|"+e.gross_amount+"|"+(e.date||"").slice(0,10)));
      let dupCount=0;
      const newRows=[];
      for(const r of validRows){
        const amount=r.income>0?r.income:r.expense;
        const key=(r.description||"Import").substring(0,50)+"|"+amount+"|"+(r.date||"").slice(0,10);
        if(existingKeys.has(key)){dupCount++;}else{newRows.push(r);}
      }
      if(dupCount>0&&newRows.length===0){
        if(showToast)showToast(getLang()==="de"?"Alle Einträge bereits gespeichert":"All entries already saved","info");
        setSaving(false);setStep("");setSaved(dupCount);return;
      }
      if(dupCount>0){
        if(!confirm("⚠️ "+dupCount+" "+_t("entries")+" already in Cash Book, "+newRows.length+" new.\n\nSave new entries?")){setSaving(false);setStep("");return;}
      }
      const toSave=newRows.length>0?newRows:validRows;
      const createdInvIds=[];
      for(const r of toSave){
        const amount=r.income>0?r.income:r.expense;
        const entryType=r.income>0?"income":"expense";
        const body={description:r.description||"Import",vendor:(r.description||"Import").substring(0,50),gross_amount:amount,entry_type:entryType,vat_rate:"19%",category:"other",payment_method:"",reference:"",notes:"Tabelle Import",date:r.date||""};
        const res=await fetch(API+"/bookkeeping",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify(body)});
        if(res.ok){ok++;try{const d=await res.json();if(d.invoice_id)createdInvIds.push(d.invoice_id);}catch(ex){}}
      }
      // Attach original photo to all created invoices
      if(file&&createdInvIds.length>0){
        for(const invId of createdInvIds){
          try{const fd=new FormData();fd.append("file",file);await fetch(API+"/vault/"+invId+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd});}catch(ex){}
        }
      }
      setSaved(ok);
      const remaining=rows.filter(r=>r.is_uncertain);
      setRows(remaining);
      if(!remaining.length)setShowTable(false);
      if(showToast)showToast(ok+" entries saved to Cash Book","success");
      if(uncertainCount>0)setErrorMsg(uncertainCount+" Einträge mit ⚠ wurden nicht gespeichert — bitte Beträge prüfen und erneut speichern.");
      if(triggerRefresh)triggerRefresh();
      if(!remaining.length){setShowTable(false);}
    }catch(e){setErrorMsg("Verbindungsfehler — "+ok+" of "+validRows.length+" gespeichert.");}
    setSaving(false);setStep("");
  };

  const editRow=(idx,field,val)=>setRows(prev=>prev.map((r,i)=>i===idx?{...r,[field]:field==="income"||field==="expense"?parseFloat(val)||0:val}:r));
  const totalIncome=rows.reduce((s,r)=>s+(r.income||0),0);
  const totalExpense=rows.reduce((s,r)=>s+(r.expense||0),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:24,maxWidth:900,width:"100%",overflowX:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>📊 {_t("tableimport")}</h2>
        <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{_t("bookkeeping")} — {_t("photo_label")}, CSV, Excel, DATEV</p>
      </div>
    </div>

    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {[["image","📸","Image / PDF","#8b5cf6"],["csv","📄","CSV","#3b82f6"],["xlsx","📊","Excel","#10b981"],["datev","🧾","DATEV","#f59e0b"]].map(([m,ico,lbl,clr])=><button key={m} style={{padding:"12px 22px",borderRadius:10,border:"2px solid "+(mode===m?clr:"transparent"),background:mode===m?clr+"22":theme.card,color:mode===m?clr:theme.textMuted,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all 0.2s",boxShadow:mode===m?"0 2px 12px "+clr+"33":"none"}} onClick={()=>{setMode(m);setFile(null);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);}}>
        {ico} {lbl}
      </button>)}
    </div>

    <div style={{...css.card,textAlign:"center",padding:file?24:48,border:"2px dashed "+(file?theme.accent:theme.border),cursor:"pointer",transition:"all 0.3s",background:file?"rgba(16,185,129,0.04)":theme.card}} onClick={()=>fileRef.current?.click()}>
      <input ref={fileRef} type="file" accept={mode==="image"?"image/*,.pdf":mode==="csv"?".csv,.txt,.CSV,text/csv,text/plain,application/vnd.ms-excel":mode==="datev"?".csv,.txt,.CSV,text/csv":".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"} style={{display:"none"}} onChange={handleFile}/>
      {file?<div style={{animation:"fadeIn 0.3s ease"}}>
        <div style={{fontSize:32,marginBottom:4}}>✅</div>
        <div style={{fontSize:16,fontWeight:600,color:theme.text}}>{file.name}</div>
        <div style={{fontSize:12,color:theme.textMuted,marginTop:4}}>{(file.size/1024).toFixed(0)} KB — {_t("click_other_file")}</div>
      </div>:<div>
        <div style={{fontSize:48,marginBottom:12,opacity:0.8}}>{mode==="image"?"📸":mode==="csv"?"📄":"📊"}</div>
        <div style={{fontSize:17,fontWeight:700,color:theme.text}}>{mode==="image"?_t("upload_photo_pdf"):mode==="csv"?_t("choose_csv"):_t("choose_excel")}</div>
        <div style={{fontSize:13,color:theme.textDim,marginTop:6}}>{mode==="image"?(getLang()==="de"?"Foto, Scan oder PDF — auch handschriftlich":"Photo, scan or PDF — also handwritten"):mode==="csv"?(getLang()==="de"?"CSV-Datei (.csv oder .txt)":"CSV file (.csv or .txt)"):mode==="datev"?(getLang()==="de"?"DATEV Buchungsstapel (.csv) — Umsatz;Soll/Haben;Konto;...":"DATEV posting file (.csv) — Umsatz;Soll/Haben;Konto;..."):(getLang()==="de"?"Excel-Datei (.xlsx oder .xls)":"Excel file (.xlsx or .xls)")}</div>
      </div>}
    </div>

    {file&&!loading&&!rows.length&&!saved&&<button style={{background:"linear-gradient(135deg,#10b981,#3b82f6)",color:"#fff",border:"none",borderRadius:12,padding:"14px 28px",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(16,185,129,0.3)",transition:"all 0.3s",width:"100%"}} onClick={analyze} onMouseOver={e=>e.currentTarget.style.transform="scale(1.03)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>{mode==="image"?"🔍 Tabelle erkennen":"📥 Jetzt importieren"}</button>}

    {loading&&<div style={{...css.card,textAlign:"center",padding:32,background:"rgba(16,185,129,0.05)",border:"1px solid rgba(16,185,129,0.15)"}}>
      <div style={{display:"inline-block",width:36,height:36,border:"3px solid "+theme.border,borderTopColor:theme.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:12}}/>
      <div style={{fontSize:16,fontWeight:600,color:theme.accent,animation:"fadeIn 0.5s ease"}}>{step||_t("analyzing")}</div>
      <div style={{fontSize:12,color:theme.textDim,marginTop:6}}>Please wait — this may take a few seconds</div>
    </div>}

    {errorMsg&&!rawRows.length&&<div style={{...css.card,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",textAlign:"center",padding:20,animation:"fadeIn 0.3s ease"}}>
      <div style={{fontSize:15,fontWeight:600,color:theme.danger}}>{errorMsg}</div>
      <div style={{fontSize:12,color:theme.textMuted,marginTop:6}}>Tipp: Good lighting, straight photo, or use CSV/Excel</div>
    </div>}

    {errorMsg&&rawRows.length>0&&rows.length===0&&<div style={{...css.card,padding:20,animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:15,fontWeight:600,color:"#f59e0b"}}>⚠️ Tabelle nicht erkannt — extrahierter Text</div>
          <div style={{fontSize:12,color:theme.textMuted,marginTop:4}}>{rawRows.length} Zeilen erkannt — Tabellenstruktur konnte nicht geparst werden</div>
        </div>
        <button style={{fontSize:12,padding:"8px 16px",borderRadius:8,border:"1px solid "+theme.border,background:theme.surfaceAlt,color:theme.text,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}} onClick={()=>{navigator.clipboard.writeText(rawRows.join("\n"));showToast("Text kopiert")}}>📋 Kopieren</button>
      </div>
      <div style={{background:theme.surfaceAlt,borderRadius:10,padding:12,maxHeight:320,minHeight:80,overflowY:"auto",border:"1px solid "+theme.border}}>
        {rawRows.map((line,i)=><div key={i} style={{fontSize:13,fontFamily:"monospace",padding:"4px 0",color:theme.text,lineHeight:1.5,borderBottom:i<rawRows.length-1?"1px solid "+theme.border:"none"}}>{line}</div>)}
      </div>
    </div>}

    {saved>0&&<div style={{...css.card,background:"linear-gradient(135deg,rgba(16,185,129,0.12),rgba(59,130,246,0.08))",border:"1px solid rgba(16,185,129,0.3)",textAlign:"center",padding:28,animation:"fadeIn 0.5s ease"}}>
      <div style={{fontSize:36,marginBottom:8}}>🎉</div>
      <div style={{fontSize:20,fontWeight:700,color:theme.accent}}>{saved} Einträge erfolgreich importiert</div>
      <div style={{fontSize:13,color:theme.textMuted,marginTop:6}}>Auto-categorized — available in Cash Book</div>
    </div>}

    {showMapping&&rawTable.length>1&&<div ref={tableRef} style={{animation:"fadeIn 0.5s ease"}}>
      <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>Spalten zuordnen</h3>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid "+theme.border,marginBottom:16}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:theme.card,fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"2px solid "+theme.border,background:theme.surfaceAlt}}>
              {rawTable[0].map((h,ci)=><th key={ci} style={{padding:"8px 10px",textAlign:"left"}}>
                <div style={{fontSize:11,color:theme.textDim,marginBottom:4}}>{h||"Spalte "+(ci+1)}</div>
                <select style={{...css.input,fontSize:12,padding:"6px 8px",width:"100%",minHeight:32}} value={colMap.date===ci?"date":colMap.description===ci?"description":colMap.expense===ci?"expense":colMap.income===ci?"income":"ignore"} onChange={e=>{const role=e.target.value;const nm={...colMap};Object.keys(nm).forEach(k=>{if(nm[k]===ci)nm[k]=-1;});if(role!=="ignore")nm[role]=ci;setColMap(nm);}}>
                  <option value="ignore">-- Ignore --</option>
                  <option value="date">{_t("date")}</option>
                  <option value="description">{_t("description")}</option>
                  <option value="expense">{_t("expense")}</option>
                  <option value="income">{_t("income")}</option>
                </select>
              </th>)}
            </tr>
          </thead>
          <tbody>{rawTable.slice(1,6).map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid "+theme.border}}>
            {row.map((cell,ci)=><td key={ci} style={{padding:"6px 10px",color:colMap.date===ci?theme.accent:colMap.expense===ci?theme.danger:colMap.income===ci?"#22c55e":theme.textMuted,fontSize:11,fontFamily:colMap.expense===ci||colMap.income===ci?mono:undefined}}>{cell}</td>)}

        <span style={{fontSize:11,color:theme.textDim}}>Vorschau: erste 5 Zeilen — {rawTable.length-1} gesamt</span>

    {showTable&&rows.length>0&&<div ref={tableRef} style={{animation:"fadeIn 0.5s ease"}}>

          <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:0}}>✅ {rows.length} entries detected</h3>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"1px solid "+(showRaw?theme.border:theme.accent),background:showRaw?"transparent":theme.accentSoft,color:showRaw?theme.textDim:theme.accent,cursor:"pointer"}} onClick={()=>setShowRaw(false)}>Structured</button>
            <button style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"1px solid "+(showRaw?theme.accent:theme.border),background:showRaw?theme.accentSoft:"transparent",color:showRaw?theme.accent:theme.textDim,cursor:"pointer"}} onClick={()=>setShowRaw(true)}>OCR Original</button>
          </div>
        </div>
        <div style={{display:"flex",gap:6,fontSize:12}}>
          <span style={{background:theme.accentSoft,color:theme.accent,padding:"4px 10px",borderRadius:6,fontWeight:600}}>+€{totalIncome.toFixed(2)}</span>
          <span style={{background:theme.dangerSoft,color:theme.danger,padding:"4px 10px",borderRadius:6,fontWeight:600}}>-€{totalExpense.toFixed(2)}</span>
        </div>
      </div>
      {!showRaw?<div style={{overflowX:"auto",borderRadius:12,border:"1px solid "+theme.border}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:theme.card}}>
          <thead><tr style={{borderBottom:"2px solid "+theme.border,background:theme.surfaceAlt}}>
            {[_t("date"),_t("description"),_t("income"),_t("expense")].map(h=><th key={h} style={{padding:"12px 14px",textAlign:"left",color:theme.textDim,fontWeight:600,fontSize:11,textTransform:"uppercase"}}>{h}</th>)}
            <th style={{padding:"12px 8px",width:70}}></th>
          </tr></thead>
          <tbody>{rows.map((r,i)=><tr key={i} style={{borderBottom:"1px solid "+theme.border,animation:"fadeIn 0.3s ease",animationDelay:Math.min(i*50,500)+"ms",animationFillMode:"both",background:r.is_uncertain?"rgba(245,158,11,0.06)":"transparent"}}>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:110,fontSize:12}} value={r.date} onChange={e=>editRow(i,"date",e.target.value)}/></td>
            <td style={{padding:"8px 14px"}}><div style={{display:"flex",alignItems:"center",gap:4}}><input style={{...css.input,flex:1,fontSize:12}} value={r.description} onChange={e=>editRow(i,"description",e.target.value)}/>{r.is_uncertain&&<span title="Amount not detected" style={{color:"#f59e0b",fontSize:14,cursor:"help"}}>⚠</span>}</div></td>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:90,fontSize:12,color:theme.accent,borderColor:r.is_uncertain&&r.income===0?"rgba(245,158,11,0.5)":undefined}} type="number" step="0.01" value={r.income} onChange={e=>editRow(i,"income",e.target.value)} placeholder={r.is_uncertain?"prüfen":""}/></td>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:90,fontSize:12,color:theme.danger,borderColor:r.is_uncertain&&r.expense===0?"rgba(245,158,11,0.5)":undefined}} type="number" step="0.01" value={r.expense} onChange={e=>editRow(i,"expense",e.target.value)} placeholder={r.is_uncertain?"prüfen":""}/></td>
            <td style={{padding:"8px 8px"}}>
              <div style={{cursor:"pointer"}} onClick={()=>setRows(prev=>prev.filter((_,j)=>j!==i))} title="Remove row"><Icon d={I.x} size={14} color={theme.danger}/></div>
            </td>
          </tr>)}</tbody>
        </table>
      </div>:
      <div style={{borderRadius:12,border:"1px solid "+theme.border,background:theme.card,padding:16,maxHeight:400,minHeight:100,overflowY:"auto"}}>
        <div style={{fontSize:11,color:theme.textDim,marginBottom:8}}>OCR Original — {rawRows.length} Zeilen</div>
        {rawRows.map((line,i)=><div key={i} style={{fontSize:12,fontFamily:mono,color:theme.textMuted,padding:"3px 0",borderBottom:"1px solid "+theme.border+"33"}}>{line}</div>)}
      </div>}
      <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end",flexWrap:"wrap",alignItems:"center"}}>
        <button style={{...css.btnOutline,fontSize:12}} onClick={()=>{resetAll();fileRef.current?.click();}}>🔄 New File</button>
        {csv&&<button style={css.btnOutline} onClick={()=>{const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="tabelle_import.csv";a.click();URL.revokeObjectURL(u);}}>📥 Save as CSV</button>}
        {isTable?<><button style={{background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(16,185,129,0.3)",transition:"all 0.3s",opacity:saving?0.6:1,flex:window.innerWidth<768?"1 1 100%":undefined}} onClick={saveRows} disabled={saving} onMouseOver={e=>{if(!saving)e.currentTarget.style.transform="scale(1.05)";}} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>{saving?"⏳ Wird gespeichert...":"📒 Save to Cash Book"}</button>
</>
        :<div style={{fontSize:12,color:"#f59e0b",background:"rgba(245,158,11,0.08)",padding:"10px 16px",borderRadius:8,border:"1px solid rgba(245,158,11,0.2)"}}>Single receipt detected — please use <strong>Upload</strong>. Table Import is for cash book tables only.</div>}
      </div>
    </div>}

    {saved>0&&<div style={{display:"flex",gap:12,marginTop:16,justifyContent:"center"}}>
      <button style={{background:"linear-gradient(135deg,#a855f7,#6366f1)",color:"#fff",border:"none",borderRadius:10,padding:"12px 24px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 0 20px rgba(168,85,247,0.45)",transition:"transform 0.2s"}} onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"} onClick={()=>onNav&&onNav("bookkeeping")}>📒 Cash Book →</button>
    </div>}

    {!file&&!loading&&!saved&&<div style={{...css.card,background:theme.surfaceAlt,textAlign:"center",padding:28}}>
      <div style={{fontSize:14,fontWeight:600,color:theme.text,marginBottom:8}}>💡 How it works</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,textAlign:"left"}}>
        <div style={{padding:12,borderRadius:8,background:theme.card}}><div style={{fontSize:20,marginBottom:4}}>📸</div><div style={{fontSize:12,fontWeight:600,color:theme.text}}>Image / PDF</div><div style={{fontSize:11,color:theme.textMuted}}>Photo of cash book — also handwritten</div></div>
        <div style={{padding:12,borderRadius:8,background:theme.card}}><div style={{fontSize:20,marginBottom:4}}>📄</div><div style={{fontSize:12,fontWeight:600,color:theme.text}}>CSV</div><div style={{fontSize:11,color:theme.textMuted}}>Date, Description, Income, Expenses</div></div>
        <div style={{padding:12,borderRadius:8,background:theme.card}}><div style={{fontSize:20,marginBottom:4}}>📊</div><div style={{fontSize:12,fontWeight:600,color:theme.text}}>Excel</div><div style={{fontSize:11,color:theme.textMuted}}>.xlsx with same columns</div></div>
      </div>
    </div>}
  </div>);
}

function FeedbackView(){
  const[msg,setMsg]=useState("");const[sent,setSent]=useState(false);
  const send=async()=>{if(!msg.trim())return;try{await fetch(API+"/feedback",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.getItem("atx_token")},body:JSON.stringify({message:msg})});setSent(true);setMsg("");}catch(e){alert("Error: "+e.message);}};
  if(sent)return(<div style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:16}}>✅</div><h2 style={{color:theme.text,margin:"0 0 8px"}}>Thank you for your feedback!</h2><p style={{color:theme.textMuted,fontSize:14}}>We will review it as soon as possible.</p><button style={css.btn()} onClick={()=>setSent(false)}>New Feedback</button></div>);
  return(<div style={{maxWidth:600}}><h2 style={{color:theme.text,margin:"0 0 8px",fontSize:22,fontWeight:700}}>Feedback & Report Issues</h2><p style={{color:theme.textMuted,fontSize:14,margin:"0 0 20px"}}>Help us improve AutoTax-HUB!</p>
    <textarea style={{...css.input,width:"100%",minHeight:150,resize:"vertical",fontFamily:"inherit"}} placeholder="Describe your feedback, a bug, or a suggestion..." value={msg} onChange={e=>setMsg(e.target.value)}/>
    <button style={{...css.btn(),marginTop:12}} onClick={send}>Feedback senden</button>
  </div>);
}

function AdvisorView({onNav}={}){
  const[email,setEmail]=useState("");
  const[scope,setScope]=useState("read");
  const[note,setNote]=useState("");
  const[relationships,setRelationships]=useState([]);
  const[clients,setClients]=useState([]);
  const[inviting,setInviting]=useState(false);
  const[lastLink,setLastLink]=useState("");
  const _l=getLang();
  const tr=(de,en)=>_l==="de"?de:en;
  const loadAll=async()=>{
    try{
      const r1=await _authFetch(API+"/advisor/relationships");
      const d1=await r1.json();
      if(r1.ok)setRelationships(d1.items||[]);
      const r2=await _authFetch(API+"/advisor/clients");
      const d2=await r2.json();
      if(r2.ok)setClients(d2.items||[]);
    }catch(e){}
  };
  useEffect(()=>{loadAll();},[]);
  const sendInvite=async()=>{
    if(!email.trim()||!email.includes("@")){alert(tr("E-Mail-Adresse erforderlich","Email required"));return;}
    setInviting(true);setLastLink("");
    try{
      const r=await _authFetch(API+"/advisor/invite",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({advisor_email:email.trim(),scope,note:note.trim()||null})});
      const d=await r.json();
      if(r.ok){
        setLastLink(d.link||"");
        setEmail("");setNote("");
        alert(tr("✓ Einladung versendet. Wenn keine E-Mail ankommt, kopiere den Link unten und schicke ihn manuell.","✓ Invite sent. If no email arrives, copy the link below and forward it manually."));
        loadAll();
      }else{
        alert(_extractErr(d));
      }
    }catch(e){alert("Error: "+e.message);}
    setInviting(false);
  };
  const revoke=async(id,who)=>{
    if(!confirm(tr(`Zugriff wirklich entziehen? ${who} muss neu eingeladen werden.`,`Really revoke access? ${who} will need a new invite.`)))return;
    try{
      const r=await _authFetch(API+"/advisor/relationship/"+id,{method:"DELETE"});
      if(r.ok)loadAll();
    }catch(e){}
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    {/* AI Termin-Vorbereitung shortcut */}
    <div onClick={()=>{if(onNav)onNav("steuer_uebersicht");}} style={{cursor:"pointer",padding:"18px 22px",borderRadius:14,background:"linear-gradient(135deg,rgba(139,92,246,0.10),rgba(99,102,241,0.05))",border:"1px solid rgba(139,92,246,0.3)",display:"flex",alignItems:"center",gap:14,transition:"all 0.2s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor="#8b5cf6";e.currentTarget.style.boxShadow="0 8px 24px rgba(139,92,246,0.2)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.borderColor="rgba(139,92,246,0.3)";e.currentTarget.style.boxShadow="none";}}>
      <div style={{width:46,height:46,borderRadius:12,background:"linear-gradient(135deg,#8b5cf6,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 4px 14px rgba(139,92,246,0.4)",flexShrink:0}}>💡</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:700,color:theme.text,marginBottom:3}}>{tr("Termin beim Steuerberater? KI-Vorbereitung verfügbar","Tax advisor meeting? AI prep available")}</div>
        <div style={{fontSize:12,color:theme.textMuted,lineHeight:1.5}}>{tr("Lassen Sie die KI Ihre Jahresdaten prüfen — auffällige Posten & wichtige Fragen für den Termin.","Let AI review your yearly data — unusual items & key questions for the meeting.")}</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"#8b5cf6"}}>→</div>
    </div>
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>👔 {tr("Steuerberater-Zugang","Tax Advisor Access")}</h2>
      <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0",lineHeight:1.5}}>
        {tr(
          "Laden Sie Ihren Steuerberater per E-Mail ein. Er erhält Lese-Zugriff auf Ihre Belege und Auswertungen — Sie behalten die Kontrolle und können den Zugriff jederzeit beenden.",
          "Invite your tax advisor by email. They receive read-only access to your receipts and reports — you stay in control and can revoke access anytime."
        )}
      </p>
    </div>

    {/* INVITE FORM */}
    <div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 12px"}}>{tr("Neuen Steuerberater einladen","Invite a new advisor")}</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={{display:"block",fontSize:12,color:theme.textMuted,marginBottom:4}}>{tr("E-Mail des Steuerberaters","Advisor's email")}</label>
          <input type="email" placeholder="berater@kanzlei.de" value={email} onChange={e=>setEmail(e.target.value)} style={css.input}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:12,color:theme.textMuted,marginBottom:4}}>{tr("Berechtigung","Permission")}</label>
          <select value={scope} onChange={e=>setScope(e.target.value)} style={css.input}>
            <option value="read">{tr("Nur Lesen","Read only")}</option>
            <option value="read_export">{tr("Lesen + DATEV-Export","Read + DATEV export")}</option>
          </select>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:12,color:theme.textMuted,marginBottom:4}}>{tr("Notiz (optional)","Note (optional)")}</label>
        <input type="text" placeholder={tr("z. B. Kanzlei Müller — Hauptberater","e.g. Müller Tax — main advisor")} value={note} onChange={e=>setNote(e.target.value)} style={css.input}/>
      </div>
      <button style={{...css.btn(),opacity:inviting?0.6:1}} onClick={sendInvite} disabled={inviting}>
        {inviting?"⏳ "+tr("Wird gesendet","Sending"):"✉️ "+tr("Einladung senden","Send invite")}
      </button>
      {lastLink&&<div style={{marginTop:12,padding:12,background:theme.surfaceAlt,borderRadius:8,fontSize:12}}>
        <div style={{color:theme.textMuted,marginBottom:6}}>{tr("Falls die E-Mail nicht ankommt — Link manuell weiterleiten:","If the email doesn't arrive — copy this link manually:")}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input readOnly value={lastLink} style={{...css.input,fontSize:11,fontFamily:mono,padding:"6px 10px"}}/>
          <button style={css.btnOutline} onClick={()=>{navigator.clipboard.writeText(lastLink);if(showToast)showToast(tr("Kopiert","Copied"),"success");}}>📋</button>
        </div>
      </div>}
    </div>

    {/* MY ADVISORS */}
    <div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 12px"}}>
        {tr("Meine Steuerberater","My advisors")} <span style={{color:theme.textDim,fontWeight:400,fontSize:13}}>({relationships.length})</span>
      </h3>
      {relationships.length===0&&<div style={{color:theme.textDim,fontSize:13,padding:"8px 0"}}>{tr("Noch kein Steuerberater verbunden.","No advisor connected yet.")}</div>}
      {relationships.map(r=>(<div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:"1px solid "+theme.border}}>
        <span style={{fontSize:20}}>👔</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:theme.text,fontWeight:600,fontSize:14}}>{r.advisor_email}</div>
          <div style={{color:theme.textDim,fontSize:11,fontFamily:mono,marginTop:2}}>
            {r.scope==="read_export"?tr("Lesen + Export","Read + Export"):tr("Nur Lesen","Read only")}
            {r.note?" · "+r.note:""}
            {r.created_at?" · "+new Date(r.created_at).toLocaleDateString(_l==="de"?"de-DE":"en-GB"):""}
          </div>
        </div>
        <button style={{...css.btnOutline,color:theme.danger,borderColor:theme.danger+"55",fontSize:12}} onClick={()=>revoke(r.id,r.advisor_email)}>
          {tr("Zugriff entziehen","Revoke")}
        </button>
      </div>))}
    </div>

    {/* AS ADVISOR — MANDATES */}
    {clients.length>0&&<div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 12px"}}>
        {tr("Mandate (als Berater)","Mandates (as advisor)")} <span style={{color:theme.textDim,fontWeight:400,fontSize:13}}>({clients.length})</span>
      </h3>
      <p style={{color:theme.textMuted,fontSize:12,margin:"0 0 12px"}}>
        {tr("Mandanten, die Ihnen Zugriff gewährt haben. Klicken Sie auf 'Daten ansehen' um in den Lese-Modus zu wechseln.","Clients who granted you access. Click 'View data' to enter read-only mode.")}
      </p>
      {clients.map(c=>{
        // Acting mode'a girip belirli bir sayfaya zipla. Reload sonra App _initialPage okur.
        const enterAs=(targetPage)=>{
          localStorage.setItem("atx_acting_client_id",String(c.client_user_id));
          localStorage.setItem("atx_acting_client_label",c.client_email);
          localStorage.setItem("atx_acting_scope",c.scope||"read");
          try{sessionStorage.setItem("atx_acting_target",targetPage);}catch(e){}
          window.location.reload();
        };
        const jumpBtn=(label,target,emoji)=>(
          <button key={target} title={label} style={{...css.btnOutline,fontSize:11,padding:"6px 10px",whiteSpace:"nowrap"}} onClick={()=>enterAs(target)}>
            {emoji} {label}
          </button>
        );
        return(<div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:"1px solid "+theme.border,flexWrap:"wrap"}}>
        <span style={{fontSize:20}}>🏢</span>
        <div style={{flex:"1 1 200px",minWidth:0}}>
          <div style={{color:theme.text,fontWeight:600,fontSize:14}}>{c.client_email}</div>
          <div style={{color:theme.textDim,fontSize:11,fontFamily:mono,marginTop:2}}>
            {c.scope==="read_export"?tr("Lesen + Export","Read + Export"):tr("Nur Lesen","Read only")}
            {c.note?" · "+c.note:""}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <button style={{...css.btn(),fontSize:12,padding:"8px 14px"}} onClick={()=>enterAs("dashboard")}>👁️ {tr("Daten ansehen","View data")}</button>
          {jumpBtn(tr("Rechnungen","Invoices"),"invoices","📄")}
          {jumpBtn(tr("Kassenbuch","Cash Book"),"bookkeeping","📒")}
          {jumpBtn(tr("Belege","Receipts"),"vault","📁")}
          {jumpBtn(tr("Steuer-Übersicht","Tax Overview"),"steuer_uebersicht","🧾")}
          <button style={{...css.btnOutline,color:theme.danger,borderColor:theme.danger+"55",fontSize:11,padding:"6px 10px"}} onClick={()=>revoke(c.id,c.client_email)}>
            {tr("Verbindung beenden","Disconnect")}
          </button>
        </div>
      </div>);})}
    </div>}
  </div>);
}

function PremiumSelect({value,onChange,options,placeholder}){
  const[open,setOpen]=useState(false);
  const selected=options.find(o=>o.value===value);
  return(<div style={{position:"relative"}}>
    <div onClick={()=>setOpen(!open)} style={{padding:"11px 14px",background:theme.surfaceAlt,border:"1.5px solid "+(open?theme.accent:theme.border),borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,color:theme.text,transition:"all 0.15s"}}>
      <span style={{display:"flex",alignItems:"center",gap:8}}>
        {selected?.icon&&<span style={{fontSize:16}}>{selected.icon}</span>}
        <span>{selected?.label||placeholder||"—"}</span>
      </span>
      <span style={{fontSize:10,color:theme.textDim,transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
    </div>
    {open&&<>
      <div style={{position:"fixed",inset:0,zIndex:998}} onClick={()=>setOpen(false)}/>

function ProgressBar({pct,color,height=6}){
  const w=Math.min(100,Math.max(0,pct));
  return(<div style={{width:"100%",height,background:theme.surfaceAlt,borderRadius:height/2,overflow:"hidden",position:"relative"}}>
    <div style={{width:w+"%",height:"100%",background:`linear-gradient(90deg, ${color}, ${color}cc)`,borderRadius:height/2,transition:"width 0.6s cubic-bezier(0.4,0,0.2,1)",animation:"barFill 0.8s ease-out"}}/>
  </div>);
}

function NotificationsView(){
  const[status,setStatus]=useState(null);
  const[loading,setLoading]=useState(true);
  const[deeplink,setDeeplink]=useState("");
  const _l=getLang();
  const tr=(de,en)=>_l==="de"?de:en;
  const load=async()=>{
    setLoading(true);
    try{
      const r=await _authFetch(API+"/account/telegram/status");
      const d=await r.json();
      if(r.ok)setStatus(d);
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const startLink=async()=>{
    try{
      const r=await _authFetch(API+"/telegram/link/start",{method:"POST"});
      const d=await r.json();
      if(r.ok){
        setDeeplink(d.deeplink);
        window.open(d.deeplink,"_blank");
      }else{
        alert(_extractErr(d));
      }
    }catch(e){alert(e.message);}
  };
  const disconnect=async()=>{
    if(!confirm(tr("Telegram-Verbindung trennen?","Disconnect Telegram?")))return;
    try{
      const r=await _authFetch(API+"/account/telegram/disconnect",{method:"DELETE"});
      if(r.ok){if(showToast)showToast(tr("Verbindung getrennt","Disconnected"),"info");load();}
    }catch(e){}
  };
  const togglePref=async(key,value)=>{
    try{
      const r=await _authFetch(API+"/account/telegram/preferences",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({[key]:value})});
      const d=await r.json();
      if(r.ok)setStatus(prev=>({...prev,preferences:d.preferences}));
    }catch(e){}
  };
  const[testing,setTesting]=useState(false);
  const sendTest=async()=>{
    setTesting(true);
    try{
      const r=await _authFetch(API+"/account/telegram/test",{method:"POST"});
      const d=await r.json();
      if(r.ok){if(showToast)showToast(tr("✓ Test-Nachricht gesendet — schauen Sie in Telegram","✓ Test sent — check Telegram"),"success");}
      else alert(_extractErr(d));
    }catch(e){alert(e.message);}
    setTesting(false);
  };
  const downloadExport=async()=>{
    try{
      const r=await _authFetch(API+"/account/export-all");
      if(!r.ok){const d=await r.json();alert(_extractErr(d));return;}
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download="autotax-export.zip";
      document.body.appendChild(a);a.click();a.remove();
      URL.revokeObjectURL(url);
      if(showToast)showToast(tr("Export heruntergeladen","Export downloaded"),"success");
    }catch(e){alert(e.message);}
  };
  const prefLabels={
    mahnung:{icon:"📨",text:tr("Mahnungen","Dunning notices")},
    summary:{icon:"📊",text:tr("Monatszusammenfassung","Monthly summary")},
    steuer:{icon:"🧾",text:tr("Steuer-Termine","Tax deadlines")},
    reminders:{icon:"⏰",text:tr("Rechnung-Erinnerungen","Invoice reminders")},
    advisor:{icon:"👔",text:tr("Steuerberater-Aktivität","Tax advisor activity")},
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:24,maxWidth:720}}>
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>🔔 {tr("Benachrichtigungen & Daten","Notifications & Data")}</h2>
      <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{tr("Telegram-Bot, E-Mail-Einstellungen und DSGVO-Export.","Telegram bot, email settings, and GDPR export.")}</p>
    </div>

    {/* TELEGRAM */}
    <div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 4px"}}>📱 Telegram Bot</h3>
      <p style={{color:theme.textMuted,fontSize:12,margin:"0 0 16px"}}>{tr("Benachrichtigungen direkt in Telegram — schnell, gratis, kein E-Mail-Spam.","Notifications straight in Telegram — fast, free, no email clutter.")}</p>
      {loading&&<div style={{color:theme.textDim,fontSize:13}}>⏳ ...</div>}
      {!loading&&status&&!status.bot_available&&<div style={{padding:12,background:theme.warnSoft,border:"1px solid "+theme.warn+"55",borderRadius:8,fontSize:12,color:theme.warn}}>
        ⚠️ {tr("Telegram-Bot ist serverseitig noch nicht eingerichtet (TELEGRAM_BOT_USERNAME env fehlt).","Telegram bot is not configured on the server (TELEGRAM_BOT_USERNAME env missing).")}
      </div>}
      {!loading&&status&&status.bot_available&&!status.connected&&<div>
        <div style={{padding:12,background:theme.surfaceAlt,borderRadius:8,fontSize:13,color:theme.textMuted,marginBottom:12}}>
          {tr(
            "Drücken Sie den Button — ein einmaliger Link öffnet Telegram. Im Bot wird automatisch der /start-Befehl mit Ihrem Token ausgeführt.",
            "Press the button — a one-time link opens Telegram. The bot will automatically run /start with your token."
          )}
        </div>
        <button style={{...css.btn(),width:"100%"}} onClick={startLink}>
          🔗 {tr("Telegram-Bot verbinden","Connect Telegram Bot")}
        </button>
        {deeplink&&<div style={{marginTop:10,fontSize:11,color:theme.textDim}}>
          {tr("Falls Telegram nicht automatisch öffnet:","If Telegram didn't open:")} <a href={deeplink} target="_blank" rel="noopener" style={{color:theme.accent}}>{deeplink}</a>
        </div>}
      </div>}
      {!loading&&status&&status.connected&&<div>
        <div style={{padding:12,background:theme.accentSoft,border:"1px solid "+theme.accent+"55",borderRadius:8,marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>✅</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:theme.text}}>{tr("Verbunden","Connected")}{status.username?" — @"+status.username:""}</div>
            <div style={{fontSize:11,color:theme.textMuted}}>{tr("Sie erhalten Benachrichtigungen entsprechend Ihren Einstellungen unten.","You receive notifications based on your preferences below.")}</div>
          </div>
          <button style={{...css.btnOutline,fontSize:12,marginRight:8}} onClick={sendTest} disabled={testing}>{testing?"⏳":"🧪"} {tr("Test","Test")}</button>
          <button style={{...css.btnOutline,color:theme.danger,borderColor:theme.danger+"55",fontSize:12}} onClick={disconnect}>{tr("Trennen","Disconnect")}</button>
        </div>
        <div style={{borderTop:"1px solid "+theme.border,paddingTop:12}}>
          <div style={{fontSize:12,color:theme.textMuted,marginBottom:10}}>{tr("Welche Benachrichtigungen?","Which notifications?")}</div>
          {Object.entries(prefLabels).map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+theme.border+"55"}}>
            <span style={{fontSize:18,marginRight:10}}>{v.icon}</span>
            <span style={{flex:1,fontSize:13,color:theme.text}}>{v.text}</span>
            <label style={{cursor:"pointer",display:"inline-flex",alignItems:"center"}}>
              <input type="checkbox" checked={status.preferences[k]!==false} onChange={e=>togglePref(k,e.target.checked)} style={{width:18,height:18,accentColor:theme.accent,cursor:"pointer"}}/>
            </label>
          </div>))}
        </div>
      </div>}
    </div>

    {/* DSGVO EXPORT */}
    <div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 4px"}}>📥 {tr("Datenexport (DSGVO Art. 15)","Data Export (GDPR Art. 15)")}</h3>
      <p style={{color:theme.textMuted,fontSize:12,margin:"0 0 12px"}}>{tr(
        "Alle Ihre Daten als ZIP herunterladen: Rechnungen, Kassenbuch, Aktivitäten, Firmen, Steuerberater-Beziehungen.",
        "Download all your data as ZIP: invoices, cash book, activity log, companies, advisor relationships."
      )}</p>
      <button style={{...css.btn(),width:"100%"}} onClick={downloadExport}>
        📦 {tr("Daten herunterladen","Download data")}
      </button>
      <div style={{fontSize:10,color:theme.textDim,marginTop:8,textAlign:"center"}}>{tr("Limit 3/Stunde — größere Anfragen bitte per Support.","Limit 3/hour — larger requests via support.")}</div>
    </div>
  </div>);
}

  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showCreate,setShowCreate]=useState(false);
  const[newRem,setNewRem]=useState({type:"custom",due_date:"",label:"",notes:""});
  const _l=getLang();
  const tr=(de,en)=>_l==="de"?de:en;
  const typeLabels={
    ust:"USt-Voranmeldung",
    est:"ESt-Vorauszahlung",
    gewst:"GewSt-Vorauszahlung",
    jahres:"Jahressteuererklärung",
    custom:tr("Eigener Termin","Custom"),
  };
  const typeIcons={ust:"💶",est:"💼",gewst:"🏢",jahres:"📋",custom:"📌"};
  const load=async()=>{
    setLoading(true);
    try{
      const r=await _authFetch(API+"/steuer/reminders?include_snoozed=true");
      const d=await r.json();
      if(r.ok)setItems(d.items||[]);
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const updateStatus=async(id,status,extras={})=>{
    try{
      const r=await _authFetch(API+"/steuer/reminders/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status,...extras})});
      if(r.ok)load();
    }catch(e){alert(e.message);}
  };
  const snooze=async(id,days)=>{
    const until=new Date();until.setDate(until.getDate()+days);
    const iso=until.toISOString().slice(0,10);
    await updateStatus(id,"snoozed",{snoozed_until:iso});
  };
  const createCustom=async()=>{
    if(!newRem.due_date){alert(tr("Fälligkeit ist erforderlich","Due date required"));return;}
    try{
      const r=await _authFetch(API+"/steuer/reminders",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(newRem)});
      const d=await r.json();
      if(r.ok){setShowCreate(false);setNewRem({type:"custom",due_date:"",label:"",notes:""});load();if(showToast)showToast(tr("Termin hinzugefügt","Reminder added"),"success");}
      else alert(_extractErr(d));
    }catch(e){alert(e.message);}
  };
  const remove=async(id)=>{
    if(!confirm(tr("Diesen Termin endgültig löschen?","Delete this reminder permanently?")))return;
    try{
      const r=await _authFetch(API+"/steuer/reminders/"+id,{method:"DELETE"});
      if(r.ok)load();
    }catch(e){}
  };
  const fmtDate=(iso)=>{if(!iso)return"—";const d=new Date(iso+"T00:00:00");return d.toLocaleDateString(_l==="de"?"de-DE":"en-GB");};
  const today=new Date();today.setHours(0,0,0,0);
  const groupKey=(r)=>{
    if(r.status==="done")return"done";
    if(r.status==="dismissed")return"dismissed";
    if(r.status==="snoozed")return"snoozed";
    if(r.days_until<0)return"overdue";
    if(r.days_until<=7)return"soon";
    return"upcoming";
  };
  const groups={overdue:[],soon:[],upcoming:[],snoozed:[],done:[],dismissed:[]};
  items.forEach(r=>groups[groupKey(r)]?.push(r));
  const groupLabels={
    overdue:{color:theme.danger,icon:"⚠️",txt:tr("Überfällig","Overdue")},
    soon:{color:"#f59e0b",icon:"⏰",txt:tr("Diese Woche","This week")},
    upcoming:{color:theme.blue,icon:"📅",txt:tr("Demnächst","Upcoming")},
    snoozed:{color:theme.textDim,icon:"💤",txt:tr("Erinnerung pausiert","Snoozed")},
    done:{color:theme.accent,icon:"✓",txt:tr("Erledigt","Done")},
    dismissed:{color:theme.textDim,icon:"🚫",txt:tr("Verworfen","Dismissed")},
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>🧾 {tr("Steuer-Termine","Tax Deadlines")}</h2>
        <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{tr("USt, ESt, GewSt + eigene Termine — mit Schlummerfunktion und Verlauf.","VAT, income tax, trade tax + custom — with snooze and history.")}</p>
      </div>
      <button style={css.btn()} onClick={()=>setShowCreate(true)}>➕ {tr("Eigener Termin","Custom reminder")}</button>
    </div>
    {showCreate&&<div style={{...css.card,padding:20,background:theme.surfaceAlt}}>
      <h3 style={{margin:"0 0 12px",fontSize:15,color:theme.text}}>{tr("Neuen Steuer-Termin anlegen","New tax reminder")}</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div>
          <label style={{fontSize:11,color:theme.textMuted}}>{tr("Typ","Type")}</label>
          <select style={css.input} value={newRem.type} onChange={e=>setNewRem({...newRem,type:e.target.value})}>
            {Object.entries(typeLabels).map(([k,v])=>(<option key={k} value={k}>{typeIcons[k]} {v}</option>))}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:theme.textMuted}}>{tr("Fälligkeit","Due date")}</label>
          <input type="date" style={css.input} value={newRem.due_date} onChange={e=>setNewRem({...newRem,due_date:e.target.value})}/>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11,color:theme.textMuted}}>{tr("Bezeichnung","Label")}</label>
        <input type="text" style={css.input} placeholder={tr("z.B. USt Q3 2026","e.g. VAT Q3 2026")} value={newRem.label} onChange={e=>setNewRem({...newRem,label:e.target.value})}/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:theme.textMuted}}>{tr("Notiz","Note")}</label>
        <input type="text" style={css.input} value={newRem.notes} onChange={e=>setNewRem({...newRem,notes:e.target.value})}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button style={{...css.btn(),flex:1}} onClick={createCustom}>{tr("Speichern","Save")}</button>
        <button style={{...css.btnOutline,flex:1}} onClick={()=>setShowCreate(false)}>{tr("Abbrechen","Cancel")}</button>
      </div>
    </div>}
    {loading&&<div style={{...css.card,padding:24,textAlign:"center",color:theme.textDim}}>⏳ {tr("Wird geladen","Loading")}…</div>}
    {!loading&&items.length===0&&<div style={{...css.card,padding:32,textAlign:"center",color:theme.textDim}}>{tr("Noch keine Termine — Termine werden automatisch erstellt sobald Ihre Plan-Einstellungen analysiert sind.","No deadlines yet — they appear automatically once your plan settings are processed.")}</div>}
    {["overdue","soon","upcoming","snoozed","done","dismissed"].map(g=>{
      const rs=groups[g];if(rs.length===0)return null;
      const L=groupLabels[g];
      return(<div key={g} style={css.card}>
        <h3 style={{fontSize:14,fontWeight:700,color:L.color,margin:"0 0 12px",display:"flex",alignItems:"center",gap:8}}>
          <span>{L.icon}</span><span>{L.txt}</span>
          <span style={{color:theme.textDim,fontSize:12,fontWeight:400}}>({rs.length})</span>
        </h3>
        {rs.map((r,i)=>(<div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<rs.length-1?"1px solid "+theme.border:"none",flexWrap:"wrap"}}>
          <span style={{fontSize:22}}>{typeIcons[r.type]||"📌"}</span>
          <div style={{flex:1,minWidth:200}}>
            <div style={{color:theme.text,fontWeight:600,fontSize:14}}>{r.label||typeLabels[r.type]||r.type}</div>
            <div style={{color:theme.textDim,fontSize:11,fontFamily:mono}}>{fmtDate(r.due_date)} {r.days_until!==null?" · "+(r.days_until>=0?tr("in "+r.days_until+" Tagen","in "+r.days_until+" days"):tr(Math.abs(r.days_until)+" Tage überfällig",Math.abs(r.days_until)+" days overdue")):""}{r.snoozed_until?" · "+tr("Schlummer bis","Snoozed until")+" "+fmtDate(r.snoozed_until):""}</div>
            {r.notes&&<div style={{color:theme.textMuted,fontSize:11,marginTop:3,fontStyle:"italic"}}>{r.notes}</div>}
          </div>
          {r.status==="active"&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button style={{...css.btnOutline,fontSize:11,padding:"5px 10px"}} onClick={()=>snooze(r.id,7)}>💤 {tr("+7 Tage","+7 days")}</button>
            <button style={{...css.btnOutline,fontSize:11,padding:"5px 10px"}} onClick={()=>snooze(r.id,30)}>💤 {tr("+30 Tage","+30 days")}</button>
            <button style={{...css.btn(theme.accent),fontSize:11,padding:"5px 10px"}} onClick={()=>updateStatus(r.id,"done")}>✓ {tr("Erledigt","Done")}</button>
            <button style={{...css.btnOutline,fontSize:11,padding:"5px 10px",color:theme.textDim}} onClick={()=>updateStatus(r.id,"dismissed")}>🚫 {tr("Verwerfen","Dismiss")}</button>
          </div>}
          {r.status==="snoozed"&&<button style={{...css.btnOutline,fontSize:11,padding:"5px 10px"}} onClick={()=>updateStatus(r.id,"active",{snoozed_until:null})}>▶️ {tr("Reaktivieren","Reactivate")}</button>}
          {(r.status==="done"||r.status==="dismissed")&&<button style={{...css.btnOutline,fontSize:11,padding:"5px 10px"}} onClick={()=>updateStatus(r.id,"active")}>↺ {tr("Wiederöffnen","Reopen")}</button>}
          {r.type==="custom"&&<button style={{...css.btnOutline,fontSize:11,padding:"5px 10px",color:theme.danger}} onClick={()=>remove(r.id)}>🗑</button>}
        </div>))}
      </div>);
    })}
  </div>);
}

      {items.map((r,i)=>{
        const L=labels[r.job_type]||{icon:"📌",text:r.job_type};
        const c=statusColor[r.status]||theme.textMuted;
        return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<items.length-1?"1px solid "+theme.border:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:18,minWidth:24}}>{L.icon}</span>
          <div style={{flex:1,minWidth:0}}>

}

function AuditView(){
  const[items,setItems]=useState([]);
  const[total,setTotal]=useState(0);
  const[loading,setLoading]=useState(true);
  const[offset,setOffset]=useState(0);
  const[action,setAction]=useState("");
  const limit=50;
  const labels={
    "auth.login_success":{icon:"🔓",text:getLang()==="de"?"Anmeldung":"Login",color:theme.accent},
    "auth.login_failed":{icon:"🚫",text:getLang()==="de"?"Fehlgeschlagene Anmeldung":"Failed login",color:theme.danger},
    "auth.logout_all":{icon:"🚪",text:getLang()==="de"?"Alle Geräte abgemeldet":"Logout all devices",color:"#f59e0b"},
    "auth.password_change":{icon:"🔑",text:getLang()==="de"?"Passwort geändert":"Password changed",color:theme.blue},
    "invoice.update":{icon:"✏️",text:getLang()==="de"?"Rechnung bearbeitet":"Invoice edited",color:theme.blue},
    "invoice.delete":{icon:"🗑️",text:getLang()==="de"?"Rechnung gelöscht":"Invoice deleted",color:theme.danger},
    "invoice.delete_permanent":{icon:"💀",text:getLang()==="de"?"Rechnung dauerhaft gelöscht":"Invoice permanently deleted",color:theme.danger},
    "invoice.restore":{icon:"♻️",text:getLang()==="de"?"Rechnung wiederhergestellt":"Invoice restored",color:theme.accent},
  };
  const load=async(off=0,act=action)=>{
    setLoading(true);
    try{
      const q=new URLSearchParams({limit,offset:off});
      if(act)q.set("action",act);
      const r=await _authFetch(API+"/audit/recent?"+q.toString());
      const d=await r.json();
      if(r.ok){setItems(d.items||[]);setTotal(d.total||0);setOffset(off);}
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load(0,action);},[action]);
  const fmtTime=(iso)=>{if(!iso)return"—";const d=new Date(iso);return d.toLocaleString(getLang()==="de"?"de-DE":"en-GB");};
  const fmtPayload=(p)=>{if(!p)return"";try{const o=JSON.parse(p);return Object.entries(o).slice(0,3).map(([k,v])=>k+": "+String(v).slice(0,40)).join(" · ");}catch(e){return String(p).slice(0,120);}};
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>📋 {getLang()==="de"?"Aktivitäten":"Activity Log"}</h2>
      <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{getLang()==="de"?"Alle Änderungen an deinem Konto — chronologisch, unveränderlich. Für DSGVO Art. 15 und deinen Steuerberater.":"All changes to your account — chronological, immutable. For GDPR Art. 15 and your tax advisor."}</p>
    </div>
    <div style={{...css.card,padding:0,overflow:"hidden"}}>
      <div style={{padding:"12px 18px",borderBottom:"1px solid "+theme.border,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <select value={action} onChange={e=>setAction(e.target.value)} style={{...css.input,width:"auto",padding:"8px 12px",fontSize:13}}>
          <option value="">{getLang()==="de"?"Alle Aktionen":"All actions"}</option>
          {Object.entries(labels).map(([k,v])=>(<option key={k} value={k}>{v.icon} {v.text}</option>))}
        </select>
        <div style={{flex:1,textAlign:"right",fontSize:12,color:theme.textDim}}>{loading?"⏳":total+" "+(getLang()==="de"?"Einträge":"entries")}</div>
      </div>
      {items.length===0&&!loading&&<div style={{padding:32,textAlign:"center",color:theme.textDim,fontSize:13}}>{getLang()==="de"?"Keine Aktivität gefunden.":"No activity found."}</div>}
      {items.map((r,i)=>{
        const L=labels[r.action]||{icon:"📌",text:r.action,color:theme.textMuted};
        return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<items.length-1?"1px solid "+theme.border:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:18,minWidth:24}}>{L.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:L.color,fontWeight:600,fontSize:13}}>{L.text} {r.resource_id?<span style={{color:theme.textDim,fontWeight:400}}>#{r.resource_id}</span>:null}</div>
            <div style={{color:theme.textDim,fontSize:11,fontFamily:mono,marginTop:2}}>{fmtTime(r.created_at)} {r.ip?" · "+r.ip:""}</div>
            {r.payload&&<div style={{color:theme.textMuted,fontSize:11,marginTop:4,fontFamily:mono}}>{fmtPayload(r.payload)}</div>}
          </div>
        </div>);
      })}
      {total>limit&&<div style={{padding:"12px 18px",borderTop:"1px solid "+theme.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={{...css.btnOutline,opacity:offset===0?0.4:1}} disabled={offset===0} onClick={()=>load(Math.max(0,offset-limit))}>← {getLang()==="de"?"Zurück":"Previous"}</button>
        <span style={{fontSize:12,color:theme.textDim}}>{offset+1}–{Math.min(offset+limit,total)} / {total}</span>
        <button style={{...css.btnOutline,opacity:offset+limit>=total?0.4:1}} disabled={offset+limit>=total} onClick={()=>load(offset+limit)}>{getLang()==="de"?"Weiter":"Next"} →</button>
      </div>}
    </div>
  </div>);
}

function ToastItem({message,type="success",onClose}){
  const[closing,setClosing]=useState(false);
  const dismiss=()=>{setClosing(true);setTimeout(onClose,250);};
  useEffect(()=>{const t=setTimeout(dismiss,3000);return()=>clearTimeout(t);},[]);
  const types={
    success:{color:theme.accent,bg:theme.accentSoft,icon:I.check,label:"Erfolg"},
    error:{color:theme.danger,bg:theme.dangerSoft,icon:I.x,label:"Error"},
    info:{color:theme.blue,bg:theme.blueSoft,icon:I.help,label:"Info"}
  };
  const c=types[type]||types.success;
  return(<div style={{animation:closing?"toastOut 0.25s ease forwards":"toastIn 0.3s ease",display:"flex",alignItems:"stretch",background:theme.card,border:`1px solid ${theme.border}`,borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.03)",maxWidth:370,minWidth:260,fontFamily:font,overflow:"hidden"}}>
    <div style={{width:4,background:c.color,flexShrink:0,borderRadius:"10px 0 0 10px"}}/>
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",flex:1}}>
      <div style={{width:28,height:28,borderRadius:8,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${c.color}22`}}><Icon d={c.icon} size={14} color={c.color}/></div>
      <span style={{fontSize:13,color:theme.text,fontWeight:500,flex:1,lineHeight:1.4}}>{message}</span>
      <div style={{cursor:"pointer",padding:4,borderRadius:6,transition:"background 0.15s",flexShrink:0}} onClick={dismiss} onMouseEnter={e=>e.currentTarget.style.background=theme.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Icon d={I.x} size={12} color={theme.textDim}/></div>
    </div>
  </div>);
}

function DuplicateModal({visible, filename, onConfirm, onCancel}) {
  if (!visible) return null;
  return React.createElement("div", {
    style: {position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.2s ease",padding:20},
    onClick: onCancel
  },
    React.createElement("div", {
      style: {background:"#1e293b",border:"1px solid #2a3548",borderRadius:16,padding:32,maxWidth:440,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.5)",animation:"fadeIn 0.3s ease"},
      onClick: function(e){e.stopPropagation();}
    },
      React.createElement("div", {style:{fontSize:32,textAlign:"center",marginBottom:12}}, "\u26A0\uFE0F"),
      React.createElement("div", {style:{fontSize:18,fontWeight:700,color:"#f1f5f9",textAlign:"center",marginBottom:8}}, typeof t==="function"?t("duplicate_title"):"Rechnung bereits vorhanden"),
      React.createElement("div", {style:{fontSize:14,color:"#94a3b8",textAlign:"center",lineHeight:1.6,marginBottom:6}},
        typeof t==="function"?t("duplicate_msg"):"Diese Rechnung wurde bereits hochgeladen."
      ),
      filename ? React.createElement("div", {style:{fontSize:12,color:"#64748b",textAlign:"center",marginBottom:20,fontFamily:"monospace",background:"#111827",padding:"6px 12px",borderRadius:8}}, filename) : null,
      React.createElement("div", {style:{fontSize:14,color:"#f59e0b",textAlign:"center",marginBottom:24}},
        typeof t==="function"?t("duplicate_ask"):"Erneut upload?"
      ),
      React.createElement("div", {style:{display:"flex",gap:12,justifyContent:"center"}},
        React.createElement("button", {
          onClick: onCancel,
          style: {padding:"12px 24px",borderRadius:10,border:"1.5px solid #2a3548",background:"transparent",color:"#94a3b8",fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"},
          onMouseEnter: function(e){e.target.style.borderColor="#ef4444";e.target.style.color="#ef4444";},
          onMouseLeave: function(e){e.target.style.borderColor="#2a3548";e.target.style.color="#94a3b8";}
        }, typeof t==="function"?t("cancel"):"Abbrechen"),
        React.createElement("button", {
          onClick: onConfirm,
          style: {padding:"12px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px rgba(16,185,129,0.3)",transition:"all 0.2s"},
          onMouseEnter: function(e){e.target.style.transform="scale(1.05)";},
          onMouseLeave: function(e){e.target.style.transform="scale(1)";}
        }, typeof t==="function"?t("duplicate_yes"):"Ja, erneut upload")
      )
    )
  );
}

// Global duplicate modal state (used by upload flow)
window._dupModal = {resolve: null};
window.showDuplicateModal = function(filename) {
  return new Promise(function(resolve) {
    window._dupModal.resolve = resolve;
    window._dupModal.filename = filename;
    window._dupModal.visible = true;
    // Force re-render
    if (window._dupModalForceUpdate) window._dupModalForceUpdate();
  });
};

function DuplicateModalRoot() {
  const [, setTick] = useState(0);
  useEffect(function() { window._dupModalForceUpdate = function() { setTick(function(t){return t+1;}); }; }, []);
  const m = window._dupModal;
  return React.createElement(DuplicateModal, {
    visible: m.visible || false,
    filename: m.filename || "",
    onConfirm: function() { m.visible = false; setTick(function(t){return t+1;}); if (m.resolve) m.resolve(true); },
    onCancel: function() { m.visible = false; setTick(function(t){return t+1;}); if (m.resolve) m.resolve(false); }
  });
}
/* --- ADDED END --- */
