  const[showCreate,setShowCreate]=useState(false);
  const[newRem,setNewRem]=useState({type:"custom",due_date:"",label:"",notes:""});
  const _l=getLang();
  const tr=(de,en)=>_l==="de"?de:en;
  const typeLabels={
    ust:"USt-Voranmeldung",
    est:"ESt-Vorauszahlung",
    gewst:"GewSt-Vorauszahlung",
    jahres:"Jahressteuererklärung",
    custom:tr("Eigener Termin","Custom"),
  };
  const typeIcons={ust:"💶",est:"💼",gewst:"🏢",jahres:"📋",custom:"📌"};
  const load=async()=>{
    setLoading(true);
    try{
      const r=await _authFetch(API+"/steuer/reminders?include_snoozed=true");
      const d=await r.json();
      if(r.ok)setItems(d.items||[]);
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const updateStatus=async(id,status,extras={})=>{
    try{
      const r=await _authFetch(API+"/steuer/reminders/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status,...extras})});
      if(r.ok)load();
    }catch(e){alert(e.message);}
  };
  const snooze=async(id,days)=>{
    const until=new Date();until.setDate(until.getDate()+days);
    const iso=until.toISOString().slice(0,10);
    await updateStatus(id,"snoozed",{snoozed_until:iso});
  };
  const createCustom=async()=>{
    if(!newRem.due_date){alert(tr("Fälligkeit ist erforderlich","Due date required"));return;}
    try{
      const r=await _authFetch(API+"/steuer/reminders",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(newRem)});
      const d=await r.json();
      if(r.ok){setShowCreate(false);setNewRem({type:"custom",due_date:"",label:"",notes:""});load();if(showToast)showToast(tr("Termin hinzugefügt","Reminder added"),"success");}
      else alert(_extractErr(d));
    }catch(e){alert(e.message);}
  };
  const remove=async(id)=>{
    if(!confirm(tr("Diesen Termin endgültig löschen?","Delete this reminder permanently?")))return;
    try{
      const r=await _authFetch(API+"/steuer/reminders/"+id,{method:"DELETE"});
      if(r.ok)load();
    }catch(e){}
  };
  const fmtDate=(iso)=>{if(!iso)return"—";const d=new Date(iso+"T00:00:00");return d.toLocaleDateString(_l==="de"?"de-DE":"en-GB");};
  const today=new Date();today.setHours(0,0,0,0);
  const groupKey=(r)=>{
    if(r.status==="done")return"done";
    if(r.status==="dismissed")return"dismissed";
    if(r.status==="snoozed")return"snoozed";
    if(r.days_until<0)return"overdue";
    if(r.days_until<=7)return"soon";
    return"upcoming";
  };
  const groups={overdue:[],soon:[],upcoming:[],snoozed:[],done:[],dismissed:[]};
  items.forEach(r=>groups[groupKey(r)]?.push(r));
  const groupLabels={
    overdue:{color:theme.danger,icon:"⚠️",txt:tr("Überfällig","Overdue")},
    soon:{color:"#f59e0b",icon:"⏰",txt:tr("Diese Woche","This week")},
    upcoming:{color:theme.blue,icon:"📅",txt:tr("Demnächst","Upcoming")},
    snoozed:{color:theme.textDim,icon:"💤",txt:tr("Erinnerung pausiert","Snoozed")},
    done:{color:theme.accent,icon:"✓",txt:tr("Erledigt","Done")},
    dismissed:{color:theme.textDim,icon:"🚫",txt:tr("Verworfen","Dismissed")},
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>🧾 {tr("Steuer-Termine","Tax Deadlines")}</h2>
        <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{tr("USt, ESt, GewSt + eigene Termine — mit Schlummerfunktion und Verlauf.","VAT, income tax, trade tax + custom — with snooze and history.")}</p>
      </div>
      <button style={css.btn()} onClick={()=>setShowCreate(true)}>➕ {tr("Eigener Termin","Custom reminder")}</button>
    </div>
    {showCreate&&<div style={{...css.card,padding:20,background:theme.surfaceAlt}}>

        </div>))}

  </div>);
}

function JobsView(){

    setLoading(true);
    try{
      const r=await _authFetch(API+"/jobs/recent?limit=100");
      const d=await r.json();
      if(r.ok)setItems(d.items||[]);
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const fmt=(iso)=>{if(!iso)return"—";const d=new Date(iso);return d.toLocaleString(_l==="de"?"de-DE":"en-GB");};
  const fmtMs=(ms)=>{if(!ms&&ms!==0)return"—";if(ms<1000)return ms+"ms";return(ms/1000).toFixed(1)+"s";};
  const labels={
    "email_sync":{icon:"✉️",text:tr("Email-Sync","Email sync")},
    "reminders":{icon:"⏰",text:tr("Rechnung-Erinnerungen","Invoice reminders")},
    "mahnung":{icon:"📨",text:tr("Mahnungen","Dunning notices")},
    "recurring_spawn":{icon:"🔁",text:tr("Abo-Rechnungen","Recurring invoices")},
    "steuer_reminders":{icon:"🧾",text:tr("Steuer-Erinnerungen","Tax reminders")},
    "monthly_summary":{icon:"📊",text:tr("Monatszusammenfassung","Monthly summary")},
    "ocr_async":{icon:"⚡",text:tr("Async OCR","Async OCR")},
  };
  const statusColor={success:theme.accent,failed:theme.danger,running:theme.blue};
  const counts={running:items.filter(i=>i.status==="running").length,success:items.filter(i=>i.status==="success").length,failed:items.filter(i=>i.status==="failed").length};
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>⚙️ {tr("Hintergrund-Jobs","Background Jobs")}</h2>
      <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{tr("Automatische Aufgaben — Email-Sync, Mahnungen, wiederkehrende Rechnungen, Erinnerungen.","Automated tasks — email sync, dunning, recurring invoices, reminders.")}</p>
    </div>
    {/* Summary stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))",gap:12}}>
      <div style={{...css.card,textAlign:"center",padding:"16px 12px"}}>
        <div style={{fontSize:11,color:theme.textMuted}}>{tr("Läuft","Running")}</div>
        <div style={{fontSize:26,fontWeight:700,color:theme.blue,marginTop:4}}>{counts.running}</div>
      </div>
      <div style={{...css.card,textAlign:"center",padding:"16px 12px"}}>
        <div style={{fontSize:11,color:theme.textMuted}}>{tr("Erfolgreich","Successful")}</div>
        <div style={{fontSize:26,fontWeight:700,color:theme.accent,marginTop:4}}>{counts.success}</div>
      </div>
      <div style={{...css.card,textAlign:"center",padding:"16px 12px"}}>
        <div style={{fontSize:11,color:theme.textMuted}}>{tr("Fehlgeschlagen","Failed")}</div>
        <div style={{fontSize:26,fontWeight:700,color:counts.failed>0?theme.danger:theme.textDim,marginTop:4}}>{counts.failed}</div>

      {items.map((r,i)=>{
        const L=labels[r.job_type]||{icon:"📌",text:r.job_type};
        const c=statusColor[r.status]||theme.textMuted;
        return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<items.length-1?"1px solid "+theme.border:"none",display:"flex",gap:12,alignItems:"flex-start"}}>

          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:theme.text,fontWeight:600,fontSize:13}}>{L.text}</span>
              <span style={{...css.badge(c+"22",c),fontSize:10}}>{r.status==="success"?"✓ OK":r.status==="failed"?"✗ "+tr("Fehler","Error"):"⏳ "+tr("Läuft","Running")}</span>
            </div>
            <div style={{color:theme.textDim,fontSize:11,fontFamily:mono,marginTop:2}}>
              {fmt(r.started_at)} {r.duration_ms!==null?"· "+fmtMs(r.duration_ms):""}

  </div>);
}

function AuditView(){
  const[items,setItems]=useState([]);
  const[total,setTotal]=useState(0);
  const[loading,setLoading]=useState(true);
  const[offset,setOffset]=useState(0);
  const[action,setAction]=useState("");
  const limit=50;
  const labels={
    "auth.login_success":{icon:"🔓",text:getLang()==="de"?"Anmeldung":"Login",color:theme.accent},
    "auth.login_failed":{icon:"🚫",text:getLang()==="de"?"Fehlgeschlagene Anmeldung":"Failed login",color:theme.danger},
    "auth.logout_all":{icon:"🚪",text:getLang()==="de"?"Alle Geräte abgemeldet":"Logout all devices",color:"#f59e0b"},
    "auth.password_change":{icon:"🔑",text:getLang()==="de"?"Passwort geändert":"Password changed",color:theme.blue},
    "invoice.update":{icon:"✏️",text:getLang()==="de"?"Rechnung bearbeitet":"Invoice edited",color:theme.blue},
    "invoice.delete":{icon:"🗑️",text:getLang()==="de"?"Rechnung gelöscht":"Invoice deleted",color:theme.danger},
    "invoice.delete_permanent":{icon:"💀",text:getLang()==="de"?"Rechnung dauerhaft gelöscht":"Invoice permanently deleted",color:theme.danger},
    "invoice.restore":{icon:"♻️",text:getLang()==="de"?"Rechnung wiederhergestellt":"Invoice restored",color:theme.accent},
  };
  const load=async(off=0,act=action)=>{
    setLoading(true);
    try{
      const q=new URLSearchParams({limit,offset:off});
      if(act)q.set("action",act);
      const r=await _authFetch(API+"/audit/recent?"+q.toString());
      const d=await r.json();
      if(r.ok){setItems(d.items||[]);setTotal(d.total||0);setOffset(off);}
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load(0,action);},[action]);
  const fmtTime=(iso)=>{if(!iso)return"—";const d=new Date(iso);return d.toLocaleString(getLang()==="de"?"de-DE":"en-GB");};
  const fmtPayload=(p)=>{if(!p)return"";try{const o=JSON.parse(p);return Object.entries(o).slice(0,3).map(([k,v])=>k+": "+String(v).slice(0,40)).join(" · ");}catch(e){return String(p).slice(0,120);}};
  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>📋 {getLang()==="de"?"Aktivitäten":"Activity Log"}</h2>
      <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{getLang()==="de"?"Alle Änderungen an deinem Konto — chronologisch, unveränderlich. Für DSGVO Art. 15 und deinen Steuerberater.":"All changes to your account — chronological, immutable. For GDPR Art. 15 and your tax advisor."}</p>
    </div>
    <div style={{...css.card,padding:0,overflow:"hidden"}}>
      <div style={{padding:"12px 18px",borderBottom:"1px solid "+theme.border,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <select value={action} onChange={e=>setAction(e.target.value)} style={{...css.input,width:"auto",padding:"8px 12px",fontSize:13}}>
          <option value="">{getLang()==="de"?"Alle Aktionen":"All actions"}</option>
          {Object.entries(labels).map(([k,v])=>(<option key={k} value={k}>{v.icon} {v.text}</option>))}
        </select>
        <div style={{flex:1,textAlign:"right",fontSize:12,color:theme.textDim}}>{loading?"⏳":total+" "+(getLang()==="de"?"Einträge":"entries")}</div>
      </div>
      {items.length===0&&!loading&&<div style={{padding:32,textAlign:"center",color:theme.textDim,fontSize:13}}>{getLang()==="de"?"Keine Aktivität gefunden.":"No activity found."}</div>}
      {items.map((r,i)=>{
        const L=labels[r.action]||{icon:"📌",text:r.action,color:theme.textMuted};
        return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<items.length-1?"1px solid "+theme.border:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:18,minWidth:24}}>{L.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:L.color,fontWeight:600,fontSize:13}}>{L.text} {r.resource_id?<span style={{color:theme.textDim,fontWeight:400}}>#{r.resource_id}</span>:null}</div>
            <div style={{color:theme.textDim,fontSize:11,fontFamily:mono,marginTop:2}}>{fmtTime(r.created_at)} {r.ip?" · "+r.ip:""}</div>
            {r.payload&&<div style={{color:theme.textMuted,fontSize:11,marginTop:4,fontFamily:mono}}>{fmtPayload(r.payload)}</div>}
          </div>
        </div>);
      })}
      {total>limit&&<div style={{padding:"12px 18px",borderTop:"1px solid "+theme.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={{...css.btnOutline,opacity:offset===0?0.4:1}} disabled={offset===0} onClick={()=>load(Math.max(0,offset-limit))}>← {getLang()==="de"?"Zurück":"Previous"}</button>
        <span style={{fontSize:12,color:theme.textDim}}>{offset+1}–{Math.min(offset+limit,total)} / {total}</span>
        <button style={{...css.btnOutline,opacity:offset+limit>=total?0.4:1}} disabled={offset+limit>=total} onClick={()=>load(offset+limit)}>{getLang()==="de"?"Weiter":"Next"} →</button>
      </div>}
    </div>
  </div>);
}

        h3("AutoTax erstellt sie aus den Mieter- und Wohnungsdaten als fertiges PDF — du musst nichts abtippen.","AutoTax creates it from the tenant and unit data as a finished PDF — no typing needed.","AutoTax bunu kiracı ve daire verisinden hazır PDF olarak üretir — hiçbir şey yazmana gerek yok."),

    {icon:"🔑",
      title:h3("Übergabeprotokoll — Ein- und Auszug","Handover protocol — move-in and move-out","Devir teslim protokolü — giriş ve çıkış"),
      desc:h3("Die komplette Wohnungsübergabe im Handy — ohne Word, ohne Papier","The whole flat handover on your phone — no Word, no paper","Tüm daire teslimi telefonda — Word yok, kağıt yok"),
      details:[
        h3("Öffne einen Mieter → 'Übergabe' → '➕ Einzugsprotokoll' oder '➕ Auszugsprotokoll'. Die Räume sind schon vorausgefüllt.","Open a tenant → 'Handover' → '➕ Move-in protocol' or '➕ Move-out protocol'. The rooms are already pre-filled.","Bir kiracıyı aç → 'Übergabe' → '➕ Giriş protokolü' veya '➕ Çıkış protokolü'. Odalar zaten hazır dolu."),
        h3("Geh Raum für Raum durch: pro Element (Wände, Boden, Fenster …) tippst du den Zustand an — neu, gut, gebraucht oder beschädigt — mit Notiz und Foto direkt aus der Handy-Kamera.","Go room by room: for each element (walls, floor, windows …) tap the condition — new, good, used or damaged — with a note and a photo straight from the phone camera.","Oda oda git: her eleman için (duvar, zemin, pencere …) durumu seç — yeni, iyi, kullanılmış veya hasarlı — not ve doğrudan telefon kamerasından fotoğraf ile."),
        h3("Trage die Zählerstände ein (Strom, Wasser, Gas, Heizung) und zähle die übergebenen Schlüssel.","Record the meter readings (electricity, water, gas, heating) and count the keys handed over.","Sayaç değerlerini gir (elektrik, su, gaz, ısıtma) ve teslim edilen anahtarları say."),
        h3("Am Ende unterschreiben beide Seiten mit dem Finger auf dem Bildschirm. Dann 'Abschließen' — fertig.","At the end both parties sign with a finger on the screen. Then 'Complete' — done.","Sonunda iki taraf da ekranda parmakla imzalar. Sonra 'Abschließen' — bitti."),
        h3("Das fertige Protokoll bekommst du als PDF mit allen Räumen, Fotos, Zählern und beiden Unterschriften. Wichtig: nach dem Abschließen kann es NICHT mehr geändert werden — genau das macht es als Nachweis wertvoll.","You get the finished protocol as a PDF with all rooms, photos, meters and both signatures. Important: once completed it can NOT be changed — that is exactly what makes it valid as evidence.","Tamamlanan protokolü tüm odalar, fotoğraflar, sayaçlar ve iki imza ile PDF olarak alırsın. Önemli: tamamlandıktan sonra DEĞİŞTİRİLEMEZ — kanıt olarak değerli olmasının sebebi tam olarak budur."),
      ]},

      details:[
        h3("Zählerstände kannst du im Übergabeprotokoll ODER jederzeit auf der Mieter-Seite eintragen — z.B. einmal im Jahr.","You can record readings in the handover protocol OR anytime on the tenant page — e.g. once a year.","Sayaç değerlerini devir protokolünde VEYA istediğin zaman kiracı sayfasında girebilirsin — ör. yılda bir."),
        h3("AutoTax berechnet den Verbrauch zwischen zwei Messungen automatisch und zeigt ihn als kleines Diagramm.","AutoTax calculates the consumption between two readings automatically and shows it as a small chart.","AutoTax iki ölçüm arasındaki tüketimi otomatik hesaplar ve küçük bir grafik olarak gösterir."),

    {q:"How do I upload receipts?",a:"Go to Upload, drag files into the upload area or click. PDF, PNG, JPEG, TIFF and WEBP supported. Up to 20 files, max 5 MB each. OCR auto-detects all relevant data."},
    {q:"Why does a receipt show €0.00?",a:"OCR could not detect the amount. This happens with poor image quality or handwritten receipts. Fix: go to Invoices or Cash Book → click 'Edit' → enter correct amount."},
    {q:"Why is the date always today?",a:"If OCR cannot read the date, today's date is used as fallback. Supported: DD.MM.YYYY, YYYY-MM-DD. You can correct via 'Edit' anytime."},
    {q:"How do I delete multiple entries?",a:"Check the boxes next to entries. A red 'X selected delete' button appears at top. Works in both Invoices and Cash Book."},
    {q:"What does 'Sync Invoices' do?",a:"Syncs all invoices to Cash Book that aren't there yet. Already synced entries are skipped (duplicate detection). New uploads are auto-synced."},
    {q:"How do I export to Excel?",a:"Go to Export → optionally select tax year → click Excel, CSV, DATEV or JSON. File downloads immediately."},
    {q:"How do I reset everything?",a:"Click 'Reset' in Dashboard top right. TWO confirmation dialogs for safety. WARNING: all invoices AND cash book entries permanently deleted! No undo."},
    {q:"What are the password requirements?",a:"Min 8 chars, 1 uppercase, 1 digit. Example: MyPassword1"},
    {q:"What's the difference between Invoices and Cash Book?",a:"Invoices = uploaded receipts (OCR-detected). Cash Book = complete bookkeeping register. Invoices auto-sync to Cash Book, but you can also add manual entries (e.g. cash transactions)."},
    {q:"How is tax calculated?",a:"German progressive tax: up to €10,908=0%, €17,005=14%, €61,356=30%, €277,826=42%, above=45%. Based on net profit. This is an estimate — consult tax advisor for official returns."},
    {q:"What categories are available?",a:"Auto-detected: food, restaurant, fuel, shopping, transport, electronics, insurance, office, rent, telecom, medical, education, entertainment, other. Categories can be changed manually anytime."},
    {q:"Can I use AI Chat for tax questions?",a:"Yes! The AI assistant knows all your invoices and cash book entries. Ask about totals, categories, VAT, tax estimates, profit, vendors or instructions. Example: 'How much did I spend on food?' or 'What is my VAT balance?'"},
    {q:"How do I import a CSV file?",a:"Go to Cash Book → click 'CSV Import' → select your CSV. Columns can be German or English. Comma and semicolon delimiters auto-detected. Each row creates a Cash Book entry AND invoice."},
    {q:"How do I import a cash book photo?",a:"Go to Cash Book → click 'Photo Import' → select photo of handwritten cash book. OCR detects table rows with date, description and amount. Tip: good lighting and straight photo."},
    {q:"How do I record income?",a:"When uploading: click green 'Income' button → upload receipt. In Cash Book: '+ Entry' → select 'Income'. Income shows as green in Dashboard."},
    {q:"What CSV format is required?",a:"Columns: Date (DD.MM.YYYY), Description, Expenses, Income. Delimiter: comma or semicolon (auto-detected). Tip: export a CSV first as template."},
    {q:"How do I export the Cash Book?",a:"Cash Book → 'CSV Export' button. Contains: date, vendor, invoice no., type, amount, VAT, category, payment. Can be opened in Excel or re-imported."},
    {q:"What is an E-Invoice?",a:"An E-Invoice is an electronic invoice in XML format (XRechnung or ZUGFeRD). Since 2025, all German businesses must accept e-invoices. AutoTax-HUB reads and processes them automatically."},
    {q:"How do I create an invoice?",a:"Invoices → '+ Create Invoice' → enter customer, amount, VAT, date → Save → download PDF."},
    {q:"What is the small business regulation?",a:"§19 UStG: no VAT on invoices if revenue under €25,000 (prior year). Activate toggle in profile. Notice appears automatically on your invoices."},
    {q:"How do I print an invoice as PDF?",a:"Next to each invoice there's a 🖨️ PDF button. Click → PDF generated and downloaded."},
    {q:"Can I use AutoTax-HUB on mobile?",a:"Yes! Open in browser → 'Add to Home Screen'. Works like a native app."},
    {q:"What do the DATEV account numbers mean?",a:"DATEV uses standard accounts: 6800=purchases, 6640=hospitality, 6670=vehicle, 6815=office, 8400=revenue. AutoTax-HUB assigns these automatically."},

function ToastItem({message,type="success",onClose}){
  const[closing,setClosing]=useState(false);
  const dismiss=()=>{setClosing(true);setTimeout(onClose,250);};
  useEffect(()=>{const t=setTimeout(dismiss,3000);return()=>clearTimeout(t);},[]);
  const types={
    success:{color:theme.accent,bg:theme.accentSoft,icon:I.check,label:"Erfolg"},
    error:{color:theme.danger,bg:theme.dangerSoft,icon:I.x,label:"Error"},
    info:{color:theme.blue,bg:theme.blueSoft,icon:I.help,label:"Info"}
  };
  const c=types[type]||types.success;
  return(<div style={{animation:closing?"toastOut 0.25s ease forwards":"toastIn 0.3s ease",display:"flex",alignItems:"stretch",background:theme.card,border:`1px solid ${theme.border}`,borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.03)",maxWidth:370,minWidth:260,fontFamily:font,overflow:"hidden"}}>
    <div style={{width:4,background:c.color,flexShrink:0,borderRadius:"10px 0 0 10px"}}/>
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",flex:1}}>
      <div style={{width:28,height:28,borderRadius:8,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${c.color}22`}}><Icon d={c.icon} size={14} color={c.color}/></div>
      <span style={{fontSize:13,color:theme.text,fontWeight:500,flex:1,lineHeight:1.4}}>{message}</span>
      <div style={{cursor:"pointer",padding:4,borderRadius:6,transition:"background 0.15s",flexShrink:0}} onClick={dismiss} onMouseEnter={e=>e.currentTarget.style.background=theme.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Icon d={I.x} size={12} color={theme.textDim}/></div>
    </div>
  </div>);
}

  const[lastResult,setLastResult]=useState(null);
  const fileInputRef=useRef(null);

  const load=async()=>{
    setLoading(true);
    try{
      const r=await _authFetch(API+"/kasse/imports");
      if(r.status===402){const j=await r.json();setLocked(j.detail||{});}
      else if(r.ok){const j=await r.json();setImports(j.items||[]);}
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const upload=async(file)=>{
    if(!file)return;
    setUploading(true);setLastResult(null);
    try{
      const fd=new FormData();fd.append("file",file);
      const r=await _authFetch(API+"/kasse/import",{method:"POST",body:fd});
      const j=await r.json();
      if(r.status===402){setLocked(j.detail||{});}
      else if(!r.ok){alert("Upload failed: "+(j.detail||"unknown"));}
      else{setLastResult(j);load();}

// EÜR detay modalı — seçilen yılın income/expense breakdown'unu gösterir.
function EurDetailModal({year,onClose,tr}){
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      try{
        const r=await _authFetch(API+"/invoices?date_from="+year+"-01-01&date_to="+year+"-12-31&limit=5000");
        if(r.ok){
          const j=await r.json();
          const items=j.items||j||[];
          let income=0,expense=0;
          const byCat={income:{},expense:{}};
          items.forEach(it=>{
            const amt=parseFloat(it.total_amount||0)||0;
            const cat=it.category||"other";
            if(it.invoice_type==="income"){income+=amt;byCat.income[cat]=(byCat.income[cat]||0)+amt;}
            else if(it.invoice_type==="expense"){expense+=amt;byCat.expense[cat]=(byCat.expense[cat]||0)+amt;}
          });
          setData({income,expense,profit:income-expense,count:items.length,byCat});
        }
      }catch(e){}
      setLoading(false);
    })();
  },[year]);
  return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",borderRadius:14,padding:24,maxWidth:600,width:"100%",maxHeight:"85vh",overflow:"auto",border:"1px solid var(--border)"}}>

      {loading && <div style={{color:"var(--text-muted)"}}>{tr("Lädt…","Loading…","Yükleniyor…")}</div>}
      {!loading && data && <div>

          <div style={{padding:14,background:"rgba(16,185,129,0.10)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10}}>
            <div style={{fontSize:11,color:"#10b981",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{tr("Einnahmen","Income","Gelir")}</div>
            <div style={{fontSize:22,fontWeight:700,color:"#10b981"}}>{data.income.toFixed(2)} €</div>

          <div style={{padding:14,background:"rgba(239,68,68,0.10)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10}}>
            <div style={{fontSize:11,color:"#ef4444",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{tr("Ausgaben","Expenses","Gider")}</div>

            <div style={{fontSize:11,color:"#8b5cf6",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{tr("Gewinn","Profit","Kar")}</div>

  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<=600);
  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<=600);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  const saveTimerRef=useRef(null);
  // Mobile-aware style tokens
  const M={
    pad:isMobile?"14px":"20px",
    inputPad:isMobile?"14px 14px":"10px 12px",  // 48px+ touch target mobile
    inputSize:isMobile?16:14,                    // 16px+ to prevent iOS zoom
    h1:isMobile?22:26,
    btnPad:isMobile?"14px 22px":"12px 24px",
    btnSize:isMobile?15:14,
  };

  const[uploading,setUploading]=useState(false);
  const[lsbResult,setLsbResult]=useState(null); // {extraction, suggested_fields, confidence}
  const[expenseGuide,setExpenseGuide]=useState([]);
  const[showExpenseGuide,setShowExpenseGuide]=useState(false);
  const[askField,setAskField]=useState(null); // {key,label} when modal open
  const[askQuestion,setAskQuestion]=useState("");
  const[askAnswer,setAskAnswer]=useState("");
  const[asking,setAsking]=useState(false);
  const lsbInputRef=useRef(null);
  const spendeInputRef=useRef(null);

  const askAI=async()=>{
    if(!askField||!askQuestion.trim())return;
    setAsking(true);setAskAnswer("");
    try{
      const r=await _authFetch(API+"/steuer/declaration/ask",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({field_key:askField.key,field_label:askField.label,question:askQuestion.trim()}),
      });
      if(r.ok){const j=await r.json();setAskAnswer(j.answer||"");}
      else{const j=await r.json().catch(()=>({}));setAskAnswer("Fehler: "+(j.detail||"unknown"));}
    }catch(e){setAskAnswer("Fehler: "+e.message);}
    setAsking(false);
  };

  const uploadTaxDoc=async(file,docType)=>{
    if(!file||!decl)return;
    setUploading(true);setLsbResult(null);
    try{
      const fd=new FormData();fd.append("file",file);
      const r=await _authFetch(API+"/steuer/document/extract?doc_type="+encodeURIComponent(docType),{
        method:"POST",body:fd,
      });
      if(!r.ok){
        const e=await r.json().catch(()=>({}));
        alert(tr("Extraktion fehlgeschlagen: ","Extraction failed: ","Çıkarım hatası: ")+(e.detail||"unknown"));
      }else{
        const data=await r.json();
        setLsbResult(data);
      }
    }catch(e){alert(e.message);}
    setUploading(false);
  };

  const uploadLSB=async(file)=>{
    if(!file||!decl)return;
    setUploading(true);setLsbResult(null);
    try{
      const fd=new FormData();fd.append("file",file);
      const r=await _authFetch(API+"/steuer/document/extract?doc_type=lohnsteuerbescheinigung",{
        method:"POST",body:fd,
      });
      if(!r.ok){
        const e=await r.json().catch(()=>({}));
        alert(tr("Extraktion fehlgeschlagen: ","Extraction failed: ","Çıkarım hatası: ")+(e.detail||"unknown"));
      }else{
        const data=await r.json();
        setLsbResult(data);
      }
    }catch(e){alert(e.message);}
    setUploading(false);
  };

  const applyLSBFields=async()=>{
    if(!lsbResult||!lsbResult.suggested_fields)return;
    const fields=lsbResult.suggested_fields;
    const keys=Object.keys(fields);
    if(keys.length===0)return;
    const newData={...(decl.data||{}),...fields};
    setDecl({...decl,data:newData});
    try{
      await _authFetch(API+"/steuer/declaration/"+year,{
        method:"PATCH",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({data:fields}),
      });
      fetchValidation(year);
      setSaveState("saved");
      setTimeout(()=>setSaveState(s=>s==="saved"?"idle":s),1500);
      setLsbResult(null);
    }catch(e){alert(e.message);}
  };

  const autoDetectInsurance=async()=>{
    if(!decl||autoDetecting)return;
    setAutoDetecting(true);
    try{
      const r=await _authFetch(API+"/steuer/declaration/"+year+"/autodetect-insurance",{method:"POST"});
      if(r.ok){
        const j=await r.json();
        const detected=j.detected||{};
        const keys=Object.keys(detected);
        if(keys.length===0){
          alert(tr("Keine Versicherungs-Belege gefunden — bitte manuell eingeben.",
                   "No insurance receipts found — please enter manually.",
                   "Sigorta belgesi bulunamadı — elle gir."));
        }else{
          const msg=tr("Folgende Beträge erkannt:","Detected amounts:","Tespit edilen tutarlar:")+
                    "\\n"+keys.map(k=>k+": "+detected[k]+" €").join("\\n")+
                    "\\n\\n"+tr("Übernehmen?","Apply?","Uygulansın mı?");
          if(confirm(msg)){
            // Merge into current data
            const newData={...(decl.data||{}),...detected};
            setDecl({...decl,data:newData});
            // Patch all at once
            await _authFetch(API+"/steuer/declaration/"+year,{
              method:"PATCH",headers:{"Content-Type":"application/json"},
              body:JSON.stringify({data:detected}),
            });
            fetchValidation(year);
            setSaveState("saved");
            setTimeout(()=>setSaveState(s=>s==="saved"?"idle":s),1500);
          }
        }
      }
    }catch(e){alert(e.message);}
    setAutoDetecting(false);
  };

  const load=async(yr=year)=>{
    setLoading(true);setErr("");setErrors({});setLocked(null);
    try{
      const sr=await fetch(API+"/steuer/declaration/schema");
      const sd=await sr.json();
      if(sr.ok){setSchema(sd.sections||[]);setExpenseGuide(sd.expense_guide||[]);}
      const r=await _authFetch(API+"/steuer/declaration/"+yr);
      if(r.status===402){
        // Premium feature — kullanıcı plan'ı yeterli değil
        try{const j=await r.json();setLocked(j.detail||{});}catch(e){setLocked({});}
      }else if(r.status===404){setDecl(null);}
      else if(r.ok){
        const d=await r.json();
        setDecl(d);
        // İlk yüklendiğinde validation + canlı vergi hesabı çek
        fetchValidation(yr);
        fetchCalc(yr);
      }else{setErr("Fehler beim Laden");}
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  useEffect(()=>{setStep(0);load(year);/* eslint-disable-line */},[year]);

  const fetchValidation=async(yr=year)=>{
    try{
      const r=await _authFetch(API+"/steuer/declaration/"+yr+"/validate");
      if(r.ok){
        const v=await r.json();
        setErrors(v.errors||{});
      }
    }catch(e){}
  };

  const fetchCalc=async(yr=year)=>{
    try{
      const r=await _authFetch(API+"/steuer/declaration/"+yr+"/calc");
      if(r.ok){setCalc(await r.json());}
    }catch(e){}
  };

  // Debounced calc refresh — kullanıcı her değişiklikten 800ms sonra
  const scheduleCalcRefresh=()=>{
    if(calcTimerRef.current)clearTimeout(calcTimerRef.current);
    calcTimerRef.current=setTimeout(()=>fetchCalc(year),800);
  };

  const create=async()=>{
    setSaving(true);setErr("");
    try{
      const r=await _authFetch(API+"/steuer/declaration/"+year,{method:"POST"});
      if(r.ok){setDecl(await r.json());fetchValidation(year);}
      else{const e=await r.json();setErr(e.detail||"Erstellung fehlgeschlagen");}
    }catch(e){setErr(e.message);}
    setSaving(false);
  };

  const copyFromPrevYear=async()=>{
    setSaving(true);setErr("");
    try{
      const r=await _authFetch(API+"/steuer/declaration/"+year+"/copy-from/"+(year-1),{method:"POST"});
      if(r.ok){setDecl(await r.json());fetchValidation(year);}
      else{
        const e=await r.json();
        if(r.status===404)alert(tr("Keine Erklärung für ","No declaration for ","Önceki yıl beyannamesi yok: ")+(year-1));
        else setErr(e.detail||"Carry-forward fehlgeschlagen");
      }
    }catch(e){setErr(e.message);}
    setSaving(false);
  };

  const updateField=(key,value)=>{
    if(!decl)return;
    const newData={...(decl.data||{}),[key]:value};
    setDecl({...decl,data:newData});
    // Debounce: kullanıcı yazarken bekle, son tuştan 600ms sonra kaydet
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setSaveState("saving");
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const r=await _authFetch(API+"/steuer/declaration/"+year,{
          method:"PATCH",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({data:{[key]:value}}),
        });
        if(r.ok){
          setSaveState("saved");
          setTimeout(()=>setSaveState(s=>s==="saved"?"idle":s),1500);
          fetchValidation(year);
          scheduleCalcRefresh();
        }else{setSaveState("error");}
      }catch(e){setSaveState("error");}
    },600);
  };

  const downloadPDF=()=>{
    window.open(API+"/steuer/declaration/"+year+"/pdf?_t="+Date.now(),"_blank");
  };

  const downloadXML=()=>{
    window.open(API+"/steuer/declaration/"+year+"/xml?_t="+Date.now(),"_blank");
  };

  const downloadBundle=()=>{
    window.open(API+"/steuer/declaration/"+year+"/bundle?_t="+Date.now(),"_blank");
  };

  const SaveBadge=()=>{
    if(saveState==="saving")return<span style={{color:"#f59e0b",fontSize:12}}>● {tr("Speichern…","Saving…","Kaydediliyor…")}</span>;
    if(saveState==="saved")return<span style={{color:"#10b981",fontSize:12}}>✓ {tr("Gespeichert","Saved","Kaydedildi")}</span>;
    if(saveState==="error")return<span style={{color:"#ef4444",fontSize:12}}>⚠ {tr("Fehler","Error","Hata")}</span>;
    return null;
  };

  if(loading)return<div style={{padding:24,color:"var(--text-muted)"}}>{tr("Lädt…","Loading…","Yükleniyor…")}</div>;

  if(locked!==null){
    const currentPlan=locked.current_plan||"free";
    const planNames={free:"Free",early:"Early",starter:"Starter",pro:"Pro",ai_steuer:"AI Steuer",premium:"Premium"};
    return(<div style={{padding:"40px 20px",maxWidth:720,margin:"0 auto"}}>
      <div style={{background:"linear-gradient(135deg,rgba(139,92,246,0.10),rgba(99,102,241,0.05))",border:"1px solid rgba(139,92,246,0.3)",borderRadius:16,padding:"36px 28px",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:16}}>🔒</div>
        <h1 style={{margin:"0 0 12px",fontSize:24,fontWeight:800,color:"var(--text)"}}>
          {tr("Steuererklärung — Premium-Funktion","Steuererklärung — Premium feature","Vergi Beyannamesi — Premium özellik")}
        </h1>
        <p style={{margin:"0 0 24px",color:"var(--text-muted)",fontSize:15,lineHeight:1.6,maxWidth:520,marginLeft:"auto",marginRight:"auto"}}>
          {tr(
            "Die automatische Erstellung der Einkommensteuererklärung ist in den Plänen Starter und höher enthalten. Dein aktueller Plan: ",
            "Automatic preparation of the income tax return is included in Starter and higher plans. Your current plan: ",
            "Otomatik gelir vergisi beyannamesi Starter ve üstü planlarda dahildir. Mevcut planın: "
          )}
          <strong>{planNames[currentPlan]||currentPlan}</strong>
        </p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:28,maxWidth:520,margin:"0 auto 28px"}}>
          {[
            {key:"starter",name:"Starter",price:"€15/Monat",hl:"⭐ "+tr("Beliebt","Popular","Popüler")},
            {key:"pro",name:"Pro",price:"€39/Monat",hl:tr("+ KI-Analyse","+ AI Analysis","+ Akıllı Analiz")},
            {key:"ai_steuer",name:"AI Steuer",price:"€89/Monat",hl:tr("+ Steuer-Chat","+ Tax Chat","+ Vergi Chat")},
          ].map(p=>(
            <div key={p.key} style={{padding:14,background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,textAlign:"left"}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--accent)",marginBottom:4}}>{p.name}</div>
              <div style={{fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:4}}>{p.price}</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>{p.hl}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>{window.location.hash="#pricing";if(typeof setPage==="function")setPage("pricing");else window.location.reload();}} style={{padding:"14px 28px",background:"linear-gradient(135deg,#8b5cf6,#6366f1)",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 8px 20px rgba(139,92,246,0.3)"}}>
            🚀 {tr("Jetzt upgraden","Upgrade now","Şimdi yükselt")}
          </button>
          <a href="#pricing" onClick={e=>{e.preventDefault();window.location.hash="#pricing";}} style={{padding:"14px 24px",background:"transparent",color:"var(--text-muted)",border:"1px solid var(--border)",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",textDecoration:"none",display:"inline-flex",alignItems:"center"}}>
            {tr("Pläne vergleichen","Compare plans","Planları karşılaştır")} →
          </a>
        </div>
        <div style={{marginTop:24,padding:14,background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:8,fontSize:13,color:"var(--text-muted)"}}>
          💡 {tr(
            "Mit jedem bezahlten Plan: Mantelbogen + Anlage S + Anlage Vorsorgeaufwand, automatische Auffüllung aus deinen Belegen, PDF-Export für ELSTER.",
            "With any paid plan: Main form + Anlage S + Anlage Vorsorgeaufwand, auto-fill from your receipts, PDF export for ELSTER.",
            "Her ücretli planda: Ana form + Anlage S + Vorsorge, belgelerinden otomatik dolum, ELSTER için PDF dışa aktarım."
          )}
        </div>
      </div>
    </div>);
  }

  const errorCount=Object.keys(errors).length;

  // — Assistent (WISO-Stil): ein Abschnitt pro Schritt, letzter Schritt = Abschluss/Export —
  const wizSections=(decl&&schema)?schema:[];
  const wizTotal=wizSections.length+1;                 // +1 für Abschluss-Schritt
  const curStep=Math.max(0,Math.min(step,wizSections.length));
  const isReview=curStep>=wizSections.length;          // letzter Schritt
  const curSection=isReview?null:wizSections[curStep];
  const goNext=()=>setStep(s=>Math.min(s+1,wizSections.length));
  const goPrev=()=>setStep(s=>Math.max(s-1,0));
  const secTitle=(s)=>s?(_l==="tr"?s.title_tr:s.title_de):tr("Abschluss & Export","Finish & Export","Bitir & Dışa Aktar");

  return(<div style={{padding:M.pad,maxWidth:900,margin:"0 auto"}}>
    <div style={{marginBottom:isMobile?16:24,display:"flex",flexWrap:"wrap",alignItems:"flex-start",gap:12,justifyContent:"space-between"}}>
      <div style={{flex:"1 1 240px",minWidth:0}}>
        <h1 style={{margin:"0 0 6px",fontSize:M.h1,fontWeight:800,wordBreak:"break-word"}}>🧾 {tr("Steuererklärung","Tax Return","Vergi Beyannamesi")} {year}</h1>
        <p style={{margin:0,color:"var(--text-muted)",fontSize:isMobile?13:14,lineHeight:1.5}}>
          {tr(
            "Mantelbogen + Anlage S + Vorsorge. Auto-fill aus Belegen. PDF für ELSTER.",
            "Main form + Anlage S + Vorsorge. Auto-fill from receipts. PDF for ELSTER.",
            "Ana form + Anlage S + Vorsorge. Belgelerden otomatik dolum. ELSTER için PDF."
          )}
        </p>
      </div>
      <div style={{display:"flex",flexDirection:isMobile?"row":"column",gap:8,alignItems:isMobile?"center":"flex-end",flexWrap:"wrap"}}>
        <select value={year} onChange={e=>setYear(parseInt(e.target.value,10))} style={{padding:isMobile?"10px 14px":"8px 14px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:M.inputSize,fontWeight:600,minHeight:isMobile?44:"auto"}}>
          {[2024,2025,2026].filter(y=>y<=CURRENT_YEAR).map(y=><option key={y} value={y}>{tr("Jahr","Year","Yıl")} {y}</option>)}
        </select>
        <SaveBadge/>
      </div>
    </div>

    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
      <button onClick={()=>setShowExpenseGuide(true)} style={{padding:"10px 16px",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
        💡 {tr("Wo gehören meine Belege hin?","Where do my receipts go?","Belgelerim nereye gider?")}
      </button>
      <button onClick={()=>{setAskField({key:"_general",label:tr("Allgemeine Steuerfrage","General tax question","Genel vergi sorusu")});setAskQuestion("");setAskAnswer("");}} style={{padding:"10px 16px",background:"linear-gradient(135deg,#8b5cf6,#6366f1)",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
        🤖 {tr("KI-Steuerassistent","AI Tax Assistant","KI Vergi Asistanı")}
      </button>
    </div>

    <div style={{marginBottom:16,padding:"8px 12px",background:"rgba(245,158,11,0.10)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,fontSize:12,color:"#f59e0b"}}>
      ⚠️ {tr("Beta — bitte vor Übermittlung an ELSTER prüfen.","Beta — please verify before submitting to ELSTER.","Beta — ELSTER'e göndermeden önce kontrol edin.")}
    </div>

    {decl && <div style={{marginBottom:18}}>
      <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:6,WebkitOverflowScrolling:"touch"}}>
        {Array.from({length:wizTotal}).map((_,i)=>{
          const done=i<curStep, active=i===curStep, isLast=i===wizSections.length;
          return(<button key={i} onClick={()=>setStep(i)} title={secTitle(wizSections[i])}
            style={{flexShrink:0,width:active?46:40,height:active?46:40,borderRadius:14,cursor:"pointer",
              border:active?"2px solid var(--accent)":"1.5px solid var(--border)",
              background:done?"linear-gradient(135deg,#10b981,#059669)":active?"var(--accent)":"var(--card)",
              color:(done||active)?"#fff":"var(--text-muted)",fontSize:16,fontWeight:800,
              display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",
              boxShadow:active?"0 4px 14px rgba(99,102,241,0.35)":"none"}}>
            {done?"✓":(isLast?"★":i+1)}
          </button>);
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
        <div style={{fontSize:isMobile?20:24,fontWeight:800,color:"var(--text)",lineHeight:1.2}}>{secTitle(curSection)}</div>
        <div style={{fontSize:13,color:"var(--text-muted)",fontWeight:600,whiteSpace:"nowrap"}}>{tr("Schritt","Step","Adım")} {curStep+1} / {wizTotal}</div>
      </div>
    </div>}

    {err && <div style={{padding:12,background:"rgba(239,68,68,0.10)",border:"1px solid #ef4444",borderRadius:8,color:"#ef4444",marginBottom:16,fontSize:13}}>{err}</div>}

    {!decl && <div style={{textAlign:"center",padding:"60px 20px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:12}}>
      <div style={{fontSize:48,marginBottom:16}}>📋</div>
      <h3 style={{margin:"0 0 8px",fontSize:18}}>{tr("Noch keine Erklärung","No declaration yet","Henüz beyanname yok")} {year}</h3>
      <p style={{margin:"0 0 20px",color:"var(--text-muted)",fontSize:14}}>
        {tr("Wir erstellen einen Entwurf und füllen Felder aus deinen Daten automatisch aus.",
            "We'll create a draft and auto-fill fields from your data.",
            "Bir taslak oluşturup verilerinizden alanları otomatik dolduracağız.")}
      </p>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={create} disabled={saving} style={{padding:isMobile?"14px 28px":"12px 28px",background:saving?"#444":"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:10,fontWeight:600,fontSize:M.btnSize+1,cursor:saving?"wait":"pointer",minHeight:isMobile?48:"auto"}}>
          {saving?tr("Erstelle…","Creating…","Oluşturuluyor…"):tr("Neuen Entwurf erstellen","Create new draft","Yeni taslak oluştur")}
        </button>
        {year>2024 && <button onClick={copyFromPrevYear} disabled={saving} style={{padding:isMobile?"14px 28px":"12px 28px",background:saving?"#444":"linear-gradient(135deg,#8b5cf6,#6366f1)",color:"#fff",border:"none",borderRadius:10,fontWeight:600,fontSize:M.btnSize+1,cursor:saving?"wait":"pointer",minHeight:isMobile?48:"auto"}}>
          📋 {tr("Aus","From","")} {year-1} {tr("übernehmen","carry over","verisini al")}
        </button>}
      </div>
      {year>2024 && <p style={{margin:"16px auto 0",color:"var(--text-dim)",fontSize:12,maxWidth:480}}>
        {tr("Mit 'übernehmen' kopieren wir persönliche Daten + Adresse + Bank aus deiner Vorjahres-Erklärung. Einkommen + Vorsorge wird neu erfasst.",
            "Carry-over copies personal data + address + bank from prior year. Income + insurance is collected fresh.",
            "Devral kişisel veri + adres + banka önceki yıldan. Gelir + sigortalar baştan toplanır.")}
      </p>}
    </div>}

    {decl && errorCount>0 && <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,marginBottom:16,fontSize:13,color:"#ef4444"}}>
      ⚠ {errorCount} {tr("Felder benötigen Aufmerksamkeit","fields need attention","alan dikkat gerektiriyor")}
    </div>}

    {/* Live-Ergebnis: jetzt als Sticky-Leiste am Seitenende (siehe unten) */}

    {decl && (()=>{
      const eigGdb=parseInt((decl.data||{}).eigene_gdb||0,10);
      const eigMerk=((decl.data||{}).eigene_merkmal||"").toUpperCase();
      const pbTable={20:384,30:620,40:860,50:1140,60:1440,70:1780,80:2120,90:2460,100:2840};
      const erhoeht=["H","BL","TBL"].includes(eigMerk);
      const pb=erhoeht?7400:(eigGdb?pbTable[Math.floor(eigGdb/10)*10]||0:0);
      if(pb===0)return null;
      return(<div style={{padding:"12px 16px",background:"rgba(16,185,129,0.10)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:8,marginBottom:16,fontSize:13,color:"#10b981",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          ♿ <strong>{tr("Behindertenpauschbetrag (§ 33b EStG)","Disability flat tax allowance","Engellilik sabit tazminat")}:</strong>
          {" "}

// Kasa MVP (Sprint 3 W2) — capture-first upload → processing → traffic-light preview → confirm/discard.
function KasseUploadView({onDone,onCancel}){
  const [phase,setPhase]=React.useState("pick"); // pick | processing | preview | error | batch
  const [res,setRes]=React.useState(null);
  const [ed,setEd]=React.useState(null);
  const [busy,setBusy]=React.useState(false);
  const [errMsg,setErrMsg]=React.useState("");
  const lang=getLang();
  const t3=(de,tr,en)=>lang==="tr"?tr:(lang==="en"?en:de);
  const eur=(n)=>((n||0).toLocaleString(lang==="en"?"en-US":"de-DE",{minimumFractionDigits:2,maximumFractionDigits:2}))+" €";
  const fileRef=React.useRef(null);
  const batchRef=React.useRef(null);
  const batchEndRef=React.useRef(null);
  const [batchItems,setBatchItems]=React.useState([]);
  const [batchDone,setBatchDone]=React.useState(false);
  const fmtDate=(s)=>{if(!s)return "—";const p=String(s).slice(0,10).split("-");return p.length===3?p[2]+"."+p[1]+"."+p[0]:s;};
  const lights={auto:{c:"#10b981",t:t3("Bereit","Hazır","Ready")},review:{c:"#f59e0b",t:t3("Bitte prüfen","Lütfen kontrol et","Please review")},manual:{c:"#ef4444",t:t3("Achtung","Dikkat","Needs attention")}};
  React.useEffect(()=>{ if(phase==="batch"&&batchEndRef.current){try{batchEndRef.current.scrollIntoView({behavior:"smooth",block:"end"});}catch(e){}} },[batchItems,phase]);
  async function handleFile(e){
    const f=e.target.files&&e.target.files[0];
    if(f&&e.target)e.target.value="";  // allow re-selecting the same file after retry
    if(!f)return;
    if(f.size>10*1024*1024){ setErrMsg(t3("Datei zu groß (max. 10 MB). Bitte näher/kleiner fotografieren.","Dosya çok büyük (maks. 10 MB). Daha yakın/küçük çek.","File too large (max 10 MB).")); setPhase("error"); return; }
    setErrMsg(""); setPhase("processing");
    try{
      const fd=new FormData(); fd.append("file",f); fd.append("doc_kind","auto");
      const r=await fetch(API+"/kasse/upload",{method:"POST",headers:{"Authorization":"Bearer "+localStorage.getItem("atx_token")},body:fd});
      if(!r.ok){
        if(r.status===413)setErrMsg(t3("Datei zu groß (max. 10 MB).","Dosya çok büyük (maks. 10 MB).","File too large (max 10 MB)."));
        else if(r.status===401)setErrMsg(t3("Sitzung abgelaufen — bitte neu anmelden.","Oturum doldu — tekrar giriş yap.","Session expired — please log in again."));
        else setErrMsg(t3("Hochladen fehlgeschlagen. Bitte erneut versuchen.","Yükleme başarısız. Tekrar dene.","Upload failed. Please try again."));
        setPhase("error"); return;
      }
      const data=await r.json(); const en=data.entry||{};
      setRes(data); setEd({description:en.description||"",gross:String(en.gross_amount||0),entry_type:en.entry_type||"expense"});
      setPhase("preview");
    }catch(err){ setErrMsg(t3("Keine Verbindung. Bitte Internet prüfen.","Bağlantı yok. İnterneti kontrol et.","No connection. Check your internet.")); setPhase("error"); }
  }
  async function handleBatch(e){
    const inp=e.target;
    let files=(inp&&inp.files)?Array.from(inp.files):[];  // snapshot BEFORE clearing
    if(inp)inp.value="";
    if(!files.length)return;
    // Expand any .zip in the browser (JSZip) so EACH receipt shows live progress
    const expanded=[];
    for(const f of files){
      const isZip=/\.zip$/i.test(f.name||"")||/zip/i.test(f.type||"");
      if(isZip&&window.JSZip){
        try{
          const zip=await window.JSZip.loadAsync(f);
          const names=Object.keys(zip.files).filter(n=>!zip.files[n].dir&&/\.(jpe?g|png|webp|gif|pdf)$/i.test(n)&&!/^__macosx/i.test(n));
          for(const n of names){
            const blob=await zip.files[n].async("blob");
            const ct=/\.pdf$/i.test(n)?"application/pdf":"image/jpeg";
            expanded.push(new File([blob],(n.split("/").pop()||"beleg"),{type:ct}));
          }
        }catch(x){ /* bad/encrypted zip — skip */ }
      }else{ expanded.push(f); }
    }
    if(!expanded.length){ setErrMsg(t3("Keine gültigen Dateien (Bilder/PDF/ZIP).","Geçerli dosya yok (resim/PDF/ZIP).","No valid files (images/PDF/ZIP).")); setPhase("error"); return; }
    setBatchItems(expanded.map(f=>({name:f.name||"Beleg",status:"pending",label:""})));
    setBatchDone(false); setErrMsg(""); setPhase("batch");
    for(let i=0;i<expanded.length;i++){
      setBatchItems(prev=>prev.map((it,idx)=>idx===i?{...it,status:"processing"}:it));
      try{
        const fd=new FormData(); fd.append("file",expanded[i]); fd.append("doc_kind","auto");
        const r=await fetch(API+"/kasse/upload",{method:"POST",headers:{"Authorization":"Bearer "+localStorage.getItem("atx_token")},body:fd});
        if(r.ok){
          const d=await r.json(); const en=d.entry||{};
          const lbl=(en.description||"—")+" · "+eur(en.gross_amount||0);
          setBatchItems(prev=>prev.map((it,idx)=>idx===i?{...it,status:"done",label:lbl}:it));
        }else{
          setBatchItems(prev=>prev.map((it,idx)=>idx===i?{...it,status:"error",label:(r.status===401?t3("Sitzung abgelaufen","Oturum doldu","Session expired"):t3("Fehler","Hata","Error"))}:it));
        }
      }catch(x){
        setBatchItems(prev=>prev.map((it,idx)=>idx===i?{...it,status:"error",label:t3("Keine Verbindung","Bağlantı yok","No connection")}:it));
      }
    }
    setBatchDone(true);
  }
  async function confirm(){
    if(!res||busy)return; setBusy(true);
    try{
      const o=res.entry, body={};
      if(ed){
        if(ed.description!==o.description)body.description=ed.description;
        if(parseFloat(ed.gross)!==o.gross_amount)body.gross_amount=parseFloat(ed.gross);
        if(ed.entry_type!==o.entry_type)body.entry_type=ed.entry_type;
      }
      if(Object.keys(body).length)await api("/kasse/entry/"+o.id,{method:"PATCH",body:JSON.stringify(body)});
      await api("/kasse/entry/"+o.id+"/confirm",{method:"POST"});
      onDone&&onDone();
    }catch(e){ setBusy(false); }
  }
  async function discard(){
    if(!res||busy)return; setBusy(true);
    try{ await api("/kassenbuch/"+res.entry.id,{method:"DELETE"}); }catch(e){}
    onDone&&onDone();
  }
  const wrap={maxWidth:520,margin:"0 auto",padding:"20px 16px"};
  if(phase==="pick")return (<div style={wrap}>
    <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>{t3("Beleg fotografieren","Fiş çek","Photograph receipt")}</div>
    <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:20}}>{t3("Foto → Prüfen → Fertig.","Foto → Kontrol → Bitti.","Photo → Review → Done.")}</div>
    <input ref={fileRef} type="file" accept="image/*,application/pdf" capture="environment" style={{display:"none"}} onChange={handleFile}/>
    <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{fontSize:18,fontWeight:700,padding:"18px 24px",width:"100%",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:14,cursor:"pointer"}}>📷 {t3("Kamera / Galerie","Kamera / Galeri","Camera / Gallery")}</button>
    <input ref={batchRef} type="file" accept="image/*,application/pdf,.zip,application/zip" multiple style={{display:"none"}} onChange={handleBatch}/>
    <button onClick={()=>batchRef.current&&batchRef.current.click()} style={{marginTop:12,fontSize:15,fontWeight:700,padding:"14px 24px",width:"100%",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",cursor:"pointer"}}>🗂 {t3("Mehrere Belege / ZIP","Toplu yükle / ZIP","Multiple / ZIP")}</button>
    <button onClick={()=>onCancel&&onCancel()} style={{marginTop:14,padding:"10px",width:"100%",background:"transparent",color:"var(--text-muted)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer"}}>{t3("Abbrechen","Vazgeç","Cancel")}</button>
  </div>);
  if(phase==="processing")return (<div style={{...wrap,textAlign:"center",paddingTop:60}}>
    <div style={{fontSize:32,marginBottom:12}}>⟳</div>
    <div style={{fontWeight:700}}>{t3("Wird analysiert…","Analiz ediliyor…","Analyzing…")}</div>
    <div style={{fontSize:13,color:"var(--text-muted)",marginTop:8}}>{t3("Kann ein paar Sekunden dauern.","Birkaç saniye sürebilir.","May take a few seconds.")}</div>
  </div>);
  if(phase==="batch"){
    const _done=batchItems.filter(x=>x.status==="done").length;
    const _err=batchItems.filter(x=>x.status==="error").length;
    return (<div style={wrap}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{t3("Belege werden erfasst","Fişler işleniyor","Processing receipts")}</div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:12}}>{_done}/{batchItems.length} {t3("fertig","tamam","done")}{_err?(" · "+_err+" "+t3("Fehler","hata","errors")):""}</div>
      <div style={{maxHeight:380,overflowY:"auto",border:"1px solid var(--border)",borderRadius:10,padding:"4px 4px"}}>
        {batchItems.map((it,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 8px",borderBottom:i<batchItems.length-1?"1px solid var(--border)":"none"}}>
            <span style={{fontSize:16,width:22,textAlign:"center"}}>{it.status==="done"?"✅":it.status==="processing"?"⏳":it.status==="error"?"⚠️":"•"}</span>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.name}</div>
              <div style={{fontSize:12,color:it.status==="error"?"#ef4444":"var(--text-muted)"}}>{it.status==="processing"?t3("wird gelesen…","okunuyor…","reading…"):(it.status==="pending"?t3("wartet","sırada","waiting"):it.label)}</div>
            </div>
          </div>
        ))}
        <div ref={batchEndRef}></div>
      </div>
      {batchDone?<button onClick={()=>onDone&&onDone()} style={{marginTop:16,padding:"14px",width:"100%",fontWeight:700,background:"#10b981",color:"#fff",border:"none",borderRadius:12,cursor:"pointer"}}>✓ {t3("Fertig — zu den Einträgen","Bitti — kayıtlara git","Done — to entries")}</button>:
        <div style={{marginTop:14,fontSize:13,color:"var(--text-muted)",textAlign:"center"}}>⟳ {t3("Bitte warten…","Lütfen bekle…","Please wait…")}</div>}
    </div>);
  }
  if(phase==="error")return (<div style={{...wrap,textAlign:"center"}}>
    <div style={{fontSize:28,marginBottom:8}}>⚠️</div>
    <div style={{color:"#ef4444",fontWeight:700,marginBottom:8}}>{errMsg||t3("Hochladen fehlgeschlagen","Yükleme başarısız","Upload failed")}</div>
    <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>{t3("Es wurde nichts gespeichert.","Hiçbir şey kaydedilmedi.","Nothing was saved.")}</div>
    <button onClick={()=>{setErrMsg("");setPhase("pick");}} style={{padding:"12px 20px",fontWeight:700,background:"var(--accent)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>{t3("Erneut versuchen","Tekrar dene","Try again")}</button>
    <button onClick={()=>onCancel&&onCancel()} style={{marginLeft:10,padding:"12px 20px",background:"transparent",color:"var(--text-muted)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer"}}>{t3("Abbrechen","Vazgeç","Cancel")}</button>
  </div>);
  // preview — editable review (W3)
  const e=(res&&res.entry)||{};
  const band=e.band||"review";
  const liShow=lights[band]||lights.review;
  const cur=ed||{description:e.description||"",gross:String(e.gross_amount||0),entry_type:e.entry_type||"expense"};
  const changed=ed&&(ed.description!==e.description||parseFloat(ed.gross)!==e.gross_amount||ed.entry_type!==e.entry_type);
  const inp={width:"100%",padding:"10px",fontSize:16,border:"1px solid var(--border)",borderRadius:8,background:"var(--card)",color:"var(--text)",boxSizing:"border-box"};
  return (<div style={wrap}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>

function _kbBack(onBack,title){

async function _openDoc(id){
  // Open the tab SYNCHRONOUSLY on the click (preserves the user gesture so popup
  // blockers don't kill it), then point it at the fetched blob once it arrives.
  const w=window.open("","_blank");
  try{
    const r=await fetch(API+"/kasse/document/"+id,{headers:{"Authorization":"Bearer "+localStorage.getItem("atx_token")}});
    if(r.ok){const b=await r.blob();const u=URL.createObjectURL(b);if(w){w.location=u;}else{window.location=u;}}
    else if(w){w.document.write("Dokument konnte nicht geladen werden.");}
  }catch(x){if(w){w.close();}}
}
