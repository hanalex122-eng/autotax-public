/* ══════════════════════════════════════════
   Resilience layer — kept self-contained so the OCR pipeline keeps working
   even if the backend returns object-shaped error bodies, hits 429, etc.
   ══════════════════════════════════════════ */
function _extractErr(d){
  if(d==null) return "Fehler";
  if(typeof d==="string") return d;
  if(typeof d.detail==="string") return d.detail;
  if(d.detail && typeof d.detail==="object") return d.detail.error||d.detail.message||d.detail.detail||"Fehler";
  if(typeof d.error==="string") return d.error;
  if(typeof d.message==="string") return d.message;
  try{ return JSON.stringify(d); }catch(e){ return "Fehler"; }
}
function _safeMsg(v){
  if(v==null) return "";
  if(typeof v==="string") return v;
  if(typeof v==="number"||typeof v==="boolean") return String(v);
  return _extractErr(v);
}
window._extractErr=_extractErr;
window._safeMsg=_safeMsg;

class ErrorBoundary extends React.Component {
  constructor(p){super(p); this.state={hasError:false,msg:""};}
  static getDerivedStateFromError(err){return{hasError:true,msg:err&&err.message?err.message:String(err)};}
  componentDidCatch(err,info){try{console.error("ErrorBoundary:",err,info);}catch(e){}}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:24,maxWidth:560,margin:"40px auto",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",fontFamily:"DM Sans, system-ui, sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}},
        React.createElement("h2",{style:{margin:"0 0 8px",color:"#ef4444",fontSize:20}},"Anzeige-Fehler"),
        React.createElement("p",{style:{margin:"0 0 16px",color:"var(--text-muted)",fontSize:14,lineHeight:1.5}},"Die Seite konnte nicht angezeigt werden. Ihre Daten sind sicher."),
        React.createElement("p",{style:{margin:"0 0 16px",color:"var(--text-dim)",fontSize:12,fontFamily:"monospace",background:"rgba(239,68,68,0.08)",padding:8,borderRadius:6,wordBreak:"break-word"}}, this.state.msg||"Unbekannter Fehler"),
        React.createElement("button",{onClick:()=>window.location.reload(),style:{padding:"10px 20px",background:"#10b981",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:14}},"🔄 Seite neu laden")
      );
    }
    return this.props.children;
  }
}
window._ErrorBoundary=ErrorBoundary;

/* Smart fetch with 429 backoff — wraps a single request, returns Response.
   Honors Retry-After header (seconds). Up to maxRetries attempts.
   onWait(ms, attempt) is called before each wait so UI can show countdown. */
async function _fetchWithBackoff(url, opts, onWait, maxRetries){
  const max = (typeof maxRetries==="number")?maxRetries:3;
  let attempt=0;
  while(true){
    const res = await fetch(url, opts);
    if(res.status!==429 || attempt>=max) return res;
    let waitSec=0;
    const ra=res.headers.get("Retry-After");
    if(ra && !isNaN(parseInt(ra,10))) waitSec=parseInt(ra,10);
    if(!waitSec) waitSec = Math.min(60, 15*Math.pow(2,attempt)); // 15s, 30s, 60s
    if(typeof onWait==="function") try{ onWait(waitSec*1000, attempt+1); }catch(e){}
    await new Promise(r=>setTimeout(r, waitSec*1000));
    attempt++;
  }
}
window._fetchWithBackoff=_fetchWithBackoff;

/* Authed fetch — wraps fetch() with auto-refresh on 401. Returns Response.
   If refresh fails, removes tokens and reloads (forces re-login). Use for
   any endpoint that needs the Authorization header. */
async function _authFetch(url, opts){
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  const tk = localStorage.getItem("atx_token");
  if(tk) headers["Authorization"] = "Bearer " + tk;
  // Advisor mode — view another user's data via X-Acting-Client-Id.
  // Stored in localStorage so a hard refresh keeps the active mandate.
  const acting = localStorage.getItem("atx_acting_client_id");
  if(acting && !headers["X-Acting-Client-Id"]) headers["X-Acting-Client-Id"] = acting;
  let res = await fetch(url, Object.assign({}, opts, {headers}));
  if(res.status !== 401) return res;
  // Try refresh
  const refresh = localStorage.getItem("atx_refresh");
  if(!refresh){
    localStorage.removeItem("atx_token");
    return res;
  }
  try{
    const rr = await fetch((url.startsWith("http")?new URL(url).origin:"") + "/auth/refresh", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({refresh_token: refresh}),
    });
    if(!rr.ok){
      localStorage.removeItem("atx_token");
      localStorage.removeItem("atx_refresh");
      return res;
    }
    const rd = await rr.json();
    if(!rd.token){
      localStorage.removeItem("atx_token");
      localStorage.removeItem("atx_refresh");
      return res;
    }
    localStorage.setItem("atx_token", rd.token);
    if(rd.refresh_token) localStorage.setItem("atx_refresh", rd.refresh_token);
    // Retry the original request with the new token
    headers["Authorization"] = "Bearer " + rd.token;
    return await fetch(url, Object.assign({}, opts, {headers}));
  }catch(e){
    return res;
  }
}
window._authFetch = _authFetch;

// Advisor read-only mode flag — read live from localStorage so we don't
// need to thread state through every component. Returns the scope
// (read | read_export) when acting, or null when the user is the owner.
window._actingScope = () => {
  if (!localStorage.getItem("atx_acting_client_id")) return null;
  return localStorage.getItem("atx_acting_scope") || "read";
};

// Advisor read-only mode flag (read from localStorage on every check)

/* ══════════════════════════════════════════
   FIX #2: Tarih formatı — Avrupa DD.MM.YYYY
   Tüm tarihler artık DD.MM.YYYY olarak gösterilir
   ══════════════════════════════════════════ */
function formatDateEU(dateStr) {
  if (!dateStr) return "—";
  // ISO: YYYY-MM-DD
  const iso = /^(\d{4})-(\d{2})-(\d{2})/;
  const m1 = dateStr.match(iso);
  if (m1) return m1[3] + "." + m1[2] + "." + m1[1];
  // US: MM/DD/YYYY
  const us = /^(\d{1,2})\/(\d{1,2})\/(\d{4})/;
  const m2 = dateStr.match(us);
  if (m2) return m2[2].padStart(2,"0") + "." + m2[1].padStart(2,"0") + "." + m2[3];
  // Already DD.MM.YYYY
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) return dateStr;
  return dateStr;
}

async function api(path, opts={}) {
  const token = localStorage.getItem("atx_token");
  const headers = {"Content-Type":"application/json",...opts.headers};
  if(token) headers["Authorization"]=`Bearer ${token}`;
  // Advisor acting mode — backend endpoint'leri X-Acting-Client-Id header'i ile
  // get_acting_context dependency'sini calistirirsa mandant verilerini doner.
  // _authFetch zaten ekliyordu; api() unutulmus -> advisor'in dashboard'i kendi
  // bos hesabini gosteriyordu. KRITIK BUG.
  const acting = localStorage.getItem("atx_acting_client_id");
  if(acting && !headers["X-Acting-Client-Id"]) headers["X-Acting-Client-Id"] = acting;
  let res = await fetch(`${API}${path}`,{...opts,headers});
  // Auto-refresh on 401
  if(res.status===401){
    const refresh=localStorage.getItem("atx_refresh");
    if(refresh){
      try{
        const r=await fetch(API+"/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:refresh})});
        if(r.ok){
          const d=await r.json();
          localStorage.setItem("atx_token",d.token);
          if(d.refresh_token)localStorage.setItem("atx_refresh",d.refresh_token);
          headers["Authorization"]="Bearer "+d.token;
          res=await fetch(`${API}${path}`,{...opts,headers});
        }else{
          localStorage.removeItem("atx_token");localStorage.removeItem("atx_refresh");throw new Error("unauthorized");
        }
      }catch(e){localStorage.removeItem("atx_token");localStorage.removeItem("atx_refresh");throw new Error("unauthorized");}
    }else{localStorage.removeItem("atx_token");throw new Error("unauthorized");}
  }
  if(!res.ok){const e=await res.json().catch(()=>({}));const msg=typeof e.detail==="string"?e.detail:typeof e.detail==="object"?JSON.stringify(e.detail):e.message||"Error";throw new Error(msg);}
  if(res.status===204) return null;
  return res.json();
}

function Sparkline({data=[],color=theme.accent,h=40,w=120}){
  if(!data.length)return null;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(v/max)*h}`).join(" ");

const downloadPDF=async(id)=>{try{const r=await fetch(API+"/invoices/"+id+"/pdf",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});if(!r.ok){alert("PDF Error");return;}const blob=await r.blob();const url=window.URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Rechnung_"+id+".pdf";a.click();window.URL.revokeObjectURL(url);}catch(e){alert("PDF Download fehlgeschlagen");}};

const downloadBulkPDF=async(ids,showToast)=>{
  if(!ids||ids.length===0)return;
  if(showToast)showToast(ids.length+" PDFs werden heruntergeladen...","info");
  let ok=0,fail=0;
  for(const id of ids){
    try{
      const r=await fetch(API+"/invoices/"+id+"/pdf",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});
      if(!r.ok){fail++;continue;}
      const blob=await r.blob();
      const url=window.URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="Rechnung_"+id+".pdf";a.click();
      window.URL.revokeObjectURL(url);ok++;
      await new Promise(r=>setTimeout(r,300)); // small delay between downloads
    }catch(e){fail++;}
  }
  if(showToast)showToast(ok+" PDF(s) heruntergeladen"+(fail>0?", "+fail+" Error":""),"success");
};

const downloadBulkOriginal=async(ids,invoices,showToast)=>{
  if(!ids||ids.length===0)return;
  const withOriginal=ids.filter(id=>{const inv=invoices.find(i=>i.id===id);return inv&&inv.has_original;});
  if(withOriginal.length===0){if(showToast)showToast("No originals available — PDF only","info");return;}
  if(showToast)showToast(withOriginal.length+" Belege werden heruntergeladen...","info");
  let ok=0;
  for(const id of withOriginal){
    try{
      const inv=invoices.find(i=>i.id===id);
      const r=await fetch(API+"/vault/"+id+"/download",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});
      if(!r.ok)continue;
      const blob=await r.blob();
      const url=window.URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=(inv&&inv.vendor?inv.vendor.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,"_"):"Beleg")+"_"+id+(blob.type.includes("pdf")?".pdf":blob.type.includes("png")?".png":".jpg");a.click();
      window.URL.revokeObjectURL(url);ok++;
      await new Promise(r=>setTimeout(r,300));
    }catch(e){}
  }
  if(showToast)showToast(ok+" Original-Beleg(e) heruntergeladen","success");
};

  const submit=async()=>{
    setError("");setInfo("");

    const realEmail=(emailRef.current?.value||email).trim();

    setEmail(realEmail);setPassword(realPass);setName(realName);

    if(!realEmail||!realPass){setError("Please enter email and password.");return;}
    if(!realEmail.includes("@")){setError("Please enter a valid email address.");return;}
    if(mode==="register"&&!gdpr){setError("Please accept the Privacy Policy.");return;}

    if(mode==="register"&&realPass.length<6){setError("Password must be at least 6 characters.");return;}
    setLoading(true);

        await api("/auth/register",{method:"POST",body:JSON.stringify({email:realEmail,password:realPass,full_name:realName,company_name:regCompany,gdpr_consent:true})});
        setMode("login");setError("");setPassword("");

        console.log("STATUS:",res.status);
        const text=await res.text();
        let data;
        try{data=JSON.parse(text);}catch(e){setError("Invalid response");setLoading(false);return;}
        if(!res.ok){setError(data.detail?.error||data.detail||"Login failed");setLoading(false);return;}
        const token=data.token||data.access_token;
        if(!token){setError("No token");setLoading(false);return;}
        localStorage.setItem("atx_token",token);
        if(data.refresh_token)localStorage.setItem("atx_refresh",data.refresh_token);
        console.log("LOGIN SUCCESS");
        window.location.reload();
      }
    }catch(e){
      const msg=e.message||"";
      if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("ERR_")||msg.includes("Load failed")){
        setError("Server unavailable. Check your connection or try again in 1-2 minutes.");

        setError("Email or password incorrect.");
      }else if(msg.includes("already")||msg.includes("exists")||msg.includes("duplicate")){
        setError("This email is already registered. Please click 'Sign In'.");
      }else if(msg.includes("validation")||msg.includes("422")||msg.includes("value_error")){
        setError("Invalid input. Password: min. 6 chars, 1 uppercase, 1 digit, 1 special char.");
      }else{
        setError(msg||"An error occurred. Please try again.");
      }
    }

  };

function DashboardView({refreshKey,triggerRefresh,onNav}){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[allInv,setAllInv]=useState([]);
  const[me,setMe]=useState(null);
  const[reminders,setReminders]=useState({overdue:null,upcoming:null});
  const[steuer,setSteuer]=useState([]);
  const[mahnungQueue,setMahnungQueue]=useState({count:0,items:[]});
  const load=()=>{
    setLoading(true);
    api("/invoices/dashboard?country=DE").then(setData).catch(()=>{}).finally(()=>setLoading(false));
    api("/invoices?limit=100").then(d=>{setAllInv(d.items||[]);}).catch(()=>{});
    api("/account/me").then(setMe).catch(()=>{});
    Promise.all([
      api("/reminders/overdue").catch(()=>({count:0,total_amount:0,items:[]})),
      api("/reminders/upcoming?days=7").catch(()=>({count:0,items:[]})),
    ]).then(([ov,up])=>setReminders({overdue:ov,upcoming:up}));
    api("/steuer/upcoming").then(d=>setSteuer(d.items||[])).catch(()=>{});
    api("/invoices/mahnung/queue").then(d=>setMahnungQueue({count:d.count||0,items:d.items||[]})).catch(()=>{});
  };
  const sendMahnung=async(invoiceId,withEmail)=>{
    try{
      const d=await api("/invoices/"+invoiceId+"/mahnung/send",{method:"POST",body:JSON.stringify({send_email:withEmail})});
      if(showToast)showToast(`✓ Mahnung Stufe ${d.level} gesendet${d.email_sent?" + E-Mail":""} — PDF wird heruntergeladen`,"success");
      // PDF'i hemen yeni sekmede ac (Token query param ile — yetkisiz indirme yok)
      if(d.pdf_url){
        const tk=localStorage.getItem("atx_token");
        const r=await fetch(API+d.pdf_url,{headers:{Authorization:"Bearer "+tk}});
        if(r.ok){const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Mahnung-${invoiceId}-Stufe${d.level}.pdf`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
      }
      load();
    }catch(e){alert(_extractErr(e)||e.message);}
  };
  useEffect(load,[refreshKey]);

  const resetAll=async()=>{
    if(!confirm("⚠️ WARNING: All invoices and bookkeeping entries will be deleted!\n\nThis action CANNOT be undone.\n\nContinue?")) return;
    if(!confirm(_t("confirm_reset2"))) return;
    try{
      // Use bulk delete for invoices
      const invData=await api("/invoices?limit=500").catch(()=>({items:[]}));
      const allIds=(invData.items||[]).map(i=>i.id);
      let delCount=0;
      if(allIds.length>0){
        // Batch delete in chunks of 50
        for(let i=0;i<allIds.length;i+=50){
          const chunk=allIds.slice(i,i+50);
          try{const r=await api("/invoices/bulk-delete",{method:"POST",body:JSON.stringify({ids:chunk})});delCount+=(r.deleted||0);}catch(e){}
        }
      }
      // Delete remaining cash entries not linked to invoices
      let bkCount=0;
      for(let round=0;round<20;round++){
        const bkData=await api("/bookkeeping?limit=200").catch(()=>({items:[]}));
        const entries=Array.isArray(bkData)?bkData:(bkData.items||[]);
        if(entries.length===0) break;
        let anyDeleted=false;
        for(const e of entries){try{await api("/bookkeeping/"+e.id,{method:"DELETE"});bkCount++;anyDeleted=true;}catch(ex){}}
        if(!anyDeleted) break;
      }
      alert("Reset complete!\n"+delCount+" invoices and "+bkCount+" bookkeeping entries deleted.");
      load();if(triggerRefresh)triggerRefresh();
    }catch(e){alert("Reset error: "+e.message);}
  };

  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:80,color:theme.textMuted,gap:12}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={theme.accent} strokeWidth="2" style={{animation:"spin 1s linear infinite"}}><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg><span>Loading dashboard...</span></div>;
  if(!data)return<div style={{...css.card,maxWidth:400,margin:"60px auto",textAlign:"center",padding:40}}><div style={{fontSize:28,marginBottom:12}}>⚠️</div><div style={{color:theme.text,fontSize:16,fontWeight:600,marginBottom:6}}>Dashboard unavailable</div><div style={{color:theme.textMuted,fontSize:13}}>Data could not be loaded. Please try again.</div><button style={{...css.btn(),marginTop:16}} onClick={load}>⟳ Reload</button></div>;
  const si=(data.monthly_breakdown||[]).map(m=>m.income||0);const se=(data.monthly_breakdown||[]).map(m=>m.expenses||0);
  const readCount=allInv.filter(i=>i.total_amount>0).length;const unreadCount=allInv.filter(i=>!i.total_amount||i.total_amount===0).length;
  const totalPct=allInv.length>0?Math.round((readCount/allInv.length)*100):0;
  return(<div style={{display:"flex",flexDirection:"column",gap:28}}>
    {me?.is_trial && me.trial_days_left !== null && me.trial_days_left <= 14 && <div onClick={()=>onNav&&onNav("pricing")} style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:me.trial_days_left<=3?"rgba(239,68,68,0.08)":"rgba(168,85,247,0.08)",borderRadius:12,border:`1px solid ${me.trial_days_left<=3?"rgba(239,68,68,0.4)":"rgba(168,85,247,0.4)"}`,flexWrap:"wrap",gap:10,boxShadow:me.trial_days_left<=3?"0 0 12px rgba(239,68,68,0.15)":"0 0 12px rgba(168,85,247,0.15)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:24}}>{me.trial_days_left<=3?"⚠️":"🎁"}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:me.trial_days_left<=3?"#ef4444":"#a855f7"}}>
            Pro Testphase: noch {me.trial_days_left} {me.trial_days_left===1?"Tag":"Tage"}
          </div>
          <div style={{fontSize:12,color:theme.textMuted,marginTop:2}}>
            {me.trial_days_left<=3?"Bald läuft die Testphase ab — jetzt upgraden.":"Alle Pro-Funktionen freigeschaltet."}
          </div>
        </div>
      </div>
      <div style={{fontSize:13,fontWeight:600,color:me.trial_days_left<=3?"#ef4444":"#a855f7"}}>Upgrade →</div>
    </div>}
    {me?.trial_expired && me?.plan==="free" && <div onClick={()=>onNav&&onNav("pricing")} style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:"rgba(239,68,68,0.08)",borderRadius:12,border:"1px solid rgba(239,68,68,0.4)",flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:24}}>⏰</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#ef4444"}}>Pro Testphase abgelaufen</div>

        </div>
      </div>
      <div style={{fontSize:13,fontWeight:600,color:"#ef4444"}}>Upgrade →</div>

    {allInv.length === 0 && me && (() => {
      const hasTelegram = !!me.telegram_chat_id;
      const hasCompany = !!(me.company_name && me.company_name.trim());
      const steps = [
        {done: false, icon:"📤", title: getLang()==="de"?"Erste Rechnung hochladen":"Upload first invoice", desc: getLang()==="de"?"Drag & Drop PDF / Foto":"Drag & Drop PDF / photo", action: ()=>onNav&&onNav("upload")},
        {done: hasCompany, icon:"🏢", title: getLang()==="de"?"Firmendaten ergänzen":"Add company info", desc: getLang()==="de"?"Name, USt-IdNr., Adresse":"Name, VAT ID, address", action: ()=>onNav&&onNav("companies")},
        {done: hasTelegram, icon:"📲", title: getLang()==="de"?"Telegram verbinden":"Connect Telegram", desc: getLang()==="de"?"Benachrichtigungen erhalten":"Get notifications", action: ()=>onNav&&onNav("notifications")},
        {done: false, icon:"🖥️", title: getLang()==="de"?"Watcher installieren":"Install Watcher", desc: getLang()==="de"?"Auto-Upload für Scanner":"Auto-upload from scanner", action: ()=>onNav&&onNav("help")},
      ];
      const doneCount = steps.filter(s=>s.done).length;
      return (<div style={{...css.card,padding:"20px 22px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🚀</span>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:theme.text}}>{getLang()==="de"?"Schnellstart":"Quick Start"}</div>
              <div style={{fontSize:12,color:theme.textMuted,marginTop:2}}>{getLang()==="de"?"In 4 Schritten einsatzbereit":"Ready in 4 steps"}</div>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:10}}>

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>

/* ══════════════════════════════════════════
   FIX #2,3,5,6: Rechnungen — Tarih EU, boş fiş uyarısı,

   ══════════════════════════════════════════ */
function InvoicesView({refreshKey,triggerRefresh,showToast,sendOnly}){
  const _sendOnly=!!sendOnly;
  const _isActing=typeof window!=="undefined" && !!localStorage.getItem("atx_acting_client_id");
  const _readOnlyTip=getLang()==="de"?"Lese-Modus — als Steuerberater nicht möglich":"Read-only — not allowed as advisor";
  const[invoices,setInvoices]=useState([]);const[total,setTotal]=useState(0);const[loading,setLoading]=useState(true);
  const _now=new Date();const _today=_now.getFullYear()+"-"+String(_now.getMonth()+1).padStart(2,"0")+"-"+String(_now.getDate()).padStart(2,"0");const _jan1="2020-01-01";
  const[filter,setFilter]=useState("");const[filterCat,setFilterCat]=useState("");const[dateFrom,setDateFrom]=useState(_jan1);const[dateTo,setDateTo]=useState(_today);const[filterStatus,setFilterStatus]=useState("");
  const[editId,setEditId]=useState(null);const[editData,setEditData]=useState({});
  const[selected,setSelected]=useState(new Set());
  const[deleting,setDeleting]=useState(false);
  const[detailInv,setDetailInv]=useState(null);
  const[showCreateInv,setShowCreateInv]=useState(false);
  const[newInv,setNewInv]=useState({kunde:"",betrag:"",mwst_satz:"19%",datum:new Date().toISOString().slice(0,10),rechnung_nr:"",zahlungsart:"",kategorie:"service"});
  const load=(vendorQ,catQ,dfQ,dtQ)=>{
    const params=new URLSearchParams({limit:"500"});
    if(vendorQ)params.set("vendor",vendorQ);
    if(catQ)params.set("category",catQ);
    if(dfQ)params.set("date_from",dfQ);
    if(dtQ)params.set("date_to",dtQ);
    setLoading(true);
    api("/invoices?"+params.toString()).then(d=>{setInvoices(d.items);setTotal(d.total);setSelected(new Set());}).catch(()=>{}).finally(()=>setLoading(false));
  };
  const doSearch=()=>load(filter,filterCat,dateFrom,dateTo);
  const[syncing,setSyncing]=useState(false);
  const syncAll=async()=>{setSyncing(true);try{const r=await api("/bookkeeping/sync-invoices",{method:"POST"});if(showToast)showToast((r.synced||0)+" sync, "+(r.reverse_synced||0)+" synced from cash book","success");doSearch();}catch(e){if(showToast)showToast(_t("sync_failed"),"error");}setSyncing(false);};
  useEffect(()=>{load(filter,filterCat,dateFrom,dateTo);},[refreshKey]);
  useEffect(()=>{
    if(typeof sessionStorage==="undefined")return;
    const hint=sessionStorage.getItem("atx_invoices_status");
    if(hint){setFilterStatus(hint);sessionStorage.removeItem("atx_invoices_status");}
  },[]);
  const del=async(id)=>{
    if(_isActing){if(showToast)showToast(_readOnlyTip,"info");return;}
    if(!confirm(_t("delete_invoice")))return;
    try{await api("/invoices/"+id,{method:"DELETE"});doSearch();if(showToast)showToast(_t("invoice_deleted"),"info");}catch(e){alert(e.message);}
  };

  const deleteSelected=async()=>{
    if(selected.size===0)return;
    if(!confirm(selected.size+t("entries_delete")))return;
    setDeleting(true);
    try{const r=await api("/invoices/bulk-delete",{method:"POST",body:JSON.stringify({ids:[...selected]})});
      if(showToast)showToast((r.deleted||0)+" Invoice(s) deleted","info");
    }catch(e){if(showToast)showToast("Delete failed: "+e.message,"error");}
    setDeleting(false);doSearch();if(triggerRefresh)triggerRefresh();
  };

  // Bulk email — toplu mail gonderme (modal + form)
  const[bulkEmail,setBulkEmail]=useState({open:false,to:"",subject:"",note:"",toAdvisor:false,sending:false});
  const openBulkEmail=()=>{
    if(selected.size===0)return;
    const _l=getLang();
    const defaultSub=_l==="de"?selected.size+" Belege — AutoTax-Cloud":_l==="tr"?selected.size+" Belge — AutoTax-Cloud":selected.size+" Receipts — AutoTax-Cloud";
    setBulkEmail({open:true,to:"",subject:defaultSub,note:"",toAdvisor:false,sending:false});
  };
  const sendBulkEmail=async()=>{
    if(bulkEmail.sending)return;
    const _l=getLang();
    const errTr=(de,en,tr)=>_l==="de"?de:_l==="tr"?tr:en;
    if(!bulkEmail.toAdvisor){
      if(!bulkEmail.to.trim()||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(bulkEmail.to.trim())){
        alert(errTr("Bitte gültige Email-Adresse angeben","Please enter a valid email address","Lütfen geçerli bir e-posta adresi girin"));return;
      }
    }
    setBulkEmail(b=>({...b,sending:true}));
    const _genericFail=errTr("E-Mail-Versand fehlgeschlagen","Email send failed","E-posta gönderimi başarısız");
    try{
      const r=await _authFetch(API+"/invoices/email-bulk",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        invoice_ids:[...selected],
        to:bulkEmail.to.trim(),
        subject:bulkEmail.subject.trim(),
        note:bulkEmail.note.trim(),
        to_advisor:bulkEmail.toAdvisor,
      })});
      // Response'u text olarak oku, JSON parse'i defansif yap (500 HTML/plain text dönerse JSON.parse patlamasin)
      const rawText=await r.text();
      let d=null;
      try{d=rawText?JSON.parse(rawText):null;}catch(_pe){d=null;}
      if(r.ok&&d&&d.success){
        const sent=d.sent||0,failed=(d.failed||[]).length,skipped=(d.skipped||[]).length;
        let msg=errTr(`✓ ${sent} Belege gesendet an ${d.to}`,`✓ ${sent} receipts sent to ${d.to}`,`✓ ${sent} belge ${d.to} adresine gönderildi`);
        if(failed>0||skipped>0)msg+=errTr(` (${failed} fehlgeschlagen, ${skipped} übersprungen)`,` (${failed} failed, ${skipped} skipped)`,` (${failed} başarısız, ${skipped} atlandı)`);

function UploadView({triggerRefresh,onNav,showToast}){
  const[files,setFiles]=useState([]);const[results,setResults]=useState([]);const[uploading,setUploading]=useState(false);const[dragOver,setDragOver]=useState(false);const fileRef=useRef(null);const resultsRef=useRef(null);
  const[invoiceType,setInvoiceType]=useState("expense");
  const uploadBtnRef=useRef(null);
  const addFiles=(nf)=>{const fa=Array.from(nf);setFiles(p=>{const ex=new Set(p.map(f=>f.name+f.size));return[...p,...fa.filter(f=>!ex.has(f.name+f.size))].slice(0,20);});
    // Scroll to upload button so user sees it
    setTimeout(()=>{uploadBtnRef.current?.scrollIntoView({behavior:"smooth",block:"center"});},200);};
  const _refreshToken=async()=>{const refresh=localStorage.getItem("atx_refresh");if(!refresh)return null;try{const r=await fetch(API+"/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:refresh})});if(r.ok){const d=await r.json();localStorage.setItem("atx_token",d.token);if(d.refresh_token)localStorage.setItem("atx_refresh",d.refresh_token);return d.token;}}catch(e){}return null;};
  const _uploadOne=async(f,tk,onWait)=>{const fd=new FormData();fd.append("file",f);fd.append("invoice_type",invoiceType);let res=await _fetchWithBackoff(API+"/invoices/upload",{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd},onWait,3);if(res.status===401){const newTk=await _refreshToken();if(newTk){const fd2=new FormData();fd2.append("file",f);fd2.append("invoice_type",invoiceType);res=await _fetchWithBackoff(API+"/invoices/upload",{method:"POST",headers:{Authorization:"Bearer "+newTk},body:fd2},onWait,3);}}return res;};
  /* --- ADDED START: Async OCR upload with polling --- */
  const _uploadAsync=async(f,tk,onWait)=>{
    const fd=new FormData();fd.append("file",f);fd.append("invoice_type",invoiceType);
    let res=await _fetchWithBackoff(API+"/invoices/upload-async",{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd},onWait,3);
    if(res.status===401){const newTk=await _refreshToken();if(newTk){const fd2=new FormData();fd2.append("file",f);fd2.append("invoice_type",invoiceType);res=await _fetchWithBackoff(API+"/invoices/upload-async",{method:"POST",headers:{Authorization:"Bearer "+newTk},body:fd2},onWait,3);tk=newTk;}}
    if(!res.ok&&res.status>=500)throw new Error("Server error "+res.status);
    const d=await res.json();
    if(d.duplicate&&d.can_force)return{status:"duplicate",data:d};
    if(d.status==="done")return{status:"done",data:d};
    if(d.status==="processing"&&d.id){
      // Poll every 2s, max 30s
      for(let i=0;i<15;i++){
        await new Promise(r=>setTimeout(r,2000));
        try{
          const s=await fetch(API+"/invoices/"+d.id+"/status",{headers:{Authorization:"Bearer "+tk}});
          if(s.ok){const sd=await s.json();if(sd.status==="done")return{status:"done",data:sd};}
        }catch(e){}
      }
      return{status:"timeout",data:d};
    }
    return{status:"error",data:d};
  };
  /* --- ADDED END --- */
  /* --- ADDED START: Async upload flow (uses upload-async + polling) --- */
  const uploadAsync=async()=>{
    if(!files.length)return;
    setUploading(true);setResults([]);
    // Auto-scroll so the user sees progress immediately, not stuck on the upload zone
    setTimeout(()=>{resultsRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},250);
    let token=localStorage.getItem("atx_token");
    let okCount=0;const allResults=[];const duplicates=[];
    for(const f of files){
      allResults.push({filename:f.name,status:"processing",message:"⏳ Processing..."});
      setResults([...allResults]);
      if(triggerRefresh)triggerRefresh();
      try{
        token=localStorage.getItem("atx_token");
        const _idxNow=allResults.length-1;
        const _onWait=(ms,attempt)=>{const sec=Math.ceil(ms/1000);allResults[_idxNow]={filename:f.name,status:"processing",message:"⏳ Limit erreicht — warte "+sec+"s (Versuch "+attempt+"/3)"};setResults([...allResults]);};
        let r;
        try{r=await _uploadAsync(f,token,_onWait);}catch(asyncErr){
          try{const syncRes=await _uploadOne(f,token,_onWait);const sd=await syncRes.json();r={status:syncRes.ok?"done":(sd&&sd.duplicate&&sd.can_force?"duplicate":"error"),data:sd};}catch(syncErr){r={status:"error",data:{message:syncErr.message}};}
        }
        const idx=allResults.length-1;

          duplicates.push({file:f,data:r.data});
          allResults[idx]={filename:f.name,status:"skipped",message:"⚠️ Duplikat erkannt",is_duplicate:true,id:r.data?.id};

          okCount++;

          if(triggerRefresh)triggerRefresh();
        }else if(r.status==="timeout"){
          allResults[idx]={filename:f.name,status:"warn",message:"⏱ OCR taking longer than expected",id:r.data?.id};
        }else{
          allResults[idx]={filename:f.name,status:"error",message:_extractErr(r.data),id:r.data?.id};
        }
        setResults([...allResults]);
      }catch(ex){
        allResults[allResults.length-1]={filename:f.name,status:"error",message:ex.message};
        setResults([...allResults]);
      }
    }
    // Ask once for ALL duplicates (same UX as sync flow)

            const d2=await res2.json();
            const idx=allResults.findIndex(r=>r.filename===dup.file.name);
            if(idx>=0){
              if(d2.status==="done"){
                allResults[idx]={filename:dup.file.name,status:"ok",message:"✅ OK (erneut) — €"+((d2.total_amount||0).toFixed(2))+(d2.vendor?" ("+d2.vendor+")":""),id:d2.id};
                okCount++;
              }else{
                allResults[idx]={filename:dup.file.name,status:"warn",message:"⏱ verarbeitet — siehe Liste",id:d2.id};
              }
            }
          }catch(ex){}

        setResults([...allResults]);
      }
    }
    setUploading(false);setFiles([]);
    if(triggerRefresh)triggerRefresh();
    // Scroll to the end of the results card so action buttons (📄/📒/⚡) are visible

    if(okCount>0&&showToast)showToast(okCount+t("uploaded_ok"),"success");
  };
  /* --- ADDED END --- */
  const upload=async()=>{if(!files.length)return;setUploading(true);setResults([]);let token=localStorage.getItem("atx_token");
    // Scroll to results area when upload STARTS (not after it finishes)

    let okCount=0;

      /* --- ADDED START: duplicate force upload --- */

          setResults([{filename:files[0].name,status:res2.ok?"ok":"error",message:res2.ok?"OK (Force) — €"+(d2.total_amount?.toFixed(2)||"0.00"):d2.detail}]);if(res2.ok){okCount=1;if(d2.warning&&showToast)showToast(d2.warning,"warn");}
        }else{setResults([{filename:files[0].name,status:"skipped",message:"Duplicate — skipped"}]);}

      else if(d.duplicate_deleted&&d.id){

    else{

          const res=await _uploadOne(f,token,_onWaitMulti);

/* ══════════════════════════════════════════

function ExportView(){
  const[year,setYear]=useState("");
  const[exportName,setExportName]=useState("AutoTax");
  const[exportStatus,setExportStatus]=useState({});
  const exports=[{type:"pdf",label:"PDF",desc:getLang()==="de"?"Finanzbericht mit Dashboard-Werten":"Financial report with dashboard values",icon:"📕",ext:"pdf"},{type:"datev",label:"DATEV",desc:getLang()==="de"?"DATEV für Steuerberater":"DATEV for tax advisor",icon:"📊",ext:"csv"},{type:"csv",label:"CSV",desc:getLang()==="de"?"Standard CSV — Excel kompatibel":"Standard CSV — Excel compatible",icon:"📄",ext:"csv"},{type:"excel",label:"Excel",desc:getLang()==="de"?"XLSX mit Dashboard-Zusammenfassung":"XLSX with dashboard summary",icon:"📗",ext:"xlsx"},{type:"json",label:"JSON",desc:"API & Backup",icon:"🔗",ext:"json"}];

  const doExport=async(type,ext)=>{
    // Popup for filename
    const defaultName=(exportName||"AutoTax")+"_"+type+"_"+(year||"alle");
    const userInput=prompt(getLang()==="de"?"📁 Export — Dateiname eingeben:\n\nFormat: "+type.toUpperCase()+"\nJahr: "+(year||"Alle"):"📁 Export — Enter filename:\n\nFormat: "+type.toUpperCase()+"\nYear: "+(year||"All"),defaultName);
    if(!userInput)return; // cancelled
    setExportStatus(p=>({...p,[type]:"loading"}));
    try{
      const token=localStorage.getItem("atx_token");
      const res=await fetch(API+"/export/"+type+(year?"?year="+year:""),{headers:{Authorization:"Bearer "+token}});
      if(!res.ok) throw new Error(_t("export_failed")+" (Status "+res.status+")");
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      const safeName=userInput.replace(/[^a-zA-Z0-9äöüÄÖÜß_\- ]/g,"");
      a.href=url; a.download=safeName+"."+ext; a.click();
      URL.revokeObjectURL(url);
      setExportStatus(p=>({...p,[type]:"ok"}));
      if(showToast)showToast((getLang()==="de"?"📁 "+safeName+"."+ext+" gespeichert":"📁 "+safeName+"."+ext+" saved"),"success");
      setTimeout(()=>setExportStatus(p=>({...p,[type]:null})),3000);
    }catch(e){
      setExportStatus(p=>({...p,[type]:"error"}));
      alert("Export Error: "+e.message);
      setTimeout(()=>setExportStatus(p=>({...p,[type]:null})),3000);
    }
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div><h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>Export</h2><p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>Download data — CSV works in Excel</p></div>
    <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.15)",fontSize:12,color:"#f59e0b",lineHeight:1.6}}>{getLang()==="de"?"Wichtig: Alle automatisch erkannten Daten können Fehler enthalten. Beträge und MwSt vor Verwendung prüfen. Keine Steuerberatung.":"Important: All auto-detected data may contain errors. Check amounts and VAT before use. No tax advice."}</div>
    <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
      <div><label style={{color:theme.textMuted,fontSize:13,display:"block",marginBottom:4}}>{getLang()==="de"?"Projektname:":"Project name:"}</label><input style={{...css.input,width:200}} value={exportName} onChange={e=>setExportName(e.target.value)} placeholder={getLang()==="de"?"z.B. MeineFirma_2024":"e.g. MyCompany_2024"}/></div>
      <div><label style={{color:theme.textMuted,fontSize:13,display:"block",marginBottom:4}}>{getLang()==="de"?"Jahr:":"Year:"}</label><select style={{...css.input,width:140}} value={year} onChange={e=>setYear(e.target.value)}><option value="">{getLang()==="de"?"Alle Jahre":"All Years"}</option>{[2021,2022,2023,2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}</select></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>
      {exports.map(ex=>{const st=exportStatus[ex.type];return(
        <div key={ex.type} style={{...css.card,cursor:"pointer",display:"flex",flexDirection:"column",gap:12,border:st==="ok"?"1px solid "+theme.accent:st==="error"?"1px solid "+theme.danger:"1px solid "+theme.border}} onClick={()=>doExport(ex.type,ex.ext)}>
          <div style={{fontSize:32}}>{st==="loading"?"⏳":st==="ok"?"✅":st==="error"?"❌":ex.icon}</div>
          <div style={{fontSize:16,fontWeight:600,color:theme.text}}>{ex.label}</div>
          <div style={{fontSize:13,color:theme.textMuted}}>{ex.desc}</div>
          <div style={{fontSize:11,color:theme.accent,fontWeight:600}}>{st==="loading"?_t("downloading"):st==="ok"?_t("download_started"):_t("click_to_download")}</div>
        </div>);})}
    </div>
    <div style={{...css.card,background:theme.surfaceAlt}}>
      <h3 style={{fontSize:14,fontWeight:600,color:theme.text,margin:"0 0 8px"}}>{getLang()==="de"?"💡 Tipp: CSV in Excel öffnen":"💡 Tip: Open CSV in Excel"}</h3>
      <p style={{fontSize:13,color:theme.textMuted,lineHeight:1.6,margin:0}}>
        {getLang()==="de"?"CSV direkt in Excel öffnen. Falls Spalten nicht getrennt: Excel → Daten → Aus Text/CSV → Trennzeichen Komma.":"Open CSV directly in Excel. If columns aren't separated: Excel → Data → From Text/CSV → Delimiter Comma."}
      </p>
    </div>
  </div>);
}

function ChatView(){
  const[messages,setMessages]=useState([]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const send=async()=>{if(!input.trim()||loading)return;const msg=input.trim();setInput("");setMessages(p=>[...p,{role:"user",text:msg}]);setLoading(true);
    try{const data=await api("/chat",{method:"POST",body:JSON.stringify({message:msg})});setMessages(p=>[...p,{role:"ai",text:data.reply||data.message||"..."}]);}catch(e){setMessages(p=>[...p,{role:"ai",text:"Error: "+e.message}]);}setLoading(false);};
  return(<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 120px)"}}>
    <div><h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>{t("ai_assistant")}</h2><p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 16px"}}>{getLang()==="de"?"Fragen zu Rechnungen, MwSt, Kategorien":"Questions about invoices, VAT, categories"}</p></div>
    <div style={{...css.card,flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:16,marginBottom:16}}>
      {messages.length===0&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{color:theme.textDim,fontSize:14}}>Stell eine Frage...</div>
        <div style={{padding:"8px 14px",borderRadius:8,background:"rgba(245,158,11,0.05)",border:"1px solid rgba(245,158,11,0.1)",fontSize:11,color:"#f59e0b",maxWidth:400,textAlign:"center"}}>{getLang()==="de"?"KI-Assistent gibt allgemeine Infos. Keine Steuerberatung.":"AI assistant provides general info. No tax advice."}</div>
      </div>}
      {messages.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"75%",padding:"12px 16px",borderRadius:14,fontSize:14,lineHeight:1.5,background:m.role==="user"?theme.accent:theme.surfaceAlt,color:m.role==="user"?"#fff":theme.text}}>{m.text}</div>
      </div>))}
      {loading&&<div style={{display:"flex"}}><div style={{padding:"12px 16px",borderRadius:14,background:theme.surfaceAlt,color:theme.textDim,fontSize:14}}>Thinking...</div></div>}
      <div ref={endRef}/>
    </div>
    <div style={{display:"flex",gap:12}}><input style={{...css.input,flex:1}} value={input} onChange={e=>setInput(e.target.value)} placeholder="Message..." onKeyDown={e=>e.key==="Enter"&&send()}/><button style={css.btn()} onClick={send} disabled={loading}>{_t("send")}</button></div>
  </div>);
}

/* ══════════════════════════════════════════
   FIX #5: Kassenbuch — Toplu silme (checkbox) + FIX #2: tarih EU
   ══════════════════════════════════════════ */
function BookkeepingView({refreshKey,triggerRefresh,onNav}){
  const[entries,setEntries]=useState([]);const[loading,setLoading]=useState(true);const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({entry_type:"expense",date:new Date().toISOString().slice(0,10),description:"",vendor:"",category:"",gross_amount:"",vat_rate:"19%",payment_method:"",reference:"",notes:""});
  const[syncing,setSyncing]=useState(false);const[summary,setSummary]=useState(null);
  const[selected,setSelected]=useState(new Set());
  const[deleting,setDeleting]=useState(false);
  const[editId,setEditId]=useState(null);
  const[editData,setEditData]=useState({});
  const[searchKB,setSearchKB]=useState("");
  const csvRef=useRef(null);
  const[importing,setImporting]=useState(false);
  const importCSV=async(e)=>{const f=e.target.files?.[0];if(!f)return;setImporting(true);const fd=new FormData();fd.append("file",f);const tk=localStorage.getItem("atx_token");if(!tk){alert("Bitte zuerst einloggen");setImporting(false);return;}try{const res=await fetch(API+"/bookkeeping/import-csv",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd});const d=await res.json();if(d.success)alert(d.imported+" entries imported"+(d.errors?.length?" ("+d.errors.length+" Error)":""));else alert("Error: "+_extractErr(d));load();}catch(ex){alert("Import fehlgeschlagen: "+ex.message);}setImporting(false);e.target.value="";};
  const load=()=>{api("/bookkeeping?limit=1000").then(d=>{const items=Array.isArray(d)?d:(d.items||[]);setEntries(items);if(d.summary)setSummary(d.summary);setSelected(new Set());}).catch(e=>{console.error("KASSENBUCH LOAD ERROR:",e);}).finally(()=>setLoading(false));
    api("/bookkeeping/summary/overview").then(s=>{if(s)setSummary(prev=>({...prev,...s}));}).catch(()=>{});};
  useEffect(load,[refreshKey]);
  const add=async()=>{if(!form.description||!form.gross_amount){alert("Description and amount required");return;}
    try{await api("/bookkeeping",{method:"POST",body:JSON.stringify({...form,gross_amount:parseFloat(form.gross_amount)})});setShowForm(false);setForm({entry_type:"expense",date:new Date().toISOString().slice(0,10),description:"",vendor:"",category:"",gross_amount:"",vat_rate:"19%",payment_method:"",reference:"",notes:""});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const del=async(id)=>{if(!confirm(_t("delete_entry")))return;try{await api("/bookkeeping/"+id,{method:"DELETE"});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const sync=async()=>{setSyncing(true);try{const tk=localStorage.getItem("atx_token");const res=await fetch(API+"/bookkeeping/sync-invoices",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"}});if(!res.ok){const err=await res.json().catch(()=>({}));alert("Sync Error: "+(err.detail||res.status));setSyncing(false);return;}const r=await res.json();const msg=[];if(r.synced>0)msg.push(r.synced+" → Cash Book");if(r.reverse_synced>0)msg.push(r.reverse_synced+" → Invoices");if(msg.length===0)msg.push("All synced ✓");alert("Sync: "+msg.join(", "));load();if(triggerRefresh)triggerRefresh();}catch(e){alert("Sync Error: "+e.message);}setSyncing(false);};
  const reconcile=async(id)=>{try{await api("/bookkeeping/"+id+"/reconcile",{method:"POST"});load();}catch(e){alert(e.message);}};
  const[editPreviewKB,setEditPreviewKB]=useState(null);
  const startEdit=(entry)=>{setEditId(entry.id);setEditPreviewKB(null);setEditData({description:entry.description||"",vendor:entry.vendor||"",category:entry.category||"",gross_amount:entry.gross_amount||0,vat_rate:entry.vat_rate||"19%",date:entry.date||"",entry_type:entry.entry_type||"expense",payment_method:entry.payment_method||"",reference:entry.reference||""});
    if(entry.invoice_id){fetch(API+"/vault/"+entry.invoice_id+"/download",{headers:{"Authorization":"Bearer "+localStorage.getItem("atx_token")}}).then(r=>{if(r.ok)return r.blob();throw 0;}).then(blob=>{setEditPreviewKB({url:URL.createObjectURL(blob),type:blob.type,invId:entry.invoice_id});}).catch(()=>{});}};
  const saveEdit=async()=>{try{await api("/bookkeeping/"+editId,{method:"PUT",body:JSON.stringify({...editData,gross_amount:parseFloat(editData.gross_amount)||0})});if(editPreviewKB)URL.revokeObjectURL(editPreviewKB.url);setEditId(null);setEditPreviewKB(null);load();if(triggerRefresh)triggerRefresh();if(showToast)showToast("Cash Book + Invoice updated","success");}catch(e){alert(e.message);}};

  const toggleSelect=(id)=>{setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});};
  const toggleAll=()=>{if(selected.size===entries.length){setSelected(new Set());}else{setSelected(new Set(entries.map(e=>e.id)));}};
  const deleteSelected=async()=>{
    if(selected.size===0)return;
    if(!confirm(selected.size+t("entries_delete")))return;
    setDeleting(true);
    try{const r=await api("/bookkeeping/bulk-delete",{method:"POST",body:JSON.stringify({ids:[...selected]})});
      if(showToast)showToast((r.deleted||0)+" "+_t("entries")+" deleted","info");
    }catch(e){if(showToast)showToast("Delete failed","error");}
    setDeleting(false);load();if(triggerRefresh)triggerRefresh();
  };

  const tc={income:{bg:theme.accentSoft,c:theme.accent,t:_t("income")},expense:{bg:theme.dangerSoft,c:theme.danger,t:_t("expense")}};
  return(<div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>{_t("bookkeeping")}</h2><p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{entries.length} {_t("entries")}</p></div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {selected.size>0&&<button style={css.btn(theme.danger)} onClick={deleteSelected} disabled={deleting}><Icon d={I.trash} size={14} color="#fff"/>{deleting?"...":selected.size+t("n_delete")}</button>}
        {selected.size>0&&<button style={{...css.btnOutline,borderColor:"rgba(59,130,246,0.4)",color:theme.blue}} onClick={async()=>{if(!confirm(selected.size+" Copy entries to Invoices?"))return;const tk=localStorage.getItem("atx_token");let ok=0;for(const id of selected){const e=entries.find(x=>x.id===id);if(!e)continue;try{await fetch(API+"/invoices/create",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({vendor:e.vendor||e.description,total_amount:e.gross_amount,vat_amount:e.vat_amount,vat_rate:e.vat_rate,date:e.date,category:e.category,invoice_type:e.entry_type,raw_text:"Aus Kassenbuch ID:"+e.id+": "+e.description})});ok++;}catch(ex){}}alert(ok+" → copied to Invoices");setSelected(new Set());}}>→ Invoices ({selected.size})</button>}
        <button style={{...css.btn(),fontSize:13}} onClick={()=>setShowForm(!showForm)}>{t("new_entry_label")}</button>
        <button style={{...css.btn("#f59e0b"),fontSize:13}} onClick={sync} disabled={syncing}>{syncing?"⏳ Sync...":"🔄 "+_t("sync_invoices")}</button>
        <button style={{...css.btn("#10b981"),fontSize:13}} onClick={()=>onNav&&onNav("export")}>📤 Export</button>
        <button style={{...css.btn("#3b82f6"),fontSize:13}} onClick={()=>csvRef.current?.click()} disabled={importing}>{importing?"⏳ Importing...":"📥 CSV Import"}</button>
        <input ref={csvRef} type="file" accept=".csv,.txt,.CSV,text/csv,application/vnd.ms-excel" style={{display:"none"}} onChange={async(e)=>{const f=e.target.files?.[0];if(!f)return;const tk=localStorage.getItem("atx_token");if(!tk){alert("Bitte zuerst einloggen");return;}setImporting(true);const fd=new FormData();fd.append("file",f);try{const r=await fetch(API+"/bookkeeping/import-csv",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd});const d=await r.json();if(d.success){alert(d.imported+" entries imported");load();if(triggerRefresh)triggerRefresh();}else alert("Error: "+_extractErr(d));}catch(ex){alert("Import fehlgeschlagen: "+ex.message);}setImporting(false);e.target.value="";}}/>
      </div>
    </div>
    <div style={{display:"flex",gap:8,margin:"12px 0",maxWidth:500}}>
      <input style={{...css.input,flex:1}} placeholder="Search description, vendor..." value={searchKB} onChange={e=>setSearchKB(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")e.preventDefault();}}/>
      {searchKB&&<button style={{...css.btnOutline,padding:"8px 12px"}} onClick={()=>setSearchKB("")}>x</button>}
    </div>
    {(()=>{const fe=entries.filter(e=>!searchKB||(e.description||"").toLowerCase().includes(searchKB.toLowerCase())||(e.vendor||"").toLowerCase().includes(searchKB.toLowerCase()));const fInc=fe.filter(e=>e.entry_type==="income").reduce((s,e)=>s+(e.gross_amount||0),0);const fExp=fe.filter(e=>e.entry_type==="expense").reduce((s,e)=>s+(e.gross_amount||0),0);const fNet=fInc-fExp;const fVat=fe.filter(e=>e.entry_type==="income").reduce((s,e)=>s+(e.vat_amount||0),0)-fe.filter(e=>e.entry_type==="expense").reduce((s,e)=>s+(e.vat_amount||0),0);return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))",gap:12}}>
      <div style={css.card}><div style={{fontSize:12,color:theme.textMuted}}>{_t("einnahmen")}{searchKB?" (filtered)":""}</div><div style={{fontSize:22,fontWeight:700,color:theme.accent,fontFamily:mono}}>€{fInc.toFixed(2)}</div></div>
      <div style={css.card}><div style={{fontSize:12,color:theme.textMuted}}>{_t("ausgaben")}{searchKB?" (filtered)":""}</div><div style={{fontSize:22,fontWeight:700,color:theme.danger,fontFamily:mono}}>€{fExp.toFixed(2)}</div></div>
      <div style={css.card}><div style={{fontSize:12,color:theme.textMuted}}>{t("profit")}{searchKB?" (filtered)":""}</div><div style={{fontSize:22,fontWeight:700,color:fNet>=0?theme.accent:theme.danger,fontFamily:mono}}>€{fNet.toFixed(2)}</div></div>
      <div style={css.card}><div style={{fontSize:12,color:theme.textMuted}}>{t("balance")+" ("+t("vat")+")"}{searchKB?" (filtered)":""}</div><div style={{fontSize:22,fontWeight:700,color:theme.blue,fontFamily:mono}}>€{fVat.toFixed(2)}</div></div>
    </div>);})()}
    {showForm&&<div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 16px"}}>{_t("new_entry")}</h3>

        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("date")}</label><input style={{...css.input,cursor:"pointer"}} type="date" value={form.date} onKeyDown={e=>e.preventDefault()} onChange={e=>setForm({...form,date:e.target.value})}/></div>
        <div style={{gridColumn:"1/3"}}><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("description")}</label><input style={css.input} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="e.g. office supplies, customer invoice..."/></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>Vendor/Customer</label><input style={css.input} value={form.vendor} onChange={e=>setForm({...form,vendor:e.target.value})} placeholder="Firmenname"/></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("category")}</label><select style={css.input} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}><option value="">{_t("select")}</option><option value="office">{_t("office")}</option><option value="food">{_t("food")}</option><option value="transport">{_t("transport")}</option><option value="telecom">{_t("telecom")}</option><option value="fuel">{_t("fuel")}</option><option value="restaurant">{_t("restaurant")}</option><option value="electronics">{_t("electronics")}</option><option value="clothing">{_t("clothing")}</option><option value="other">{_t("other")}</option></select></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("gross")} (€)</label><input style={css.input} type="number" step="0.01" value={form.gross_amount} onChange={e=>setForm({...form,gross_amount:e.target.value})} placeholder="0.00"/></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("vat_rate")}</label><select style={css.input} value={form.vat_rate} onChange={e=>setForm({...form,vat_rate:e.target.value})}><option value="19%">19%</option><option value="7%">7%</option><option value="5.5%">5,5% (FR)</option><option value="20%">20% (FR)</option><option value="0%">0%</option></select></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("payment")}</label><select style={css.input} value={form.payment_method} onChange={e=>setForm({...form,payment_method:e.target.value})}><option value="">{_t("select")}</option><option value="cash">{_t("cash")}</option><option value="card">{_t("card")}</option><option value="transfer">{_t("transfer")}</option><option value="paypal">PayPal</option></select></div>
        <div><label style={{fontSize:12,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("invoice_nr")}</label><input style={css.input} value={form.reference} onChange={e=>setForm({...form,reference:e.target.value})} placeholder="RE-2026-001"/></div>
      </div>
      <div style={{display:"flex",gap:12,marginTop:16}}><button style={css.btn()} onClick={add}>{_t("save")}</button><button style={css.btnOutline} onClick={()=>setShowForm(false)}>{_t("cancel")}</button></div>
    </div>}
    {editId&&<div style={css.card}>
      <h3 style={{fontSize:15,fontWeight:600,color:theme.text,margin:"0 0 12px"}}>{_t("entry_edit")}</h3>

      {editPreviewKB&&<div style={{background:theme.surfaceAlt,borderRadius:10,border:"1px solid "+theme.border,overflow:"hidden",maxHeight:500}}>
        {editPreviewKB.type.includes("pdf")?<iframe src={editPreviewKB.url} style={{width:"100%",height:480,border:"none"}}/>
        :<img src={editPreviewKB.url} style={{width:"100%",maxHeight:480,objectFit:"contain"}} alt="Beleg"/>}
        <div style={{padding:"8px 12px",display:"flex",gap:8,borderTop:"1px solid "+theme.border}}>
          <a href={editPreviewKB.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:theme.accent,textDecoration:"underline"}}>Open fullscreen</a>
          <button style={{fontSize:11,color:theme.blue,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}} onClick={()=>{const a=document.createElement("a");a.href=editPreviewKB.url;a.download="Beleg_"+editId;a.click();}}>Download</button>
        </div>
      </div>}
      <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div><label style={{fontSize:11,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("description")}</label><input style={css.input} value={editData.description} onChange={e=>setEditData({...editData,description:e.target.value})} placeholder="Description..."/></div>

        <div><label style={{fontSize:11,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("date")}</label><input style={{...css.input,cursor:"pointer"}} type="date" value={editData.date} onKeyDown={e=>e.preventDefault()} onChange={e=>setEditData({...editData,date:e.target.value})}/></div>
        <div><label style={{fontSize:11,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("category")}</label><select style={css.input} value={editData.category} onChange={e=>setEditData({...editData,category:e.target.value})}><option value="">{_t("select")}</option><option value="office">{_t("office")}</option><option value="food">{_t("food")}</option><option value="transport">{_t("transport")}</option><option value="telecom">{_t("telecom")}</option><option value="fuel">{_t("fuel")}</option><option value="restaurant">{_t("restaurant")}</option><option value="electronics">{_t("electronics")}</option><option value="clothing">{_t("clothing")}</option><option value="other">{_t("other")}</option></select></div>
        <div><label style={{fontSize:11,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("payment")}</label><select style={css.input} value={editData.payment_method} onChange={e=>setEditData({...editData,payment_method:e.target.value})}><option value="">{_t("select")}</option><option value="cash">{_t("cash")}</option><option value="card">{_t("card")}</option><option value="transfer">{_t("transfer")}</option><option value="paypal">PayPal</option></select></div>
        <div><label style={{fontSize:11,color:theme.textMuted,display:"block",marginBottom:4}}>{_t("invoice_nr")}</label><input style={css.input} value={editData.reference} onChange={e=>setEditData({...editData,reference:e.target.value})} placeholder="RE-2026-001"/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:12}}><button style={css.btn()} onClick={saveEdit}>{_t("save")}</button><button style={css.btnOutline} onClick={()=>{if(editPreviewKB)URL.revokeObjectURL(editPreviewKB.url);setEditId(null);setEditPreviewKB(null);}}>{_t("cancel")}</button></div>

        </tr></thead>
        <tbody>{entries.filter(e=>!searchKB||(e.description||"").toLowerCase().includes(searchKB.toLowerCase())||(e.vendor||"").toLowerCase().includes(searchKB.toLowerCase())).map(e=>{const t=tc[e.entry_type]||tc.expense;return(

function VaultView({onNav,triggerRefresh}){
  const[items,setItems]=useState([]);const[search,setSearch]=useState("");const[loading,setLoading]=useState(true);
  const[preview,setPreview]=useState(null);const[selected,setSelected]=useState(new Set());
  const load=(q)=>{setLoading(true);api("/vault"+(q?"?search="+encodeURIComponent(q):"")).then(d=>{setItems(d.items||[]);setSelected(new Set());}).catch(()=>{}).finally(()=>setLoading(false));};
  useEffect(()=>{load();},[]);
  const delOne=async(id)=>{if(!confirm(_t("confirm_delete")))return;try{await api("/invoices/"+id,{method:"DELETE"});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const delSelected=async()=>{if(!selected.size)return;if(!confirm(selected.size+(getLang()==="de"?" Beleg(e) wirklich löschen?":" receipt(s) really delete?")))return;try{await api("/invoices/bulk-delete",{method:"POST",body:JSON.stringify({ids:[...selected]})});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const toggleSelect=(id)=>{setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});};
  const toggleAll=()=>{if(selected.size===items.length)setSelected(new Set());else setSelected(new Set(items.map(i=>i.id)));};
  const getFileUrl=async(id)=>{const tk=localStorage.getItem("atx_token");const r=await fetch(API+"/vault/"+id+"/download",{headers:{"Authorization":"Bearer "+tk}});if(!r.ok)return null;const blob=await r.blob();return{url:URL.createObjectURL(blob),type:blob.type};};
  const openPreview=async(item)=>{const f=await getFileUrl(item.id);if(!f){alert("Datei nicht verfügbar");return;}setPreview({...item,...f});};
  const download=async(id,fname)=>{const f=await getFileUrl(id);if(!f){alert("Datei nicht verfügbar");return;}const a=document.createElement("a");a.href=f.url;a.download=fname||"beleg";a.click();URL.revokeObjectURL(f.url);};
  return(<div>
    <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:"0 0 4px"}}>{_t("vault")}</h2>

      <button style={css.btn()} onClick={()=>load(search)}>{_t("search")}</button>
      {search&&<button style={css.btnOutline} onClick={()=>{setSearch("");load();}}>x</button>}
      <button style={css.btnOutline} onClick={toggleAll}>{selected.size===items.length&&items.length>0?_t("none"):_t("select_all")}</button>
      {selected.size>0&&<button style={css.btn(theme.danger)} onClick={delSelected}>🗑 {selected.size} delete</button>}
    </div>
    {preview&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",padding:20,overflow:"auto"}} onClick={()=>{if(preview.url)URL.revokeObjectURL(preview.url);setPreview(null);}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",maxWidth:900,marginBottom:12}} onClick={e=>e.stopPropagation()}>
        <div>
          <div style={{color:"#fff",fontSize:16,fontWeight:700}}>{preview.vendor}</div>
          <div style={{color:"#94a3b8",fontSize:13}}>{preview.date} — €{Number(preview.total_amount||0).toFixed(2)}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={{...css.btnOutline,color:"#fff",borderColor:"rgba(255,255,255,0.3)"}} onClick={()=>download(preview.id,preview.filename)}>Download</button>
          <button style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600}} onClick={()=>{if(preview.url)URL.revokeObjectURL(preview.url);setPreview(null);}}>Close</button>
        </div>
      </div>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:900,width:"100%",display:"flex",justifyContent:"center"}}>
        {preview.type&&preview.type.includes("pdf")?
          <iframe src={preview.url} style={{width:"100%",height:"80vh",border:"none",borderRadius:8,background:"#fff"}}/>:
          <img src={preview.url} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:8,objectFit:"contain"}}/>}
      </div>
    </div>}
    {loading?<div style={{color:theme.textMuted,padding:40,textAlign:"center"}}>Laden...</div>:

            <div>

              <div style={{fontSize:12,color:theme.textMuted,marginTop:2}}>{i.date}</div>
            </div>
          </div>
          <span style={css.badge(i.invoice_type==="income"?theme.accentSoft:theme.dangerSoft,i.invoice_type==="income"?theme.accent:theme.danger)}>{i.invoice_type==="income"?_t("income"):_t("expense")}</span>

          <span style={{fontSize:11,color:theme.textMuted}}>{i.category}</span>
        </div>
        {i.has_original&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
          <span style={{fontSize:10,color:theme.accent}}>{_t("processed")} ✔</span>
          <span style={{fontSize:9,color:theme.textDim,background:theme.surfaceAlt,padding:"1px 6px",borderRadius:4}}>{(i.file_content_type||"").includes("pdf")?"PDF":(i.file_content_type||"").includes("png")?"PNG":(i.file_content_type||"").includes("xml")?"XML":"JPG"}</span>
        </div>}
        <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
          {i.has_original&&<button style={{...css.btn(),flex:1,fontSize:11,padding:"6px 8px"}} onClick={()=>openPreview(i)}>&#128065; Original anzeigen</button>}
          <button style={{background:"transparent",border:"1px solid rgba(16,185,129,0.3)",color:theme.accent,padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all .2s"}} onClick={()=>window.open("/editor?id="+i.id,"_blank")}>✏️ Editor</button>
          {i.has_original&&<button style={{...css.btnOutline,fontSize:11,padding:"6px 8px"}} onClick={()=>download(i.id,i.filename)}>⬇</button>}
          <button style={{background:"transparent",border:"1px solid rgba(0,194,255,0.3)",color:"#00c2ff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit"}} onClick={()=>downloadPDF(i.id)}>🖨️</button>
          <button style={{background:theme.dangerSoft,border:"1px solid rgba(239,68,68,0.4)",color:theme.danger,padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}} onClick={()=>delOne(i.id)}>🗑 Delete</button>
        </div>
      </div>)}
    </div>}
    <div style={{fontSize:11,color:theme.textDim,marginTop:16,textAlign:"center"}}>{items.length} receipts found</div>
  </div>);
}
