  const [erfBusy,setErfBusy]=React.useState(false);
  const erfGesamt=(parseFloat(erf.kalt)||0)+(parseFloat(erf.nk)||0);
  const saveErf=async()=>{
    if(!erf.adresse.trim()||!erf.name.trim()){alert(_L("Adresse und Mieter-Name sind nötig.","Adres ve kiracı adı gerekli.","Address and tenant name required."));return;}
    const kalt=parseFloat(erf.kalt)||0;
    setErfBusy(true);
    try{
      const p=await api("/immo/properties",{method:"POST",body:JSON.stringify({name:erf.adresse.trim(),adresse:erf.adresse.trim()})});
      const u=await api("/immo/units",{method:"POST",body:JSON.stringify({property_id:p.id,name:erf.daire.trim()||"Wohnung",wohnflaeche:parseFloat(erf.qm)||null,soll_miete:kalt})});
      await api("/immo/tenancies",{method:"POST",body:JSON.stringify({unit_id:u.id,mieter_name:erf.name.trim(),von:erf.von||null,kaltmiete:kalt,nk_voraus:parseFloat(erf.nk)||null})});
      setErf(_erf0());setShowErf(false);load();
      if(showToast)showToast(_L("Mieter angelegt ✓","Kiracı eklendi ✓","Tenant added ✓"),"success");
    }catch(e){alert(e.message||"Fehler");}finally{setErfBusy(false);}
  };
  const _ef={width:"100%",boxSizing:"border-box",padding:"11px 13px",background:theme.surfaceAlt,border:"1.5px solid "+theme.border,borderRadius:10,color:theme.text,fontSize:14,fontFamily:"inherit"};
  const _efl={display:"block",fontSize:12,color:theme.textMuted,fontWeight:600,marginBottom:5};
  const _efh={fontSize:11,color:theme.textDim,marginTop:4,lineHeight:1.35};
  const _efR=(n,lbl,key,extra,hint)=>(<div style={{marginBottom:12}}><label style={_efl}>{n?<b style={{color:theme.textDim}}>{n}. </b>:""}{lbl}</label><input style={_ef} value={erf[key]} onChange={e=>setErf({...erf,[key]:e.target.value})} {...(extra||{})}/>{hint?<div style={_efh}>{hint}</div>:null}</div>);
  const delTenant=async(m)=>{if(!window.confirm(_L("Mieter \""+m.mieter_name+"\" löschen?","Kiracı \""+m.mieter_name+"\" silinsin mi?","Delete tenant \""+m.mieter_name+"\"?")))return;try{await api("/immo/tenancies/"+m.tenancy_id,{method:"DELETE"});if(sel&&sel.tenancy_id===m.tenancy_id)setSel(null);load();if(showToast)showToast(_L("Gelöscht","Silindi","Deleted"),"info");}catch(e){alert(e.message);}};
  const dlMahnung=async(m)=>{let st=1,stTxt="";try{const h=await api("/immo/tenancies/"+m.tenancy_id+"/mahnungen");st=h.naechste_stufe||1;stTxt=h.naechste_stufe_text||"";}catch(e){}
    if(!confirm(_L(stTxt+" für „"+m.mieter_name+"“ über "+_e(m.offene_forderung)+" erstellen? (wird dauerhaft protokolliert)","„"+m.mieter_name+"“ için "+stTxt+" ("+_e(m.offene_forderung)+") oluşturulsun mu? (kalıcı kaydedilir)","Create "+stTxt+" for „"+m.mieter_name+"“ over "+_e(m.offene_forderung)+"? (recorded permanently)")))return;try{const r=await fetch(API+"/immo/tenancies/"+m.tenancy_id+"/mahnung",{method:"POST",headers:{Authorization:"Bearer "+localStorage.getItem("atx_token"),"Content-Type":"application/json"},body:JSON.stringify({stufe:st,year:new Date().getFullYear()})});if(!r.ok){let msg="HTTP "+r.status;try{const j=await r.json();if(j&&j.detail)msg=j.detail;}catch(e){}alert(msg);return;}const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="Mahnung_"+((m.mieter_name||"Mieter").replace(/[^a-zA-Z0-9]/g,"_"))+".pdf";a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(u);},1500);if(showToast)showToast(_L("Mahnung erstellt ✓","Mahnung oluşturuldu ✓","Mahnung created ✓"),"success");}catch(e){alert(e.message);}};
  // ── Bearbeiten: von/bis/Kaltmiete/NK düzenle (bis boş = aktif, çıkış yok) ──
  const [editFor,setEditFor]=React.useState(null);
  const [editF,setEditF]=React.useState({name:"",von:"",bis:"",kalt:"",nk:"",telefon:"",email:"",kaution:"",erst:"",personen:"",erhAb:"",erhKalt:""});
  const openEdit=(m)=>{setEditF({name:m.mieter_name||"",von:m.einzug||"",bis:m.auszug||"",kalt:String(m.kaltmiete==null?"":m.kaltmiete),nk:String(m.nk_vorauszahlung==null?"":m.nk_vorauszahlung),telefon:m.telefon||"",email:m.email||"",kaution:String(m.kaution==null?"":m.kaution),erst:String(m.erstmonat_betrag==null?"":m.erstmonat_betrag),personen:String(m.personenzahl==null?"":m.personenzahl),erhAb:"",erhKalt:""});setEditFor(editFor===m.tenancy_id?null:m.tenancy_id);};
  const saveEdit=async(m)=>{try{await api("/immo/tenancies/"+m.tenancy_id,{method:"PATCH",body:JSON.stringify({mieter_name:editF.name.trim()||m.mieter_name,von:editF.von||"",bis:editF.bis||"",kaltmiete:editF.kalt===""?null:parseFloat(editF.kalt),nk_voraus:editF.nk===""?null:parseFloat(editF.nk),kaution:editF.kaution===""?null:parseFloat(editF.kaution),telefon:editF.telefon,email:editF.email,erstmonat_betrag:editF.erst===""?-1:parseFloat(editF.erst),personenzahl:editF.personen===""?-1:parseInt(editF.personen)})});setEditFor(null);load();if(showToast)showToast(_L("Gespeichert ✓","Kaydedildi ✓","Saved ✓"),"success");}catch(e){alert(e.message);}};
  const saveErhoehung=async(m)=>{if(!editF.erhAb||!(parseFloat(editF.erhKalt)>0)){alert(_L("Datum und neue Kaltmiete nötig.","Tarih ve yeni kira gerekli.","Date and new rent required."));return;}try{await api("/immo/tenancies/"+m.tenancy_id+"/mieterhoehung",{method:"POST",body:JSON.stringify({ab:editF.erhAb,kalt:parseFloat(editF.erhKalt)})});setEditF({...editF,erhAb:"",erhKalt:""});setEditFor(null);load();if(showToast)showToast(_L("Mieterhöhung gespeichert ✓","Kira artışı kaydedildi ✓","Rent increase saved ✓"),"success");}catch(e){alert(e.message);}};
  const openPay=(m)=>{setPayDate(new Date().toISOString().slice(0,10));setPayAmt(String(m.gesamtmiete||""));setPayFor(m.tenancy_id);};
  const confirmPay=async(m)=>{try{await api("/immo/tenancies/"+m.tenancy_id+"/monat-bezahlt",{method:"POST",body:JSON.stringify({jahr:curY,monat:curM,datum:payDate,betrag:parseFloat(payAmt)||m.gesamtmiete})});setPayFor(null);load();if(showToast)showToast(_L("Als bezahlt markiert","Ödendi işaretlendi","Marked paid"),"success");}catch(e){alert(e.message);}};
  const markUnpaid=async(m)=>{if(!confirm(_L("„"+m.mieter_name+"“ für diesen Monat als NICHT bezahlt melden?","„"+m.mieter_name+"“ bu ay ÖDENMEDİ olarak işaretlensin mi?","Report „"+m.mieter_name+"“ as NOT paid for this month?")))return;try{await api("/immo/tenancies/"+m.tenancy_id+"/monat-bezahlt?jahr="+curY+"&monat="+curM,{method:"DELETE"});setPayFor(null);load();}catch(e){alert(e.message);}};
  const MON=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const [sel,setSel]=React.useState(null);
  const [mk,setMk]=React.useState(null);
  const [mkY,setMkY]=React.useState(curY);          // C8: which YEAR of the Mietkonto is shown
  const fetchMk=(m,y)=>api("/immo/tenancies/"+m.tenancy_id+"/mietkonto?year="+(y||mkY)).then(setMk).catch(()=>{});
  const [mh,setMh]=React.useState(null);           // C4: Mahnung history (endpoint existed, was never called)
  const fetchMh=(m)=>api("/immo/tenancies/"+m.tenancy_id+"/mahnungen").then(setMh).catch(()=>setMh(null));
  // Sprint 1 — Übergabe (Ein-/Auszugsprotokoll): the handover lives on the tenant, where the landlord looks for it
  const [prots,setProts]=React.useState([]);
  const [wizard,setWizard]=React.useState(null);
  const fetchProts=(m)=>api("/immo/protokolle?tenancy_id="+m.tenancy_id).then(d=>setProts(d.protokolle||[])).catch(()=>setProts([]));
  // Zählerstände — history + consumption (Masterplan #7). The numbers are DERIVED by the backend.
  const [zae,setZae]=React.useState(null);
  const [zadd,setZadd]=React.useState({});
  const fetchZae=(m)=>{if(!m.unit_id){setZae(null);return;}api("/immo/units/"+m.unit_id+"/zaehler").then(setZae).catch(()=>setZae(null));};
  const addZae=async(m,art)=>{const v=zadd[art]||{};
    if(!(parseFloat(v.stand)>=0)){alert(_L("Bitte Zählerstand eingeben.","Sayaç değeri gir.","Enter the reading."));return;}
    try{await api("/immo/zaehler",{method:"POST",body:JSON.stringify({unit_id:m.unit_id,art:art,stand:parseFloat(v.stand),zaehler_nr:v.nr||"",datum:v.datum||new Date().toISOString().slice(0,10)})});
      setZadd({...zadd,[art]:{}});fetchZae(m);if(showToast)showToast(_L("Zählerstand gespeichert","Sayaç kaydedildi","Reading saved"),"success");
    }catch(e){alert(e.message);}};
  // WGB — after the move-in handover the landlord confirms the Anmeldung (the chip that could never be ticked)
  const setAnmeldung=async(m,v)=>{try{await api("/immo/tenancies/"+m.tenancy_id,{method:"PATCH",body:JSON.stringify({anmeldung_done:v})});load();setSel({...m,anmeldung_done:v});}catch(e){alert(e.message);}};
  const openProt=async(pid)=>{try{const d=await api("/immo/protokolle/"+pid);setWizard(d);}catch(e){alert(e.message);}};
  const newProt=async(m,art)=>{try{const d=await api("/immo/protokolle",{method:"POST",body:JSON.stringify({tenancy_id:m.tenancy_id,art:art})});setWizard(d);fetchProts(m);}catch(e){alert(e.message);}};
  const openDetail=(m)=>{setSel(m);setMk(null);setMh(null);setProts([]);setZae(null);setMkY(curY);fetchMk(m,curY);fetchMh(m);fetchProts(m);fetchZae(m);};
  const payMonth=async(m,mon)=>{try{await api("/immo/tenancies/"+m.tenancy_id+"/monat-bezahlt",{method:"POST",body:JSON.stringify({jahr:mkY,monat:mon,betrag:m.gesamtmiete})});fetchMk(m);load();}catch(e){alert(e.message);}};
  const unpayMonth=async(m,mon)=>{if(!confirm(_L("Diesen Monat als NICHT bezahlt melden?","Bu ay ÖDENMEDİ olarak işaretlensin mi?","Report this month as NOT paid?")))return;try{await api("/immo/tenancies/"+m.tenancy_id+"/monat-bezahlt?jahr="+mkY+"&monat="+mon,{method:"DELETE"});fetchMk(m);load();}catch(e){alert(e.message);}};
  const today=new Date().toISOString().slice(0,10);
  const phaseOf=(m)=>{
    if(m.auszug&&m.auszug<today) return {k:"ausgezogen",lbl:_L("Ausgezogen","Çıktı","Moved out"),c:theme.textDim,bg:theme.surfaceAlt};
    if(m.auszug) return {k:"kuendigung",lbl:_L("Kündigung läuft","Çıkış sürüyor","Ending"),c:"#f59e0b",bg:"rgba(245,158,11,0.12)"};
    if((m.offene_forderung||0)>0) return {k:"rueckstand",lbl:_L("Im Rückstand","Borçlu","In arrears"),c:theme.danger,bg:"rgba(239,68,68,0.12)"};
    return {k:"aktiv",lbl:_L("Aktiv","Aktif","Active"),c:theme.accent,bg:"rgba(16,185,129,0.12)"};
  };
  const FILTERS=[["alle",_L("Alle","Tümü","All")],["aktiv",_L("Aktiv","Aktif","Active")],["rueckstand",_L("Im Rückstand","Borçlu","Arrears")],["kuendigung",_L("Kündigung","Çıkış","Ending")],["ausgezogen",_L("Ausgezogen","Çıktı","Moved out")]];
  // Filtreler ÖRTÜŞEBİLİR: borçlu bir kiracı HEM "Aktiv" HEM "Im Rückstand"tır (oturuyor + borçlu).
  const matchFilter=(m)=>{
    if(filter==="alle") return true;
    if(filter==="ausgezogen") return !!(m.auszug && m.auszug<today);
    if(filter==="kuendigung") return !!(m.auszug && m.auszug>=today);
    if(filter==="rueckstand") return (m.offene_forderung||0)>0;
    if(filter==="aktiv") return !(m.auszug && m.auszug<today);   // oturuyor (çıkmamış) — borçlu olsa bile
    return true;
  };
  const shown=rows.filter(matchFilter);
  const dlWgb=async(tid)=>{try{const r=await fetch(API+"/immo/tenancies/"+tid+"/wohnungsgeberbestaetigung/pdf?art=einzug",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});if(!r.ok){let msg="HTTP "+r.status;try{const j=await r.json();if(j&&j.detail)msg=j.detail;}catch(e){}alert(msg);return;}const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="wohnungsgeberbestaetigung_"+tid+".pdf";a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}catch(e){alert(e.message);}};
  const chip=(active,label,c)=>(<span style={{...css.badge(active?"rgba(16,185,129,0.12)":theme.surfaceAlt,active?theme.accent:theme.textDim)}}>{active?"✓":"○"} {label}</span>);
  const tmBadge=(s)=>s==="paid"?<b style={{color:theme.accent}}>✓ {_L("bezahlt","ödendi","paid")}</b>:s==="partial"?<b style={{color:"#f59e0b"}}>~ {_L("teilweise","kısmi","partial")}</b>:s==="open"?<b style={{color:theme.danger}}>✗ {_L("offen","ödenmedi","open")}</b>:<span style={{color:theme.textDim}}>—</span>;
  if(sel){const m=sel;const ph=phaseOf(m);const _row=(k,v)=>(<div style={{display:"flex",justifyContent:"space-between",fontSize:14,margin:"4px 0"}}><span style={{color:theme.textMuted}}>{k}</span><b style={{color:theme.text}}>{v}</b></div>);
    return(<div style={{maxWidth:720,margin:"0 auto"}}>
      <button onClick={()=>setSel(null)} style={{...css.btnOutline,padding:"6px 12px",fontSize:13,marginBottom:12}}>← {_L("Zurück zu Mieter","Kiracılara dön","Back")}</button>
      <div style={{...css.card,marginBottom:12}}>
        <span style={css.badge(ph.bg,ph.c)}>{ph.lbl}</span>
        <div style={{fontSize:22,fontWeight:800,color:theme.text,marginTop:6}}>{m.mieter_name}</div>
        <div style={{fontSize:13,color:theme.textMuted}}>{[m.property_name,m.unit_name,(m.wohnflaeche!=null?m.wohnflaeche+" m²":null)].filter(Boolean).join(" · ")}</div>
        {(m.telefon||m.email)&&<div style={{fontSize:12,color:theme.textDim,marginTop:2}}>{[m.telefon?"📞 "+m.telefon:null,m.email?"✉️ "+m.email:null].filter(Boolean).join("   ·   ")}</div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>{chip(m.anmeldung_done,"Anmeldung")}{chip(m.wgb_done,"WGB")}</div>
      </div>
      <div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Stammdaten</div>
        {_row("Kaltmiete",_e(m.kaltmiete))}{_row("NK Vorauszahlung",_e(m.nk_vorauszahlung))}
        <div style={{borderTop:"1px solid "+theme.border,margin:"6px 0",paddingTop:6}}>{_row(_L("Gesamt / Monat","Toplam / Ay","Total / mo"),<span style={{color:theme.accent}}>{_e(m.gesamtmiete)}</span>)}</div>
        {_row("Einzug",m.einzug||"—")}{_row("Auszug",m.auszug||"—")}
      </div>
      <div style={{...css.card,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em"}}>Mietkonto</div>
            <select value={mkY} onChange={e=>{const y=parseInt(e.target.value);setMkY(y);setMk(null);fetchMk(m,y);}}
              style={{padding:"3px 7px",background:theme.surfaceAlt,border:"1px solid "+theme.border,borderRadius:7,color:theme.text,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {[0,1,2].map(k=>{const y=curY-k;return <option key={y} value={y}>{y}</option>;})}
            </select>
          </div>
          <span style={{fontSize:13,color:theme.textMuted}}>{_L("Offen","Açık","Open")}: <b style={{color:(mk&&mk.summe.offen>0)?theme.danger:theme.accent}}>{_e(mk?mk.summe.offen:0)}</b></span>
        </div>
        {!mk&&<div style={{color:theme.textMuted,fontSize:13}}>…</div>}
        {mk&&mk.rows.filter(r=>r.status!=="inactive").map(r=><div key={r.monat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 0",borderTop:"1px solid "+theme.border,flexWrap:"wrap"}}>
          <span style={{fontSize:14}}>{MON[r.monat-1]} {curY} · <b style={{color:theme.text}}>{_e(r.soll)}</b></span>
          {r.status==="future"?<span style={{fontSize:12,color:theme.textDim,fontStyle:"italic"}}>{_L("noch nicht fällig","henüz değil","not due")}</span>
           :<span style={{display:"flex",gap:8,alignItems:"center"}}>
             {r.status==="paid"&&<b style={{color:theme.accent,fontSize:13}}>✓ {_L("bezahlt","ödendi","paid")}</b>}
             {r.status==="partial"&&<b style={{color:"#f59e0b",fontSize:13}}>~ {_e(r.bezahlt)}</b>}
             {r.status==="open"&&<b style={{color:theme.danger,fontSize:13}}>✗ {_L("offen","açık","open")}</b>}
             {r.status==="paid"
               ?<button style={{padding:"5px 10px",background:"transparent",border:"1.5px solid "+theme.danger,color:theme.danger,borderRadius:7,fontSize:12,cursor:"pointer"}} onClick={()=>unpayMonth(m,r.monat)}>✗ {_L("Nicht bezahlt","Ödenmedi","Unpaid")}</button>
               :<button style={{padding:"5px 10px",background:theme.accent,color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer"}} onClick={()=>payMonth(m,r.monat)}>✓ {_L("Bezahlt","Ödendi","Paid")}</button>}
           </span>}
        </div>)}
      </div>
      {/* ── ÜBERGABE (Sprint 1): Einzug/Auszug protocol — the landlord's paper replacement ── */}
      <div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>{_L("Übergabe","Devir teslim","Handover")}</div>
        {prots.map(x=>(<div key={x.id} onClick={()=>openProt(x.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid "+theme.border,cursor:"pointer"}}>
          <span style={{color:theme.text,fontWeight:600}}>🔑 {x.art==="einzug"?_L("Einzug","Giriş","Move-in"):_L("Auszug","Çıkış","Move-out")}
            <span style={{fontSize:12,color:theme.textMuted,fontWeight:400}}> · {x.datum||""}</span></span>
          <span style={{fontSize:12,fontWeight:700,color:x.gesperrt?theme.accent:"#f59e0b"}}>{x.gesperrt?"🔒 "+_L("abgeschlossen","tamamlandı","completed"):"✎ "+_L("Entwurf","Taslak","Draft")}</span>
        </div>))}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>
          <button style={{...css.btnOutline,padding:"8px 12px",fontSize:13}} onClick={()=>newProt(m,"einzug")}>➕ {_L("Einzugsprotokoll","Giriş protokolü","Move-in protocol")}</button>
          <button style={{...css.btnOutline,padding:"8px 12px",fontSize:13}} onClick={()=>newProt(m,"auszug")}>➕ {_L("Auszugsprotokoll","Çıkış protokolü","Move-out protocol")}</button>
        </div>
      </div>
      {wizard&&<UebergabeWizard prot={wizard} showToast={showToast}
        onClose={()=>{setWizard(null);fetchProts(m);}} onDone={()=>fetchProts(m)}/>}

      {/* ── ZÄHLERSTÄNDE (Masterplan #7): history + consumption, DERIVED by the backend ── */}
      {zae&&<div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>{_L("Zählerstände","Sayaç değerleri","Meter readings")}</div>
        {["strom","wasser","warmwasser","gas","heizung"].map(art=>{const z=zae.zaehler[art];if(!z)return null;
          const ms=z.messungen||[];const va=zadd[art]||{};
          const vs=ms.map(x=>x.verbrauch).filter(x=>x!=null);const mx=Math.max(1,...vs);
          const icon={strom:"⚡",wasser:"💧",warmwasser:"🚿",gas:"🔥",heizung:"🌡️"}[art];
          return(<div key={art} style={{marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+theme.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontWeight:700,color:theme.text,fontSize:14}}>{icon} {z.label}</span>
              <span style={{fontSize:13,color:theme.textMuted}}>{z.letzter_stand!=null?<b style={{color:theme.text}}>{z.letzter_stand} {z.einheit}</b>:_L("keine Messung","ölçüm yok","no reading")}</span>
            </div>
            {ms.length>0&&<div style={{marginBottom:6}}>
              {ms.map(x=>(<div key={x.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:theme.textMuted,padding:"2px 0"}}>
                <span>{x.datum}{x.zaehler_nr?" · Nr. "+x.zaehler_nr:""}</span>
                <span>{x.stand} {z.einheit}
                  {x.verbrauch!=null&&<b style={{color:theme.accent,marginLeft:6}}>+{x.verbrauch}</b>}
                  {x.hinweis&&<span style={{color:"#f59e0b",marginLeft:6}}>⚠ {x.hinweis}</span>}
                </span>
              </div>))}
              {vs.length>0&&<div style={{display:"flex",alignItems:"flex-end",gap:3,height:34,marginTop:6}}>
                {vs.map((v,i)=><div key={i} title={String(v)} style={{flex:1,minWidth:6,height:Math.max(3,v/mx*32),background:theme.accent,borderRadius:2,opacity:0.75}}></div>)}
              </div>}
            </div>}
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <input style={{flex:"1 1 90px",minWidth:80,padding:"7px 9px",background:theme.surfaceAlt,border:"1px solid "+theme.border,borderRadius:8,color:theme.text,fontSize:13}}
                type="number" inputMode="decimal" placeholder={z.einheit} value={va.stand||""} onChange={e=>setZadd({...zadd,[art]:{...va,stand:e.target.value}})}/>
              <input style={{flex:"0 1 110px",padding:"7px 9px",background:theme.surfaceAlt,border:"1px solid "+theme.border,borderRadius:8,color:theme.text,fontSize:13}}
                type="date" value={va.datum||new Date().toISOString().slice(0,10)} onChange={e=>setZadd({...zadd,[art]:{...va,datum:e.target.value}})}/>
              <button onClick={()=>addZae(m,art)} style={{padding:"7px 12px",background:theme.accent,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
            </div>
          </div>);})}
        <div style={{fontSize:11,color:theme.textDim}}>{_L("Verbrauch wird automatisch aus zwei Messungen berechnet.","Tüketim iki ölçümden otomatik hesaplanır.","Consumption is derived from two readings.")}</div>
      </div>}

      {/* ── ANMELDUNG / WGB: the chip that could never be ticked (Masterplan #5) ── */}
      <div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>{_L("Anmeldung beim Amt","Belediye kaydı","Registration")}</div>
        <div style={{fontSize:13,color:theme.textMuted,marginBottom:10}}>
          {_L("Der Mieter braucht die Wohnungsgeberbestätigung (§ 19 BMG) für die Anmeldung.","Kiracı belediye kaydı için ev sahibi onayına (§19 BMG) ihtiyaç duyar.","The tenant needs the landlord confirmation (§19 BMG) to register.")}
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <button style={{...css.btnOutline,padding:"8px 12px",fontSize:13}} onClick={()=>dlWgb(m.tenancy_id)}>📄 Wohnungsgeberbestätigung</button>
          <label style={{display:"flex",alignItems:"center",gap:7,fontSize:13,color:theme.text,cursor:"pointer",padding:"8px 4px"}}>
            <input type="checkbox" checked={!!m.anmeldung_done} onChange={e=>setAnmeldung(m,e.target.checked)} style={{width:18,height:18,cursor:"pointer"}}/>
            {_L("Anmeldung erledigt","Kayıt yapıldı","Registration done")}
          </label>
        </div>
      </div>
      {mh&&(mh.mahnungen||[]).length>0&&<div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:11,color:theme.textDim,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>{_L("Mahnungen","İhtarlar","Dunning letters")} ({mh.gesendet})</div>
        {(mh.mahnungen||[]).map(x=>(<div key={x.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:"1px solid "+theme.border}}>
          <span style={{color:theme.text}}>{x.stufe_text}</span>
          <span style={{color:theme.textMuted}}>{x.datum} · <b style={{color:theme.text}}>{_e(x.betrag)}</b></span>
        </div>))}
        <div style={{fontSize:12,color:theme.textMuted,marginTop:8}}>{_L("Nächster Schritt","Sonraki adım","Next step")}: <b style={{color:"#f59e0b"}}>{mh.naechste_stufe_text}</b></div>
      </div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button style={{...css.btnOutline,padding:"8px 12px",fontSize:13}} onClick={()=>dlWgb(m.tenancy_id)}>📄 Wohnungsgeberbestätigung</button>
        {(m.offene_forderung||0)>0&&<button style={{...css.btnOutline,padding:"8px 12px",fontSize:13,borderColor:"#f59e0b",color:"#f59e0b"}} onClick={async()=>{await dlMahnung(m);fetchMh(m);}}>📨 {mh?mh.naechste_stufe_text:_L("Mahnung","İhtar","Mahnung")}</button>}
      </div>
    </div>);}
  return(<div style={{maxWidth:1000,margin:"0 auto"}}>
    <div style={{marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
      <div>
        <div style={{fontSize:22,fontWeight:800,color:theme.text}}>👥 {_L("Mieter","Kiracılar","Tenants")}</div>
        <div style={{fontSize:13,color:theme.textMuted}}>{rows.length} {_L("Mieter","kiracı","tenants")} · {rows.filter(m=>m.debtor).length} {_L("im Rückstand","borçlu","in arrears")}</div>
      </div>
      <button onClick={()=>setShowErf(!showErf)} style={{padding:"10px 16px",background:theme.accent,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>➕ {_L("Neuer Mieter","Yeni kiracı","New tenant")}</button>
    </div>
    {showErf&&<div style={{...css.card,marginBottom:14,maxWidth:560}}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:2}}>➕ {_L("Neuer Mieter erfassen","Yeni kiracı kaydet","Add tenant")}</div>
      <div style={{fontSize:12,color:theme.textDim,marginBottom:14}}>{_L("Einmal eingeben, fertig. Keine monatliche Eingabe.","Bir kez gir, bitti. Aylık tekrar yok.","Enter once, done.")}</div>
      {_efR(1,_L("Wohnung / Daire ID","Daire ID","Unit ID"),"daire",{placeholder:"WHG-01 · EG links"},_L("Ihr eigener Name für die Wohnung — z.B. „EG links“. Nur zur Wiedererkennung.","Daireye kendi verdiğiniz ad — ör. „Zemin sol“. Sadece tanımak için.","Your own label for the flat — e.g. „Ground floor left“. Just so you recognise it."))}
      {_efR(2,_L("Immobilie · Adresse","Adres","Address"),"adresse",{placeholder:"Wiesenstr. 10, 66115 Saarbrücken"},_L("Adresse des Hauses. Erscheint später auf Mahnung und Wohnungsgeberbestätigung.","Binanın adresi. Sonradan ihtar ve WGB belgesinde görünür.","Address of the building. It appears later on the Mahnung and the WGB."))}

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

              <div style={{fontSize:10,color:theme.textDim,marginTop:2}}>{_L("Für die Nebenkosten (z.B. Wasser, Müll).","Yan gider için (ör. su, çöp).","For the utility-cost split (e.g. water, waste).")}</div></div>

// ── Nebenkosten editor — shared by the property tab AND the sidebar "Nebenkosten" view.
// Self-contained: the backend derives every share/Vorauszahlung/Leerstand/lock; this only collects
// costs (open grid) and displays. propertyId is the object being billed.
function NkEditor({propertyId,showToast}){
  const _L=(de,tr,en)=>getLang()==="tr"?tr:(getLang()==="en"?en:de);
  const _e=n=>"€"+(Number(n)||0).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
  const _btn=(c)=>({padding:"9px 16px",background:c,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"});
  const _tk=()=>localStorage.getItem("atx_token");
  const NK_SCHL=[["","(Standard)"],["wohnflaeche","Wohnfläche (m²)"],["wohneinheiten","Wohneinheiten"],["personenzahl","Personenzahl"],["verbrauch","Verbrauch"],["individuell","Individuell"]];
  const NK_STD=[["heizkosten","Heizkosten"],["warmwasser","Warmwasser"],["wasser","Wasser (kalt)"],["abwasser","Abwasser"],["muell","Müllabfuhr"],["grundsteuer","Grundsteuer"],["gebaeudeversicherung","Gebäudeversicherung"],["hausmeister","Hausmeister"],["allgemeinstrom","Allgemeinstrom"],["gartenpflege","Gartenpflege"],["schornsteinfeger","Schornsteinfeger"],["winterdienst","Winterdienst"],["strassenreinigung","Straßenreinigung"],["sonstige","Sonstige"]];
  // each category's legal default split method (mirrors the backend BetrKV meta) — shown so the user
  // sees WHAT "(Standard)" divides by, per line, before entering anything.
  const NK_DEF={heizkosten:"verbrauch",warmwasser:"verbrauch",wasser:"wohnflaeche",abwasser:"wohnflaeche",muell:"personenzahl",grundsteuer:"wohnflaeche",gebaeudeversicherung:"wohnflaeche",hausmeister:"wohnflaeche",allgemeinstrom:"wohnflaeche",gartenpflege:"wohnflaeche",schornsteinfeger:"wohnflaeche",winterdienst:"wohnflaeche",strassenreinigung:"wohnflaeche",sonstige:"wohnflaeche"};
  const schlLabel=(k)=>{const f=NK_SCHL.find(x=>x[0]===k);return f?f[1]:k;};
  const [nkList,setNkList]=React.useState([]);
  const [nkOpen,setNkOpen]=React.useState(null);
  const [nkGrid,setNkGrid]=React.useState({});
  const [nkSchl,setNkSchl]=React.useState({});
  const loadNk=(pid)=>api("/immo/nk?property_id="+pid).then(d=>setNkList(d.abrechnungen||[])).catch(()=>setNkList([]));
  React.useEffect(()=>{setNkOpen(null);if(propertyId)loadNk(propertyId);},[propertyId]);
  const openNk=async(aid)=>{try{setNkGrid({});setNkSchl({});setNkOpen(await api("/immo/nk/"+aid));}catch(e){alert(e.message);}};
  const newNk=async()=>{const jahr=parseInt(prompt(_L("Abrechnungsjahr","Hesap yılı","Settlement year"),String(new Date().getFullYear()-1)));if(!jahr)return;try{const a=await api("/immo/nk",{method:"POST",body:JSON.stringify({property_id:propertyId,jahr:jahr})});setNkGrid({});setNkSchl({});setNkOpen(a);loadNk(propertyId);}catch(e){alert(e.message);}};
  // Delete a DRAFT statement (wrongly created ones). Finalised statements are immutable (409) — those
  // must be unlocked first. Backend soft-deletes; the list reloads.
  const delNk=async(aid,e)=>{if(e)e.stopPropagation();
    if(!confirm(_L("Diese Abrechnung (Entwurf) löschen?","Bu hesabı (taslak) sil?","Delete this draft statement?")))return;
    try{await api("/immo/nk/"+aid,{method:"DELETE"});if(nkOpen&&nkOpen.id===aid)setNkOpen(null);loadNk(propertyId);
      if(showToast)showToast(_L("Gelöscht","Silindi","Deleted"),"info");}catch(e){alert(e.message);}};
  const nkPosOf=(kat)=>((nkOpen&&nkOpen.positionen)||[]).find(p=>p.kategorie===kat);
  const nkSaveRow=async(kat)=>{const raw=nkGrid[kat];if(raw===undefined)return;const amt=parseFloat(raw);const ex=nkPosOf(kat);
    try{let a;
      if(ex){if(!(amt>0))a=await api("/immo/nk/"+nkOpen.id+"/position/"+ex.id,{method:"DELETE"});
             else a=await api("/immo/nk/"+nkOpen.id+"/position/"+ex.id,{method:"PATCH",body:JSON.stringify({betrag:amt})});}
      else if(amt>0){const body={kategorie:kat,betrag:amt};if(nkSchl[kat])body.schluessel=nkSchl[kat];
             a=await api("/immo/nk/"+nkOpen.id+"/position",{method:"POST",body:JSON.stringify(body)});}
      else return;
      setNkOpen(a);setNkGrid(g=>{const n={...g};delete n[kat];return n;});
    }catch(e){alert(e.message);}};
  const nkSaveSchl=async(kat,schl)=>{setNkSchl(s=>({...s,[kat]:schl}));const ex=nkPosOf(kat);
    if(ex){try{setNkOpen(await api("/immo/nk/"+nkOpen.id+"/position/"+ex.id,{method:"PATCH",body:JSON.stringify({schluessel:schl})}));}catch(e){alert(e.message);}}};
  const finalizeNk=async()=>{if(!confirm(_L("Abrechnung abschließen?\n\nDanach nicht mehr änderbar (nur Entsperren).","Hesap kapatılsın mı?\n\nSonra değiştirilemez (sadece kilit açma).","Finalise?\n\nNot editable afterwards (only unlock).")))return;try{const a=await api("/immo/nk/"+nkOpen.id+"/finalisieren",{method:"POST"});setNkOpen(a);loadNk(propertyId);if(showToast)showToast(_L("Abgeschlossen ✓","Kapatıldı ✓","Finalised ✓"),"success");}catch(e){alert(e.message);}};
  const unlockNk=async()=>{if(!confirm(_L("Entsperren und wieder bearbeitbar machen?","Kilidi aç ve düzenlenebilir yap?","Unlock and make editable again?")))return;try{setNkOpen(await api("/immo/nk/"+nkOpen.id+"/entsperren",{method:"POST"}));loadNk(propertyId);}catch(e){alert(e.message);}};
  const nkPdf=async(tid)=>{try{const r=await fetch(API+"/immo/nk/"+nkOpen.id+"/pdf"+(tid?"?tenancy_id="+tid:""),{headers:{Authorization:"Bearer "+_tk()}});if(!r.ok){alert("PDF "+r.status);return;}const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="Nebenkosten_"+nkOpen.jahr+(tid?"_"+tid:"_Uebersicht")+".pdf";a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}catch(e){alert(e.message);}};

function VaultView({onNav,triggerRefresh}){
  const[items,setItems]=useState([]);const[search,setSearch]=useState("");const[loading,setLoading]=useState(true);
  const[preview,setPreview]=useState(null);const[selected,setSelected]=useState(new Set());
  const load=(q)=>{setLoading(true);api("/vault"+(q?"?search="+encodeURIComponent(q):"")).then(d=>{setItems(d.items||[]);setSelected(new Set());}).catch(()=>{}).finally(()=>setLoading(false));};
  useEffect(()=>{load();},[]);
  const delOne=async(id)=>{if(!confirm(_t("confirm_delete")))return;try{await api("/invoices/"+id,{method:"DELETE"});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const delSelected=async()=>{if(!selected.size)return;if(!confirm(selected.size+(getLang()==="de"?" Beleg(e) wirklich löschen?":" receipt(s) really delete?")))return;try{await api("/invoices/bulk-delete",{method:"POST",body:JSON.stringify({ids:[...selected]})});load();if(triggerRefresh)triggerRefresh();}catch(e){alert(e.message);}};
  const toggleSelect=(id)=>{setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});};
  const toggleAll=()=>{if(selected.size===items.length)setSelected(new Set());else setSelected(new Set(items.map(i=>i.id)));};
  const getFileUrl=async(id)=>{const tk=localStorage.getItem("atx_token");const r=await fetch(API+"/vault/"+id+"/download",{headers:{"Authorization":"Bearer "+tk}});if(!r.ok)return null;const blob=await r.blob();return{url:URL.createObjectURL(blob),type:blob.type};};
  const openPreview=async(item)=>{const f=await getFileUrl(item.id);if(!f){alert("Datei nicht verfügbar");return;}setPreview({...item,...f});};
  const download=async(id,fname)=>{const f=await getFileUrl(id);if(!f){alert("Datei nicht verfügbar");return;}const a=document.createElement("a");a.href=f.url;a.download=fname||"beleg";a.click();URL.revokeObjectURL(f.url);};
  return(<div>
    <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:"0 0 4px"}}>{_t("vault")}</h2>

function TableImportView({triggerRefresh,showToast,onNav}){
  const[file,setFile]=useState(null);const[files,setFiles]=useState([]);const[rows,setRows]=useState([]);const[csv,setCsv]=useState("");const[loading,setLoading]=useState(false);const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(0);
  const[step,setStep]=useState("");const[errorMsg,setErrorMsg]=useState("");const[rawRows,setRawRows]=useState([]);const[showRaw,setShowRaw]=useState(false);
  const fileRef=useRef(null);const tableRef=useRef(null);
  const[mode,setMode]=useState("image");
  const[showTable,setShowTable]=useState(false);
  // Column mapping for CSV/XLSX
  const[rawTable,setRawTable]=useState([]);// 2D array: [[cell,cell,...],...]
  const[colMap,setColMap]=useState({date:-1,description:-1,expense:-1,income:-1});
  const[showMapping,setShowMapping]=useState(false);
  // Online / offline detection (iter O)
  const[online,setOnline]=useState(()=>typeof navigator!=="undefined"?navigator.onLine:true);
  const[queuedFile,setQueuedFile]=useState(null);
  const[uncertainCount,setUncertainCount]=useState(0);
  const[modelUsed,setModelUsed]=useState("");
  // Gelir/gider tipi override — el yazisi tablolarda sutun belirsizligini cozer.
  // 'expense' (Ausgaben, varsayilan) | 'income' (Einnahmen) | 'auto' (model karar verir)
  const[forceType,setForceType]=useState("auto");
  useEffect(()=>{
    const goOn=()=>setOnline(true);
    const goOff=()=>setOnline(false);
    window.addEventListener("online",goOn);
    window.addEventListener("offline",goOff);
    return()=>{window.removeEventListener("online",goOn);window.removeEventListener("offline",goOff);};
  },[]);
  // Queue file in IndexedDB-like fallback: localStorage (small files only)
  const queueOfflineUpload=(f)=>{
    if(!f)return;
    try{
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          localStorage.setItem("atx_tableimport_queued",JSON.stringify({
            name:f.name,type:f.type,data:reader.result,queued_at:Date.now(),
          }));
          setQueuedFile({name:f.name,size:f.size,queued:true});
        }catch(e){/* localStorage quota — skip */}
      };
      reader.readAsDataURL(f);
    }catch(e){}
  };

  const resetAll=()=>{setFile(null);setFiles([]);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);setShowMapping(false);setRawTable([]);setRawRows([]);setShowRaw(false);};
  const handleFile=(e)=>{const fl=Array.from(e.target.files||[]);if(fl.length){resetAll();setFiles(fl);setFile(fl[0]);}e.target.value="";};

  /* Sort table-import rows chronologically by date.
     Handles DD.MM.YYYY, DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD and 2-digit years.
     Unparseable dates keep their relative order at the end. */
  const sortRowsByDate=(arr)=>{
    const parseDate=(s)=>{
      if(!s)return Number.MAX_SAFE_INTEGER;
      const str=String(s).trim();
      // DD.MM.YYYY or DD/MM/YYYY or DD-MM-YYYY
      let m=str.match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})$/);
      if(m){
        let y=m[3];if(y.length===2)y="20"+y;
        return parseInt(y)*10000+parseInt(m[2])*100+parseInt(m[1]);
      }
      // YYYY-MM-DD (ISO)
      m=str.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
      if(m)return parseInt(m[1])*10000+parseInt(m[2])*100+parseInt(m[3]);
      return Number.MAX_SAFE_INTEGER;
    };
    return [...arr].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  };

  const applyMapping=()=>{
    if(colMap.date===-1&&colMap.description===-1){setErrorMsg("Please assign at least date or description.");return;}
    const dataRows=rawTable.slice(1);// skip header
    const mapped=[];
    for(const row of dataRows){
      const date=colMap.date>=0?(row[colMap.date]||"").trim():"";
      const desc=colMap.description>=0?(row[colMap.description]||"").trim():"Eintrag";
      const expRaw=colMap.expense>=0?(row[colMap.expense]||"").trim():"";
      const incRaw=colMap.income>=0?(row[colMap.income]||"").trim():"";
      const parseNum=(s)=>{s=s.replace(/[€$₺\s]/g,"");if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",",".");else if(s.includes(","))s=s.replace(",",".");return parseFloat(s)||0;};
      const expense=parseNum(expRaw);
      const income=parseNum(incRaw);
      if(!date&&!desc)continue;
      if(expense===0&&income===0&&!expRaw&&!incRaw)continue;
      mapped.push({date,description:desc||"Eintrag",expense,income,is_uncertain:expense===0&&income===0});
    }
    if(!mapped.length){setErrorMsg(_t("no_valid_rows"));return;}
    setRows(sortRowsByDate(mapped));setShowMapping(false);setShowTable(true);
    setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);
  };

  const steps=["Reading file...","Detecting structure...","Mapping columns...","Creating entries..."];

  // Kullanici secimine gore TUM satirlarin gelir/gider tipini zorlar.
  // 'auto' ise modelin/sutunlarin karari kalir. Tutar hangi alandaysa (income||expense)
  // onu secilen tipe tasir, digerini sifirlar. Belirsiz (ikisi de 0) satira dokunmaz.
  const applyForceType=(rws)=>{
    if(!Array.isArray(rws)||forceType==="auto")return rws;
    return rws.map(r=>{
      const amt=(r.income||r.expense||0);
      if(forceType==="income")return{...r,income:amt,expense:0};
      return{...r,expense:amt,income:0};
    });
  };

  const analyze=async()=>{
    if(!file)return;setLoading(true);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);
    let si=0;const iv=setInterval(()=>{si=(si+1)%steps.length;setStep(steps[si]);},1800);
    setStep(steps[0]);
    const tk=localStorage.getItem("atx_token");
    const fd=new FormData();fd.append("file",file);
    try{
      let endpoint="/api/import-image";
      if(mode==="csv")endpoint="/bookkeeping/import-csv";
      else if(mode==="xlsx")endpoint="/bookkeeping/import-xlsx";
      else if(mode==="datev")endpoint="/bookkeeping/import-datev";

      if(mode==="image"||mode==="xlsx"||mode==="datev"){
        // All modes: server-side processing
        const r=await fetch(API+endpoint,{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd});
        const d=await r.json();
        if(d.success){
          if(d.rows&&d.rows.length>0){
            const _typed=applyForceType(d.rows);
            setRows(_typed);setCsv(d.csv||"");setRawRows(d.raw_rows||[]);
            // Auto-save rows to Kassenbuch+Rechnungen on server
            const validRows=_typed.filter(rr=>!rr.is_uncertain&&(rr.income>0||rr.expense>0));
            if(validRows.length>0){
              let autoSaved=0;
              const autoCreatedInvIds=[];
              for(const rr of validRows){
                try{
                  const amount=rr.income>0?rr.income:rr.expense;
                  const entryType=rr.income>0?"income":"expense";
                  const body={description:rr.description||"Import",vendor:(rr.description||"Import").substring(0,50),gross_amount:amount,entry_type:entryType,vat_rate:"19%",category:"other",payment_method:"",reference:"",notes:"Tabelle Import",date:rr.date||""};
                  const sr=await fetch(API+"/bookkeeping",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify(body)});
                  if(sr.ok){
                    autoSaved++;
                    try{const dj=await sr.json();if(dj.invoice_id)autoCreatedInvIds.push(dj.invoice_id);}catch(ex){}
                  }
                }catch(ex){}
              }
              // Attach original photo to auto-created invoices so "Original" button in Beleg Editor works
              if(file&&autoCreatedInvIds.length>0){
                for(const invId of autoCreatedInvIds){
                  try{const fd2=new FormData();fd2.append("file",file);await fetch(API+"/vault/"+invId+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd2});}catch(ex){}
                }
              }
              if(autoSaved>0){
                if(triggerRefresh)triggerRefresh();
                if(showToast)showToast(autoSaved+" → Kassenbuch + Rechnungen","success");
              }
            }
            setTimeout(()=>{setShowTable(true);setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);},100);
          }
          else if(d.imported>0){
            clearInterval(iv);setStep("");setLoading(false);
            if(triggerRefresh)triggerRefresh();
            const _msg=getLang()==="de"
              ?"✅ "+d.imported+" Einträge erfolgreich importiert.\n\n📒 Gespeichert in: Kassenbuch & Rechnungen\n📁 Quelldatei: "+(file?.name||"Excel")+"\n\nJetzt zum Kassenbuch wechseln?"
              :"✅ "+d.imported+" entries imported successfully.\n\n📒 Saved to: Cash Book & Invoices\n📁 Source: "+(file?.name||"Excel")+"\n\nGo to Cash Book now?";
            const goTo=confirm(_msg);
            if(goTo&&onNav)onNav("bookkeeping");
            return;}
          else{setRawRows(d.raw_rows||[]);setErrorMsg(_t("no_table"));}
        }else{setErrorMsg(_extractErr(d)||"Import failed");}
      }else{
        // CSV only: parse client-side for column mapping
        try{
          const text=await file.text();
          const sep=text.includes(";")?";":","
          const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!l.trim().startsWith("#")&&!l.trim().toUpperCase().startsWith("HINWEIS"));
          const table=lines.map(l=>{
            const cells=[];let cur="";let inQ=false;
            for(let c=0;c<l.length;c++){if(l[c]==='"'){inQ=!inQ;}else if(l[c]===sep&&!inQ){cells.push(cur.trim());cur="";}else{cur+=l[c];}}
            cells.push(cur.trim());return cells;
          });
          if(table.length<2){setErrorMsg("File empty or invalid.");clearInterval(iv);setStep("");setLoading(false);return;}
          setRawTable(table);
          // Auto-detect columns from header
          const hdr=table[0].map(h=>h.toLowerCase());
          const newMap={date:-1,description:-1,expense:-1,income:-1};
          hdr.forEach((h,i)=>{
            if(/datum|date|tarih/.test(h))newMap.date=i;
            else if(/beschreibung|description|vendor|lieferant|text|bezeichnung/.test(h))newMap.description=i;
            else if(/ausgabe|expense|betrag|amount|kosten/.test(h))newMap.expense=i;
            else if(/einnahme|income|revenue|umsatz/.test(h))newMap.income=i;
          });
          // If no expense found, try amount column
          if(newMap.expense===-1){hdr.forEach((h,i)=>{if(i!==newMap.date&&i!==newMap.description&&i!==newMap.income&&/\d/.test(table[1]?.[i]||""))newMap.expense=i;});}
          setColMap(newMap);setShowMapping(true);
          setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);
        }catch(ex){setErrorMsg("CSV/Excel could not be read: "+ex.message);}
      }
    }catch(e){setErrorMsg("Verbindungsfehler — bitte erneut versuchen.");}
    clearInterval(iv);setStep("");setLoading(false);
  };

  // 🤖 KI: opt-in alternatif parse. /api/import-image'a dokunmaz —
  // ayri endpoint /api/import-image-ki cagirir. Hata olursa kullanici
  // normal "🔍 Tabelle erkennen" akisina geri donebilir.
  const analyzeKi=async()=>{
    const fileList=(files&&files.length)?files:(file?[file]:[]);
    if(!fileList.length)return;
    if(mode!=="image"){if(showToast)showToast("KI nur fuer Bilder/PDF","warn");return;}
    setLoading(true);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);
    const tk=localStorage.getItem("atx_token");
    // One API call per file (image: page<0 → whole image; PDF: a given page index).
    const callPage=async(theFile,pageIdx)=>{
      const fd=new FormData();fd.append("file",theFile);
      const url=API+"/api/import-image-ki"+(pageIdx>=0?("?page="+pageIdx):"");
      const r=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd});
      const d=await r.json().catch(()=>({}));
      return{ok:r.ok,status:r.status,d};
    };
    const N=fileList.length;
    let allRows=[];let expected=0,found=0;let pageNo=0;let failed=0;const failedNames=[];
    try{
      // Loop EVERY selected file (100 jpg's möglich). A file/page failing must NEVER
      // abort the batch — it is counted + reported so the user can re-upload only those.
      for(let fi=0;fi<N;fi++){
        const f=fileList[fi];
        const isPdf=/\.pdf$/i.test(f.name||"")||/pdf/i.test(f.type||"");
        setStep("🪄 "+(fi+1)+"/"+N+" — "+(f.name||"").substring(0,22)+" … "+allRows.length+" Zeilen");
        try{
          const first=await callPage(f,isPdf?0:-1);
          if(!first.ok||!((first.d.rows||[]).length)){failed++;failedNames.push(f.name||("Datei "+(fi+1)));continue;}
          pageNo++;
          allRows=allRows.concat((first.d.rows||[]).map(rr=>({...rr,page:pageNo,_src:f.name})));
          expected+=(first.d.expected_rows||0);found+=(first.d.found_rows||(first.d.rows||[]).length);
          const pc=isPdf?Math.max(1,Math.min(150,first.d.page_count||1)):1;
          for(let p=1;p<pc;p++){
            setStep("🪄 "+(fi+1)+"/"+N+" — Seite "+(p+1)+"/"+pc+" … "+allRows.length+" Zeilen");
            try{const res=await callPage(f,p);if(res.ok&&(res.d.rows||[]).length){pageNo++;allRows=allRows.concat((res.d.rows||[]).map(rr=>({...rr,page:pageNo,_src:f.name})));expected+=(res.d.expected_rows||0);found+=(res.d.found_rows||(res.d.rows||[]).length);}}catch(ex){}
          }
        }catch(ex){failed++;failedNames.push(f.name||("Datei "+(fi+1)));}
      }
      if(!allRows.length){setErrorMsg("KI hat keine Zeilen gefunden"+(failed?(" · "+failed+" Datei(en) ohne Treffer"):""));setLoading(false);setStep("");return;}
      // row_no = defterin GERÇEK basılı Nr'si (vision okudu) — EZME. Sadece okunamayan (null) olanlara sıra ver.
      allRows.forEach((rr,ix)=>{if(rr.row_no==null||rr.row_no==="")rr.row_no=null; rr._seq=ix+1;});
      const lost=Math.max(0,expected-found);
      setRows(sortRowsByDate(applyForceType(allRows)));setCsv("");setRawRows([]);
      const rep="🪄 "+N+" Datei(en) · "+pageNo+" Seite(n) · "+allRows.length+" Zeilen"+(failed?(" · ⚠ "+failed+" ohne Treffer"):"")+(lost>0?(" · ⚠ ~"+lost+" evtl. fehlend"):"");
      if(showToast)showToast(rep+" — prüfen + speichern",(lost>0||failed)?"warn":"success");
      if(lost>0||failed)setErrorMsg("Bericht: "+N+" Datei(en) · "+pageNo+" Seite(n) · erwartet "+expected+" · gefunden "+found+(failed?(" · "+failed+" Datei(en) OHNE Treffer: "+failedNames.slice(0,8).join(", ")+(failedNames.length>8?" …":"")):"")+" — bitte prüfen (diese erneut hochladen).");
      setTimeout(()=>{setShowTable(true);setTimeout(()=>{tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},200);},100);
    }catch(e){setErrorMsg("KI Verbindungsfehler — "+(e.message||e));}
    setLoading(false);setStep("");
  };

  const isTable=rows.length>1; // true=Kassenbuch table, false=single invoice
  const saveRows=async()=>{
    if(!rows.length)return;
    if(!isTable){setErrorMsg("Single receipt — please use Upload. Table Import is for cash book tables (multiple entries).");return;}
    // Save EVERY detected row. Rows whose amount could not be read are saved as a
    // 0,00 placeholder flagged "BETRAG FEHLT" so NO row is ever lost — the user
    // fills the amount later directly in the Kassenbuch.
    const _hasAmt=r=>(Number(r.income)>0||Number(r.expense)>0);
    const _amt=r=>(Number(r.income)>0?Number(r.income):(Number(r.expense)>0?Number(r.expense):0));
    const validRows=rows;                          // ALLE Zeilen (auch ohne Betrag)
    const noAmountCount=rows.filter(r=>!_hasAmt(r)).length;
    if(!validRows.length){setErrorMsg("Keine Zeilen.");return;}
    setSaving(true);setStep("Einträge werden gespeichert...");setErrorMsg("");
    const tk=localStorage.getItem("atx_token");
    let ok=0;
    try{
      // Check for duplicates first
      const existingRes=await fetch(API+"/bookkeeping?limit=10000",{headers:{"Authorization":"Bearer "+tk}});
      const existingData=await existingRes.json();
      const existingEntries=(existingData.items||[]);
      // DEDUP anahtarı artık Nr içerir (reference). Aynı isim+tutar+tarihli MEŞRU tekrarlar
      // (farklı Nr) artık DÜŞMEZ; sadece gerçek re-upload (aynı Nr) atlanır. Nr-siz satır
      // benzersiz anahtar alır → asla düşmez. (P0 fix — chunked kayıp 0.)
      const existingKeys=new Set(existingEntries.map(e=>"NR:"+(e.reference||("X"+e.id))+"|"+e.gross_amount+"|"+(e.date||"").slice(0,10)));
      let dupCount=0; let _uc=0;
      const newRows=[];
      for(const r of validRows){
        const _n=(r.row_no!=null&&r.row_no!=="")?parseInt(r.row_no,10):null;
        const key=_n!=null?("NR:"+String(_n).padStart(5,"0")+"|"+_amt(r)+"|"+(r.date||"").slice(0,10)):("U:"+(++_uc)+":"+(r._seq||0));
        if(existingKeys.has(key)){dupCount++;}else{newRows.push(r);}
      }
      if(dupCount>0&&newRows.length===0){
        if(showToast)showToast(getLang()==="de"?"Alle Einträge bereits gespeichert":"All entries already saved","info");
        setSaving(false);setStep("");setSaved(dupCount);return;
      }
      if(dupCount>0){
        if(!confirm("⚠️ "+dupCount+" "+_t("entries")+" already in Cash Book, "+newRows.length+" new.\n\nSave new entries?")){setSaving(false);setStep("");return;}
      }
      const toSave=newRows.length>0?newRows:validRows;
      const createdInvIds=[];
      // saldo-kayma tespiti (sayfa içi, row_no sırasıyla): saldo[n]-saldo[n-1] ≈ net olmalı
      const _kayma=new Set();{const _bp={};rows.forEach(x=>{(_bp[x.page]=_bp[x.page]||[]).push(x);});Object.values(_bp).forEach(arr=>{arr.sort((a,b)=>(Number(a.row_no)||0)-(Number(b.row_no)||0));let _pv=null;arr.forEach(x=>{const _s=Number(x.saldo);if(x.saldo==null||isNaN(_s))return;const _nt=(Number(x.income)||0)-(Number(x.expense)||0);if(_pv!==null&&Math.abs((_s-_pv)-_nt)>0.02)_kayma.add(x);_pv=_s;});});}
      for(const r of toSave){
        const amount=_amt(r);
        const entryType=Number(r.income)>0?"income":"expense";
        const _noAmt=!_hasAmt(r);
        const _nr=(r.row_no!=null&&r.row_no!=="")?parseInt(r.row_no,10):null;
        const _ref=_nr!=null?String(_nr).padStart(5,"0"):("9"+String(r._seq||0).padStart(5,"0"));
        const _desc=(_nr!=null?("Nr"+_nr+" "):"")+(r.description||"Import");
        const body={description:_desc,vendor:(r.description||"Import").substring(0,50),gross_amount:amount,entry_type:entryType,vat_rate:"19%",category:"other",payment_method:"",reference:_ref,notes:((_noAmt?"Tabelle Import ⚠ BETRAG FEHLT – bitte ergänzen":(r.is_uncertain?"Tabelle Import ⚠ Betrag prüfen":"Tabelle Import"))+(amount>1000?" 💰>1000":"")+(_kayma.has(r)?" ⚠ KONTROL(saldo)":"")),date:r.date||""};
        const res=await fetch(API+"/bookkeeping",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify(body)});
        if(res.ok){ok++;try{const d=await res.json();if(d.invoice_id)createdInvIds.push(d.invoice_id);}catch(ex){}}
      }
      // Attach original photo to all created invoices
      if(file&&createdInvIds.length>0){
        for(const invId of createdInvIds){
          try{const fd=new FormData();fd.append("file",file);await fetch(API+"/vault/"+invId+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd});}catch(ex){}
        }
      }
      setSaved(ok);
      setRows([]);setShowTable(false);
      if(showToast)showToast(ok+" Einträge gespeichert"+(noAmountCount?" · "+noAmountCount+" ⚠ ohne Betrag (0,00 — ergänzen)":""),"success");
      if(noAmountCount>0)setErrorMsg(noAmountCount+" Zeile(n) ohne Betrag wurden als 0,00 gespeichert (⚠) — Betrag im Kassenbuch ergänzen.");
      else setErrorMsg("");
      if(triggerRefresh)triggerRefresh();
    }catch(e){setErrorMsg("Verbindungsfehler — "+ok+" of "+validRows.length+" gespeichert.");}
    setSaving(false);setStep("");
  };

  const editRow=(idx,field,val)=>setRows(prev=>prev.map((r,i)=>i===idx?{...r,[field]:field==="income"||field==="expense"?parseFloat(val)||0:val}:r));
  // 🤖 KI: bir 'unsicher' satiri Claude'a yollar, gelir/gider+vendor+kategori cikar
  const[aiRowBusy,setAiRowBusy]=useState({});// {idx:true} -> butonu disable et
  const aiFixRow=async(idx)=>{
    const r=rows[idx];if(!r)return;
    const desc=(r.description||"").trim();
    if(!desc){if(showToast)showToast("Keine Beschreibung — kann nicht parsen","warn");return;}
    setAiRowBusy(p=>({...p,[idx]:true}));
    try{
      const res=await api("/import/ai-row",{method:"POST",body:JSON.stringify({description:desc,date:r.date||"",hint_amount:(r.income||r.expense||0)})});
      const s=res&&res.suggestion;
      if(!s){if(showToast)showToast("AI hat nichts zurueckgegeben","warn");return;}
      // Sadece bos alanlari doldur — kullanicinin elle yazdiklari korunur
      setRows(prev=>prev.map((row,i)=>{
        if(i!==idx)return row;
        const nx={...row};
        if((!nx.income||nx.income===0)&&s.income>0)nx.income=s.income;
        if((!nx.expense||nx.expense===0)&&s.expense>0)nx.expense=s.expense;
        if((!nx.description||nx.description.length<3)&&s.description)nx.description=s.description;
        // is_uncertain bayragini kaldir (artik tutar var)
        if(nx.income>0||nx.expense>0)nx.is_uncertain=false;
        // AI'in dogru alanlarini metadata olarak sakla (UI hint icin)
        nx._ai_vendor=s.vendor;nx._ai_category=s.category;nx._ai_vat=s.vat_rate;nx._ai_conf=s.confidence;nx._ai_reason=s.reason;
        return nx;
      }));
      if(showToast){
        const conf=Math.round((s.confidence||0)*100);
        const amt=s.income>0?"+"+s.income.toFixed(2)+"€":"-"+s.expense.toFixed(2)+"€";
        showToast("🤖 "+amt+" · "+(s.category||"?")+" · "+conf+"% — bitte prüfen","success");
      }
    }catch(e){alert("AI-Fehler: "+(e.message||e));}
    finally{setAiRowBusy(p=>{const n={...p};delete n[idx];return n;});}
  };
  const totalIncome=rows.reduce((s,r)=>s+(r.income||0),0);
  const totalExpense=rows.reduce((s,r)=>s+(r.expense||0),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:24,maxWidth:900,width:"100%",overflowX:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>📊 {_t("tableimport")}</h2>
        <p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>{_t("bookkeeping")} — {_t("photo_label")}, CSV, Excel, DATEV</p>
      </div>
    </div>

    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {[["image","📸","Image / PDF","#8b5cf6"],["csv","📄","CSV","#3b82f6"],["xlsx","📊","Excel","#10b981"],["datev","🧾","DATEV","#f59e0b"]].map(([m,ico,lbl,clr])=><button key={m} style={{padding:"12px 22px",borderRadius:10,border:"2px solid "+(mode===m?clr:"transparent"),background:mode===m?clr+"22":theme.card,color:mode===m?clr:theme.textMuted,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all 0.2s",boxShadow:mode===m?"0 2px 12px "+clr+"33":"none"}} onClick={()=>{setMode(m);setFile(null);setRows([]);setCsv("");setSaved(0);setErrorMsg("");setShowTable(false);}}>
        {ico} {lbl}
      </button>)}
    </div>

    <div style={{...css.card,textAlign:"center",padding:file?24:48,border:"2px dashed "+(file?theme.accent:theme.border),cursor:"pointer",transition:"all 0.3s",background:file?"rgba(16,185,129,0.04)":theme.card}} onClick={()=>fileRef.current?.click()}>
      <input ref={fileRef} type="file" multiple={mode==="image"} accept={mode==="image"?"image/*,.pdf":mode==="csv"?".csv,.txt,.CSV,text/csv,text/plain,application/vnd.ms-excel":mode==="datev"?".csv,.txt,.CSV,text/csv":".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"} style={{display:"none"}} onChange={handleFile}/>
      {file?<div style={{animation:"fadeIn 0.3s ease"}}>
        <div style={{fontSize:32,marginBottom:4}}>✅</div>
        <div style={{fontSize:16,fontWeight:600,color:theme.text}}>{files.length>1?(files.length+(getLang()==="de"?" Dateien gewählt":getLang()==="tr"?" dosya seçildi":" files selected")):file.name}</div>
        <div style={{fontSize:12,color:theme.textMuted,marginTop:4}}>{files.length>1?((getLang()==="de"?"~"+(files.length*30)+" Zeilen erwartet · seitenweise gelesen — ":getLang()==="tr"?"~"+(files.length*30)+" satır bekleniyor · sayfa sayfa okunur — ":"~"+(files.length*30)+" rows expected — ")+_t("click_other_file")):((file.size/1024).toFixed(0)+" KB — "+_t("click_other_file"))}</div>
      </div>:<div>
        <div style={{fontSize:48,marginBottom:12,opacity:0.8}}>{mode==="image"?"📸":mode==="csv"?"📄":"📊"}</div>
        <div style={{fontSize:17,fontWeight:700,color:theme.text}}>{mode==="image"?_t("upload_photo_pdf"):mode==="csv"?_t("choose_csv"):_t("choose_excel")}</div>
        <div style={{fontSize:13,color:theme.textDim,marginTop:6}}>{mode==="image"?(getLang()==="de"?"Foto, Scan oder PDF — auch handschriftlich":"Photo, scan or PDF — also handwritten"):mode==="csv"?(getLang()==="de"?"CSV-Datei (.csv oder .txt)":"CSV file (.csv or .txt)"):mode==="datev"?(getLang()==="de"?"DATEV Buchungsstapel (.csv) — Umsatz;Soll/Haben;Konto;...":"DATEV posting file (.csv) — Umsatz;Soll/Haben;Konto;..."):(getLang()==="de"?"Excel-Datei (.xlsx oder .xls)":"Excel file (.xlsx or .xls)")}</div>
      </div>}
    </div>

    {mode==="image"&&file&&!loading&&!rows.length&&!saved&&<div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{color:theme.textMuted,fontWeight:600,fontSize:14}}>{getLang()==="de"?"Diese Tabelle enthält:":getLang()==="tr"?"Bu tablo:":"This table contains:"}</span>
      {[["expense",getLang()==="de"?"Ausgaben":getLang()==="tr"?"Giderler":"Expenses","#ef4444"],["income",getLang()==="de"?"Einnahmen":getLang()==="tr"?"Gelirler":"Income","#10b981"],["auto",getLang()==="de"?"Gemischt":getLang()==="tr"?"Karışık":"Mixed","#8b5cf6"]].map(([v,lbl,clr])=>
        <button key={v} type="button" onClick={()=>setForceType(v)} style={{padding:"8px 16px",borderRadius:8,border:"2px solid "+(forceType===v?clr:theme.border),background:forceType===v?clr+"22":theme.card,color:forceType===v?clr:theme.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{(forceType===v?"● ":"○ ")+lbl}</button>
      )}
    </div>}

    {file&&!loading&&!rows.length&&!saved&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button style={{background:"linear-gradient(135deg,#10b981,#3b82f6)",color:"#fff",border:"none",borderRadius:12,padding:"14px 28px",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(16,185,129,0.3)",transition:"all 0.3s",flex:mode==="image"?1:"1 1 100%"}} onClick={mode==="image"?analyzeKi:analyze} onMouseOver={e=>e.currentTarget.style.transform="scale(1.03)"} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>{mode==="image"?("🪄 "+(files.length>1?(files.length+(getLang()==="tr"?" foto oku (KI)":" Fotos lesen (KI)")):"Tabelle lesen (KI)")):"📥 Jetzt importieren"}</button>
      {mode==="image"&&<button title="Standard-OCR — nur falls die KI-Erkennung mal nicht passt (für gedruckte Tabellen)" style={{background:"rgba(168,85,247,0.10)",color:"#a855f7",border:"1.5px solid rgba(168,85,247,0.55)",borderRadius:12,padding:"14px 22px",fontSize:15,fontWeight:700,cursor:"pointer",transition:"all 0.3s"}} onClick={analyze} onMouseOver={e=>{e.currentTarget.style.background="rgba(168,85,247,0.20)";e.currentTarget.style.transform="scale(1.03)";}} onMouseOut={e=>{e.currentTarget.style.background="rgba(168,85,247,0.10)";e.currentTarget.style.transform="scale(1)";}}>🔍 Standard-OCR</button>}
    </div>}

    {loading&&<div style={{...css.card,textAlign:"center",padding:32,background:"rgba(16,185,129,0.05)",border:"1px solid rgba(16,185,129,0.15)"}}>
      <div style={{display:"inline-block",width:36,height:36,border:"3px solid "+theme.border,borderTopColor:theme.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:12}}/>
      <div style={{fontSize:16,fontWeight:600,color:theme.accent,animation:"fadeIn 0.5s ease"}}>{step||_t("analyzing")}</div>
      <div style={{fontSize:12,color:theme.textDim,marginTop:6}}>Please wait — this may take a few seconds</div>
    </div>}

    {errorMsg&&!rawRows.length&&<div style={{...css.card,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",textAlign:"center",padding:20,animation:"fadeIn 0.3s ease"}}>
      <div style={{fontSize:15,fontWeight:600,color:theme.danger}}>{errorMsg}</div>
      <div style={{fontSize:12,color:theme.textMuted,marginTop:6}}>Tipp: Good lighting, straight photo, or use CSV/Excel</div>
    </div>}

    {errorMsg&&rawRows.length>0&&rows.length===0&&<div style={{...css.card,padding:20,animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:15,fontWeight:600,color:"#f59e0b"}}>⚠️ Tabelle nicht erkannt — extrahierter Text</div>
          <div style={{fontSize:12,color:theme.textMuted,marginTop:4}}>{rawRows.length} Zeilen erkannt — Tabellenstruktur konnte nicht geparst werden</div>
        </div>
        <button style={{fontSize:12,padding:"8px 16px",borderRadius:8,border:"1px solid "+theme.border,background:theme.surfaceAlt,color:theme.text,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}} onClick={()=>{navigator.clipboard.writeText(rawRows.join("\n"));showToast("Text kopiert")}}>📋 Kopieren</button>
      </div>
      <div style={{background:theme.surfaceAlt,borderRadius:10,padding:12,maxHeight:320,minHeight:80,overflowY:"auto",border:"1px solid "+theme.border}}>
        {rawRows.map((line,i)=><div key={i} style={{fontSize:13,fontFamily:"monospace",padding:"4px 0",color:theme.text,lineHeight:1.5,borderBottom:i<rawRows.length-1?"1px solid "+theme.border:"none"}}>{line}</div>)}
      </div>
    </div>}

    {saved>0&&<div style={{...css.card,background:"linear-gradient(135deg,rgba(16,185,129,0.12),rgba(59,130,246,0.08))",border:"1px solid rgba(16,185,129,0.3)",textAlign:"center",padding:28,animation:"fadeIn 0.5s ease"}}>
      <div style={{fontSize:36,marginBottom:8}}>🎉</div>
      <div style={{fontSize:20,fontWeight:700,color:theme.accent}}>{saved} Einträge erfolgreich importiert</div>
      <div style={{fontSize:13,color:theme.textMuted,marginTop:6}}>Auto-categorized — available in Cash Book</div>
    </div>}

    {showMapping&&rawTable.length>1&&<div ref={tableRef} style={{animation:"fadeIn 0.5s ease"}}>
      <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>Spalten zuordnen</h3>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid "+theme.border,marginBottom:16}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:theme.card,fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"2px solid "+theme.border,background:theme.surfaceAlt}}>
              {rawTable[0].map((h,ci)=><th key={ci} style={{padding:"8px 10px",textAlign:"left"}}>
                <div style={{fontSize:11,color:theme.textDim,marginBottom:4}}>{h||"Spalte "+(ci+1)}</div>
                <select style={{...css.input,fontSize:12,padding:"6px 8px",width:"100%",minHeight:32}} value={colMap.date===ci?"date":colMap.description===ci?"description":colMap.expense===ci?"expense":colMap.income===ci?"income":"ignore"} onChange={e=>{const role=e.target.value;const nm={...colMap};Object.keys(nm).forEach(k=>{if(nm[k]===ci)nm[k]=-1;});if(role!=="ignore")nm[role]=ci;setColMap(nm);}}>
                  <option value="ignore">-- Ignore --</option>
                  <option value="date">{_t("date")}</option>
                  <option value="description">{_t("description")}</option>
                  <option value="expense">{_t("expense")}</option>
                  <option value="income">{_t("income")}</option>
                </select>
              </th>)}
            </tr>
          </thead>
          <tbody>{rawTable.slice(1,6).map((row,ri)=><tr key={ri} style={{borderBottom:"1px solid "+theme.border}}>
            {row.map((cell,ci)=><td key={ci} style={{padding:"6px 10px",color:colMap.date===ci?theme.accent:colMap.expense===ci?theme.danger:colMap.income===ci?"#22c55e":theme.textMuted,fontSize:11,fontFamily:colMap.expense===ci||colMap.income===ci?mono:undefined}}>{cell}</td>)}
          </tr>)}</tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button style={{background:"linear-gradient(135deg,#10b981,#3b82f6)",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}} onClick={applyMapping}>Zuordnung anwenden</button>
        <span style={{fontSize:11,color:theme.textDim}}>Vorschau: erste 5 Zeilen — {rawTable.length-1} gesamt</span>
      </div>
    </div>}

    {showTable&&rows.length>0&&<div ref={tableRef} style={{animation:"fadeIn 0.5s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:0}}>✅ {rows.length} entries detected</h3>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"1px solid "+(showRaw?theme.border:theme.accent),background:showRaw?"transparent":theme.accentSoft,color:showRaw?theme.textDim:theme.accent,cursor:"pointer"}} onClick={()=>setShowRaw(false)}>Structured</button>
            {rawRows.length>0&&<button style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"1px solid "+(showRaw?theme.accent:theme.border),background:showRaw?theme.accentSoft:"transparent",color:showRaw?theme.accent:theme.textDim,cursor:"pointer"}} onClick={()=>setShowRaw(true)}>OCR Original</button>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,fontSize:12}}>
          <span style={{background:theme.accentSoft,color:theme.accent,padding:"4px 10px",borderRadius:6,fontWeight:600}}>+€{totalIncome.toFixed(2)}</span>
          <span style={{background:theme.dangerSoft,color:theme.danger,padding:"4px 10px",borderRadius:6,fontWeight:600}}>-€{totalExpense.toFixed(2)}</span>
        </div>
      </div>
      {!showRaw?<div>
        {/* Zeilen-Zahler: kullanici 32 yukledim 21 cikti diye saskinliga ugramasin */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 4px 10px",fontSize:12,flexWrap:"wrap",gap:8}}>
          <div style={{color:theme.textMuted}}>
            <strong style={{color:theme.text}}>{rows.length}</strong> {getLang()==="de"?"Zeilen erkannt":getLang()==="tr"?"satır algılandı":"rows detected"}
            {(()=>{const unc=rows.filter(r=>r.is_uncertain).length;const ok=rows.length-unc;return(<span style={{marginLeft:8}}>· <span style={{color:theme.accent}}>{ok} {getLang()==="de"?"bereit":getLang()==="tr"?"hazır":"ready"}</span>{unc>0?<> · <span style={{color:"#f59e0b"}}>{unc} {getLang()==="de"?"unsicher":getLang()==="tr"?"belirsiz":"uncertain"}</span></>:null}</span>);})()}
          </div>
          <div style={{color:theme.textDim,fontSize:11,fontStyle:"italic"}}>
            {rows.length>10?(getLang()==="de"?"↕ Tabelle scrollbar":getLang()==="tr"?"↕ Tablo kaydırılabilir":"↕ Table scrollable"):""}
          </div>
        </div>
        <div style={{overflowX:"auto",overflowY:"auto",maxHeight:520,borderRadius:12,border:"1px solid "+theme.border}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:theme.card}}>
          <thead style={{position:"sticky",top:0,zIndex:2}}><tr style={{borderBottom:"2px solid "+theme.border,background:theme.surfaceAlt}}>
            {[_t("date"),_t("description"),_t("income"),_t("expense")].map(h=><th key={h} style={{padding:"12px 14px",textAlign:"left",color:theme.textDim,fontWeight:600,fontSize:11,textTransform:"uppercase",background:theme.surfaceAlt}}>{h}</th>)}
            <th style={{padding:"12px 8px",width:70,background:theme.surfaceAlt}}></th>
          </tr></thead>
          <tbody>{rows.map((r,i)=><tr key={i} style={{borderBottom:"1px solid "+theme.border,animation:"fadeIn 0.3s ease",animationDelay:Math.min(i*50,500)+"ms",animationFillMode:"both",background:r.is_uncertain?"rgba(245,158,11,0.06)":"transparent"}}>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:110,fontSize:12}} value={r.date} onChange={e=>editRow(i,"date",e.target.value)}/></td>
            <td style={{padding:"8px 14px"}}><div style={{display:"flex",alignItems:"center",gap:4}}><input style={{...css.input,flex:1,fontSize:12}} value={r.description} onChange={e=>editRow(i,"description",e.target.value)}/>{r.is_uncertain&&<span title="Amount not detected" style={{color:"#f59e0b",fontSize:14,cursor:"help"}}>⚠</span>}</div></td>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:90,fontSize:12,color:theme.accent,borderColor:r.is_uncertain&&r.income===0?"rgba(245,158,11,0.5)":undefined}} type="number" step="0.01" value={r.income} onChange={e=>editRow(i,"income",e.target.value)} placeholder={r.is_uncertain?"prüfen":""}/></td>
            <td style={{padding:"8px 14px"}}><input style={{...css.input,width:90,fontSize:12,color:theme.danger,borderColor:r.is_uncertain&&r.expense===0?"rgba(245,158,11,0.5)":undefined}} type="number" step="0.01" value={r.expense} onChange={e=>editRow(i,"expense",e.target.value)} placeholder={r.is_uncertain?"prüfen":""}/></td>
            <td style={{padding:"8px 6px"}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {r.is_uncertain&&<button title="🤖 KI füllt diese Zeile (Claude)" disabled={!!aiRowBusy[i]} onClick={()=>aiFixRow(i)} style={{cursor:aiRowBusy[i]?"wait":"pointer",padding:"4px 8px",borderRadius:6,border:"1px solid rgba(168,85,247,0.5)",background:aiRowBusy[i]?"rgba(168,85,247,0.05)":"rgba(168,85,247,0.12)",color:"#a855f7",fontSize:11,fontWeight:700,fontFamily:"inherit",lineHeight:1,transition:"all 0.15s"}}>{aiRowBusy[i]?"⏳":"🤖"}</button>}
                <div style={{cursor:"pointer"}} onClick={()=>setRows(prev=>prev.filter((_,j)=>j!==i))} title="Remove row"><Icon d={I.x} size={14} color={theme.danger}/></div>
              </div>
            </td>
          </tr>)}</tbody>
        </table>
        </div>
      </div>:
      <div style={{borderRadius:12,border:"1px solid "+theme.border,background:theme.card,padding:16,maxHeight:400,minHeight:100,overflowY:"auto"}}>
        <div style={{fontSize:11,color:theme.textDim,marginBottom:8}}>OCR Original — {rawRows.length} Zeilen</div>
        {rawRows.map((line,i)=><div key={i} style={{fontSize:12,fontFamily:mono,color:theme.textMuted,padding:"3px 0",borderBottom:"1px solid "+theme.border+"33"}}>{line}</div>)}
      </div>}
      <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end",flexWrap:"wrap",alignItems:"center"}}>
        <button style={{...css.btnOutline,fontSize:12}} onClick={()=>{resetAll();fileRef.current?.click();}}>🔄 New File</button>
        {csv&&<button style={css.btnOutline} onClick={()=>{const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="tabelle_import.csv";a.click();URL.revokeObjectURL(u);}}>📥 Save as CSV</button>}
        {isTable?<><button style={{background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(16,185,129,0.3)",transition:"all 0.3s",opacity:saving?0.6:1,flex:window.innerWidth<768?"1 1 100%":undefined}} onClick={saveRows} disabled={saving} onMouseOver={e=>{if(!saving)e.currentTarget.style.transform="scale(1.05)";}} onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>{saving?"⏳ Wird gespeichert...":"📒 Save to Cash Book"}</button>

function SteuerOverviewView(){
  const _l=getLang();
  const tr=(de,en)=>_l==="de"?de:en;
  const currentYear=new Date().getFullYear();
  const[year,setYear]=useState(currentYear);
  const[summary,setSummary]=useState(null);
  const[summaryPrev,setSummaryPrev]=useState(null);
  const[recurring,setRecurring]=useState({items:[],yearly_total:0});
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({label:"",category:"Miete",amount:0,vat_rate:"19%",period:"monthly",tax_treatment:"betriebsausgabe",vendor:"",notes:""});
  const[showAsk,setShowAsk]=useState(false);
  const[askQ,setAskQ]=useState("");
  const[askA,setAskA]=useState("");
  const[askBusy,setAskBusy]=useState(false);
  const[askMode,setAskMode]=useState("ask"); // "ask" | "review"
  const[hoverRid,setHoverRid]=useState(null);

  const load=async()=>{
    setLoading(true);
    try{
      const [s,sp,r]=await Promise.all([
        api("/steuer/summary?year="+year),
        api("/steuer/summary?year="+(year-1)).catch(()=>null),
        api("/recurring-expenses?active_only=false"),
      ]);
      setSummary(s);
      setSummaryPrev(sp);
      setRecurring({items:r.items||[],yearly_total:r.yearly_total||0});
    }catch(e){}
    setLoading(false);
  };
  const delta=(cur,prev)=>{
    if(!prev||!prev.totals)return null;
    const c=cur||0,p=prev||0;
    if(p===0)return null;
    const pct=Math.round(((c-p)/p)*100);
    return pct;
  };
  useEffect(()=>{load();},[year]);

  const save=async()=>{
    if(!form.label||!form.amount){alert(tr("Bezeichnung und Betrag sind Pflicht","Label and amount required"));return;}
    try{
      if(editId){
        await api("/recurring-expenses/"+editId,{method:"PATCH",body:JSON.stringify(form)});
      }else{
        await api("/recurring-expenses",{method:"POST",body:JSON.stringify(form)});
      }
      setShowAdd(false);setEditId(null);
      setForm({label:"",category:"Miete",amount:0,vat_rate:"19%",period:"monthly",tax_treatment:"betriebsausgabe",vendor:"",notes:""});
      load();
    }catch(e){alert(_extractErr(e)||e.message);}
  };
  const remove=async(id)=>{
    if(!confirm(tr("Wirklich löschen?","Really delete?")))return;
    try{await api("/recurring-expenses/"+id,{method:"DELETE"});load();}catch(e){alert(e.message);}
  };
  const edit=(r)=>{
    setEditId(r.id);
    setForm({label:r.label,category:r.category||"Miete",amount:r.amount,vat_rate:r.vat_rate||"19%",period:r.period,tax_treatment:r.tax_treatment,vendor:r.vendor||"",notes:r.notes||""});
    setShowAdd(true);

function SteuerView(){
  const[items,setItems]=useState([]);
