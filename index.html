const { useState, useEffect, useRef, Fragment } = React;
const _t = typeof t === "function" ? t : k => k;

const API = window.location.origin;

/* ══════════════════════════════════════════
   Resilience layer — kept self-contained so the OCR pipeline keeps working
   even if the backend returns object-shaped error bodies, hits 429, etc.
   ══════════════════════════════════════════ */
function _extractErr(d){
  if(d==null) return "Fehler";
  if(typeof d==="string") return d;
  if(typeof d.detail==="string") return d.detail;
  if(d.detail && typeof d.detail==="object") return d.detail.error||d.detail.message||d.detail.detail||"Fehler";
  if(typeof d.error==="string") return d.error;
  if(typeof d.message==="string") return d.message;
  try{ return JSON.stringify(d); }catch(e){ return "Fehler"; }
}
function _safeMsg(v){
  if(v==null) return "";
  if(typeof v==="string") return v;
  if(typeof v==="number"||typeof v==="boolean") return String(v);
  return _extractErr(v);
}
window._extractErr=_extractErr;
window._safeMsg=_safeMsg;

class ErrorBoundary extends React.Component {
  constructor(p){super(p); this.state={hasError:false,msg:""};}
  static getDerivedStateFromError(err){return{hasError:true,msg:err&&err.message?err.message:String(err)};}
  componentDidCatch(err,info){try{console.error("ErrorBoundary:",err,info);}catch(e){}}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:24,maxWidth:560,margin:"40px auto",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",fontFamily:"DM Sans, system-ui, sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}},
        React.createElement("h2",{style:{margin:"0 0 8px",color:"#ef4444",fontSize:20}},"Anzeige-Fehler"),
        React.createElement("p",{style:{margin:"0 0 16px",color:"var(--text-muted)",fontSize:14,lineHeight:1.5}},"Die Seite konnte nicht angezeigt werden. Ihre Daten sind sicher."),
        React.createElement("p",{style:{margin:"0 0 16px",color:"var(--text-dim)",fontSize:12,fontFamily:"monospace",background:"rgba(239,68,68,0.08)",padding:8,borderRadius:6,wordBreak:"break-word"}}, this.state.msg||"Unbekannter Fehler"),
        React.createElement("button",{onClick:()=>window.location.reload(),style:{padding:"10px 20px",background:"#10b981",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:14}},"🔄 Seite neu laden")
      );
    }
    return this.props.children;
  }
}
window._ErrorBoundary=ErrorBoundary;

/* Smart fetch with 429 backoff — wraps a single request, returns Response.
   Honors Retry-After header (seconds). Up to maxRetries attempts.
   onWait(ms, attempt) is called before each wait so UI can show countdown. */
async function _fetchWithBackoff(url, opts, onWait, maxRetries){
  const max = (typeof maxRetries==="number")?maxRetries:3;
  let attempt=0;
  while(true){
    const res = await fetch(url, opts);
    if(res.status!==429 || attempt>=max) return res;
    let waitSec=0;
    const ra=res.headers.get("Retry-After");
    if(ra && !isNaN(parseInt(ra,10))) waitSec=parseInt(ra,10);
    if(!waitSec) waitSec = Math.min(60, 15*Math.pow(2,attempt)); // 15s, 30s, 60s
    if(typeof onWait==="function") try{ onWait(waitSec*1000, attempt+1); }catch(e){}
    await new Promise(r=>setTimeout(r, waitSec*1000));
    attempt++;
  }
}
window._fetchWithBackoff=_fetchWithBackoff;

/* Authed fetch — wraps fetch() with auto-refresh on 401. Returns Response.
   If refresh fails, removes tokens and reloads (forces re-login). Use for
   any endpoint that needs the Authorization header. */
async function _authFetch(url, opts){
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  const tk = localStorage.getItem("atx_token");
  if(tk) headers["Authorization"] = "Bearer " + tk;
  // Advisor mode — view another user's data via X-Acting-Client-Id.
  // Stored in localStorage so a hard refresh keeps the active mandate.
  const acting = localStorage.getItem("atx_acting_client_id");
  if(acting && !headers["X-Acting-Client-Id"]) headers["X-Acting-Client-Id"] = acting;
  let res = await fetch(url, Object.assign({}, opts, {headers}));
  if(res.status !== 401) return res;
  // Try refresh
  const refresh = localStorage.getItem("atx_refresh");
  if(!refresh){
    localStorage.removeItem("atx_token");
    return res;
  }
  try{
    const rr = await fetch((url.startsWith("http")?new URL(url).origin:"") + "/auth/refresh", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({refresh_token: refresh}),
    });
    if(!rr.ok){
      localStorage.removeItem("atx_token");
      localStorage.removeItem("atx_refresh");
      return res;
    }
    const rd = await rr.json();
    if(!rd.token){
      localStorage.removeItem("atx_token");
      localStorage.removeItem("atx_refresh");
      return res;
    }
    localStorage.setItem("atx_token", rd.token);
    if(rd.refresh_token) localStorage.setItem("atx_refresh", rd.refresh_token);
    // Retry the original request with the new token
    headers["Authorization"] = "Bearer " + rd.token;
    return await fetch(url, Object.assign({}, opts, {headers}));
  }catch(e){
    return res;
  }
}
window._authFetch = _authFetch;

// Advisor read-only mode flag — read live from localStorage so we don't
// need to thread state through every component. Returns the scope
// (read | read_export) when acting, or null when the user is the owner.
window._actingScope = () => {
  if (!localStorage.getItem("atx_acting_client_id")) return null;
  return localStorage.getItem("atx_acting_scope") || "read";
};

// Advisor read-only mode flag (read from localStorage on every check)

/* ══════════════════════════════════════════

function formatDateEU(dateStr) {
  if (!dateStr) return "—";
  // ISO: YYYY-MM-DD
  const iso = /^(\d{4})-(\d{2})-(\d{2})/;
  const m1 = dateStr.match(iso);
  if (m1) return m1[3] + "." + m1[2] + "." + m1[1];
  // US: MM/DD/YYYY
  const us = /^(\d{1,2})\/(\d{1,2})\/(\d{4})/;
  const m2 = dateStr.match(us);
  if (m2) return m2[2].padStart(2,"0") + "." + m2[1].padStart(2,"0") + "." + m2[3];
  // Already DD.MM.YYYY
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) return dateStr;
  return dateStr;
}

async function api(path, opts={}) {
  const token = localStorage.getItem("atx_token");
  const headers = {"Content-Type":"application/json",...opts.headers};
  if(token) headers["Authorization"]=`Bearer ${token}`;
  // Advisor acting mode — backend endpoint'leri X-Acting-Client-Id header'i ile
  // get_acting_context dependency'sini calistirirsa mandant verilerini doner.
  // _authFetch zaten ekliyordu; api() unutulmus -> advisor'in dashboard'i kendi
  // bos hesabini gosteriyordu. KRITIK BUG.
  const acting = localStorage.getItem("atx_acting_client_id");
  if(acting && !headers["X-Acting-Client-Id"]) headers["X-Acting-Client-Id"] = acting;
  let res = await fetch(`${API}${path}`,{...opts,headers});
  // Auto-refresh on 401
  if(res.status===401){
    const refresh=localStorage.getItem("atx_refresh");
    if(refresh){
      try{
        const r=await fetch(API+"/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:refresh})});
        if(r.ok){
          const d=await r.json();
          localStorage.setItem("atx_token",d.token);
          if(d.refresh_token)localStorage.setItem("atx_refresh",d.refresh_token);
          headers["Authorization"]="Bearer "+d.token;
          res=await fetch(`${API}${path}`,{...opts,headers});
        }else{
          localStorage.removeItem("atx_token");localStorage.removeItem("atx_refresh");throw new Error("unauthorized");
        }
      }catch(e){localStorage.removeItem("atx_token");localStorage.removeItem("atx_refresh");throw new Error("unauthorized");}
    }else{localStorage.removeItem("atx_token");throw new Error("unauthorized");}
  }
  if(!res.ok){const e=await res.json().catch(()=>({}));const msg=typeof e.detail==="string"?e.detail:typeof e.detail==="object"?JSON.stringify(e.detail):e.message||"Error";throw new Error(msg);}
  if(res.status===204) return null;
  return res.json();
}

function Sparkline({data=[],color=theme.accent,h=40,w=120}){
  if(!data.length)return null;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(v/max)*h}`).join(" ");
  return(<svg width={w} height={h} style={{overflow:"visible"}}><polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/></svg>);
}

const downloadPDF=async(id)=>{try{const r=await fetch(API+"/invoices/"+id+"/pdf",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});if(!r.ok){alert("PDF Error");return;}const blob=await r.blob();const url=window.URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Rechnung_"+id+".pdf";a.target="_blank";document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();window.URL.revokeObjectURL(url);},1500);}catch(e){alert("PDF Download fehlgeschlagen");}};

const downloadBulkPDF=async(ids,showToast)=>{
  if(!ids||ids.length===0)return;
  if(showToast)showToast(ids.length+" PDFs werden heruntergeladen...","info");
  let ok=0,fail=0;
  for(const id of ids){
    try{
      const r=await fetch(API+"/invoices/"+id+"/pdf",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});
      if(!r.ok){fail++;continue;}
      const blob=await r.blob();
      const url=window.URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="Rechnung_"+id+".pdf";a.click();
      window.URL.revokeObjectURL(url);ok++;
      await new Promise(r=>setTimeout(r,300)); // small delay between downloads
    }catch(e){fail++;}
  }
  if(showToast)showToast(ok+" PDF(s) heruntergeladen"+(fail>0?", "+fail+" Error":""),"success");
};

const downloadBulkOriginal=async(ids,invoices,showToast)=>{
  if(!ids||ids.length===0)return;
  const withOriginal=ids.filter(id=>{const inv=invoices.find(i=>i.id===id);return inv&&inv.has_original;});
  if(withOriginal.length===0){if(showToast)showToast("No originals available — PDF only","info");return;}
  if(showToast)showToast(withOriginal.length+" Belege werden heruntergeladen...","info");
  let ok=0;
  for(const id of withOriginal){
    try{
      const inv=invoices.find(i=>i.id===id);
      const r=await fetch(API+"/vault/"+id+"/download",{headers:{Authorization:"Bearer "+localStorage.getItem("atx_token")}});
      if(!r.ok)continue;
      const blob=await r.blob();
      const url=window.URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=(inv&&inv.vendor?inv.vendor.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,"_"):"Beleg")+"_"+id+(blob.type.includes("pdf")?".pdf":blob.type.includes("png")?".png":".jpg");a.click();
      window.URL.revokeObjectURL(url);ok++;
      await new Promise(r=>setTimeout(r,300));
    }catch(e){}
  }
  if(showToast)showToast(ok+" Original-Beleg(e) heruntergeladen","success");
};

function DonutChart({data}){
  const total=data.reduce((s,d)=>s+d.total,0)||1;
  const colors=[theme.accent,theme.blue,theme.purple,theme.warn,theme.danger,"#06b6d4","#ec4899","#84cc16"];
  let cum=0;
  return(<div style={{display:"flex",alignItems:"center",gap:28}}>
    <svg width={110} height={110} viewBox="0 0 42 42" style={{flexShrink:0}}>
      <circle cx={21} cy={21} r={15.9} fill="none" stroke={theme.surfaceAlt} strokeWidth={4.5}/>
      {data.slice(0,8).map((d,i)=>{const pct=(d.total/total)*100;const off=25-cum;cum+=pct;return<circle key={i} cx={21} cy={21} r={15.9} fill="none" stroke={colors[i%colors.length]} strokeWidth={4.5} strokeDasharray={`${pct} ${100-pct}`} strokeDashoffset={off} style={{transition:"stroke-dasharray 0.6s ease"}}/>;})}
      <text x="21" y="19" textAnchor="middle" dy=".35em" fill={theme.text} fontSize="7" fontWeight="700" fontFamily={mono}>{data.length}</text>
      <text x="21" y="26" textAnchor="middle" fill={theme.textDim} fontSize="3.5" fontFamily={font}>{_t("categories")}</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
      {data.slice(0,6).map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,fontSize:12}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:colors[i%colors.length],flexShrink:0,boxShadow:`0 0 6px ${colors[i%colors.length]}44`}}/>
        <span style={{color:theme.textMuted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:450}}>{d.category}</span>
        <span style={{color:theme.text,fontWeight:600,fontFamily:mono,fontSize:12}}>€{d.total?.toFixed(0)}</span>
      </div>))}
    </div>
  </div>);
}

function AuthScreen({onLogin}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[name,setName]=useState("");const[regCompany,setRegCompany]=useState("");
  const[error,setError]=useState("");
  const[info,setInfo]=useState("");
  const[loading,setLoading]=useState(false);
  const[gdpr,setGdpr]=useState(false);
  const[showPass,setShowPass]=useState(false);
  const[showDS,setShowDS]=useState(false);
  const[showImp,setShowImp]=useState(false);
  const[turnstileToken,setTurnstileToken]=useState("");
  const emailRef=useRef(null);
  const passRef=useRef(null);
  const nameRef=useRef(null);
  const turnstileRef=useRef(null);
  const turnstileWidgetId=useRef(null);

  // Cloudflare Turnstile CAPTCHA — render in register mode only.
  // If site key not configured (env eksik), widget hic gosterilmez — backend
  // de verify atlar (graceful fallback).
  useEffect(()=>{
    if(mode!=="register")return;
    const siteKey=(window.FEATURES&&window.FEATURES.turnstile_site_key)||"";
    if(!siteKey)return;
    let cancelled=false;
    const init=()=>{
      if(cancelled)return;
      if(typeof window.turnstile==="undefined"||!turnstileRef.current){
        return setTimeout(init,200);
      }
      try{
        turnstileWidgetId.current=window.turnstile.render(turnstileRef.current,{
          sitekey:siteKey,
          callback:(token)=>setTurnstileToken(token),
          "error-callback":()=>setTurnstileToken(""),
          "expired-callback":()=>setTurnstileToken(""),
          theme:"dark",
        });
      }catch(e){console.warn("Turnstile render failed:",e);}
    };
    init();
    return()=>{
      cancelled=true;
      if(turnstileWidgetId.current&&window.turnstile&&window.turnstile.remove){
        try{window.turnstile.remove(turnstileWidgetId.current);}catch(e){}
        turnstileWidgetId.current=null;
      }
      setTurnstileToken("");
    };
  },[mode]);

  const submit=async()=>{
    setError("");setInfo("");
    // Ref'lerden gerçek değerleri al (autofill sorunu için)
    const realEmail=(emailRef.current?.value||email).trim();
    const realPass=passRef.current?.value||password;
    const realName=(nameRef.current?.value||name).trim();
    // State'i güncelle
    setEmail(realEmail);setPassword(realPass);setName(realName);

    if(!realEmail||!realPass){setError("Please enter email and password.");return;}
    if(!realEmail.includes("@")){setError("Please enter a valid email address.");return;}
    if(mode==="register"&&!gdpr){setError("Please accept the Privacy Policy.");return;}
    if(mode==="register"&&!realName){setError("Please enter your full name.");return;}
    if(mode==="register"&&realPass.length<6){setError("Password must be at least 6 characters.");return;}
    // CAPTCHA gate (only if Turnstile site key is configured)
    const turnstileSiteKey=(window.FEATURES&&window.FEATURES.turnstile_site_key)||"";
    if(mode==="register"&&turnstileSiteKey&&!turnstileToken){
      setError("Bitte CAPTCHA bestätigen / Please complete the CAPTCHA.");
      return;
    }
    setLoading(true);
    try{
      if(mode==="register"){
        await api("/auth/register",{method:"POST",body:JSON.stringify({email:realEmail,password:realPass,full_name:realName,company_name:regCompany,gdpr_consent:true,turnstile_token:turnstileToken})});
        setMode("login");setError("");setPassword("");
        setInfo("Account created! Please sign in with your credentials.");
      }else{
        console.log("LOGIN START");
        const res=await fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:realEmail,password:realPass})});
        console.log("STATUS:",res.status);
        const text=await res.text();
        let data;
        try{data=JSON.parse(text);}catch(e){setError("Invalid response");setLoading(false);return;}
        if(!res.ok){setError(data.detail?.error||data.detail||"Login failed");setLoading(false);return;}
        const token=data.token||data.access_token;
        if(!token){setError("No token");setLoading(false);return;}
        localStorage.setItem("atx_token",token);
        if(data.refresh_token)localStorage.setItem("atx_refresh",data.refresh_token);
        console.log("LOGIN SUCCESS");
        window.location.reload();
      }
    }catch(e){
      const msg=e.message||"";
      if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("ERR_")||msg.includes("Load failed")){
        setError("Server unavailable. Check your connection or try again in 1-2 minutes.");
      }else if(msg.includes("special character")){
        setError("Password must contain at least 1 special character (z.B. ! @ # $ % & *)");
      }else if(msg.includes("uppercase")){
        setError("Password must contain at least 1 uppercase letter.");
      }else if(msg.includes("digit")||msg.includes("number")){
        setError("Password must contain at least 1 digit.");
      }else if(msg.includes("Password")||msg.includes("password")){
        setError("Password: min. 6 chars, 1 uppercase, 1 digit, 1 special char (! @ # $ % & *)");
      }else if(msg.includes("unauthorized")||msg.includes("401")||msg.includes("Invalid")||msg.includes("invalid")){
        setError("Email or password incorrect.");
      }else if(msg.includes("already")||msg.includes("exists")||msg.includes("duplicate")){
        setError("This email is already registered. Please click 'Sign In'.");
      }else if(msg.includes("validation")||msg.includes("422")||msg.includes("value_error")){
        setError("Invalid input. Password: min. 6 chars, 1 uppercase, 1 digit, 1 special char.");
      }else{
        setError(msg||"An error occurred. Please try again.");
      }
    }
    setLoading(false);
  };

  return(<div style={{minHeight:"100vh",background:theme.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:font,padding:20}}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 30% 20%, rgba(16,185,129,0.08) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.06) 0%, transparent 60%)"}}/>
    <div style={{...css.card,width:420,maxWidth:"100%",position:"relative",padding:40}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"inline-flex",marginBottom:16}}><ATLogo size={64}/></div>
        <h1 style={{fontSize:24,fontWeight:700,color:theme.text,margin:0}}>AutoTax-<span style={{color:"#00a8cc"}}>HUB</span><span style={{background:"#f59e0b",color:"#000",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,marginLeft:8,verticalAlign:"middle"}}>BETA</span></h1>
        <p style={{color:theme.textMuted,fontSize:14,margin:"8px 0 0"}}>{mode==="login"?"Welcome back":"Create new account"}</p>
      </div>
      {mode==="register"&&<div style={{marginBottom:16}}><label style={{fontSize:12,color:theme.textMuted,marginBottom:6,display:"block",fontWeight:500}}>Full Name</label><input ref={nameRef} style={css.input} value={name} onChange={e=>setName(e.target.value)} placeholder="John Smith"/></div>}
      <div style={{marginBottom:16}}><label style={{fontSize:12,color:theme.textMuted,marginBottom:6,display:"block",fontWeight:500}}>E-Mail</label><input ref={emailRef} style={css.input} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@beispiel.de"/></div>
      <div style={{marginBottom:24}}><label style={{fontSize:12,color:theme.textMuted,marginBottom:6,display:"block",fontWeight:500}}>Password</label><div style={{position:"relative"}}><input ref={passRef} style={{...css.input,paddingRight:44}} type={showPass?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/><div onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",padding:4,opacity:0.6}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={theme.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{showPass?<Fragment><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></Fragment>:<Fragment><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Fragment>}</svg></div></div>
      {mode==="register"&&<div style={{fontSize:11,color:theme.textDim,marginTop:6}}>Min. 8 chars, 1 uppercase, 1 digit, 1 special char (! @ # $ %)</div>}</div>
      {mode==="register"&&<div style={{marginBottom:16}}><label style={{fontSize:12,color:theme.textMuted,marginBottom:6,display:"block",fontWeight:500}}>Company name (optional)</label><input style={css.input} value={regCompany} onChange={e=>setRegCompany(e.target.value)} placeholder="z.B. Alex Media GmbH"/><div style={{fontSize:11,color:theme.textDim,marginTop:4}}>Für automatische Einnahme-Erkennung. Ohne Angabe wird dein Name verwendet.</div></div>}
      {mode==="register"&&<div style={{marginBottom:20,display:"flex",alignItems:"flex-start",gap:10}}>
        <input type="checkbox" checked={gdpr} onChange={e=>setGdpr(e.target.checked)} style={{marginTop:3,width:18,height:18,accentColor:theme.accent,cursor:"pointer",flexShrink:0}}/>

      </div>}
      {mode==="register"&&((window.FEATURES&&window.FEATURES.turnstile_site_key)||"")&&<div ref={turnstileRef} style={{marginBottom:16,display:"flex",justifyContent:"center"}}/>}
      {info&&<div style={{background:theme.accentSoft,color:theme.accent,marginBottom:16,padding:"10px 14px",borderRadius:10,fontSize:13}}>{info}</div>}
      {error&&<div style={{background:theme.dangerSoft,color:theme.danger,marginBottom:16,padding:"10px 14px",borderRadius:10,fontSize:13}}>{error}</div>}
      <button style={{...css.btn(),width:"100%",justifyContent:"center",opacity:loading?0.7:(mode==="register"&&!gdpr)?0.5:1,cursor:(mode==="register"&&!gdpr)?"not-allowed":"pointer"}} onClick={submit} disabled={loading||(mode==="register"&&!gdpr)}>{loading?"...":mode==="login"?"Sign In":"Register"}</button>
      <div style={{textAlign:"center",marginTop:20}}>
        <span style={{color:theme.textDim,fontSize:13}}>{mode==="login"?"No account yet? ":"Already registered? "}</span>
        <span style={{color:theme.accent,fontSize:13,fontWeight:600,cursor:"pointer"}} onClick={()=>{setMode(mode==="login"?"register":"login");setError("");}}>{mode==="login"?"Register":"Sign In"}</span>

function DashboardView({refreshKey,triggerRefresh,onNav}){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[allInv,setAllInv]=useState([]);
  const[me,setMe]=useState(null);
  const[reminders,setReminders]=useState({overdue:null,upcoming:null});
  const[steuer,setSteuer]=useState([]);
  const[mahnungQueue,setMahnungQueue]=useState({count:0,items:[]});
  const[period,setPeriod]=useState("year");      // PHASE 1: today|week|month|quarter|year|custom
  const[cFrom,setCFrom]=useState("");const[cTo,setCTo]=useState("");
  const load=()=>{
    setLoading(true);
    api("/invoices/dashboard?country=DE").then(setData).catch(()=>{}).finally(()=>setLoading(false));
    api("/invoices?limit=5000").then(d=>{setAllInv(d.items||[]);}).catch(()=>{});
    api("/account/me").then(setMe).catch(()=>{});
    Promise.all([
      api("/reminders/overdue").catch(()=>({count:0,total_amount:0,items:[]})),
      api("/reminders/upcoming?days=7").catch(()=>({count:0,items:[]})),
    ]).then(([ov,up])=>setReminders({overdue:ov,upcoming:up}));
    api("/steuer/upcoming").then(d=>setSteuer(d.items||[])).catch(()=>{});
    api("/invoices/mahnung/queue").then(d=>setMahnungQueue({count:d.count||0,items:d.items||[]})).catch(()=>{});
  };
  const sendMahnung=async(invoiceId,withEmail)=>{
    try{
      const d=await api("/invoices/"+invoiceId+"/mahnung/send",{method:"POST",body:JSON.stringify({send_email:withEmail})});
      if(showToast)showToast(`✓ Mahnung Stufe ${d.level} gesendet${d.email_sent?" + E-Mail":""} — PDF wird heruntergeladen`,"success");
      // PDF'i hemen yeni sekmede ac (Token query param ile — yetkisiz indirme yok)
      if(d.pdf_url){
        const tk=localStorage.getItem("atx_token");
        const r=await fetch(API+d.pdf_url,{headers:{Authorization:"Bearer "+tk}});
        if(r.ok){const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Mahnung-${invoiceId}-Stufe${d.level}.pdf`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
      }
      load();
    }catch(e){alert(_extractErr(e)||e.message);}
  };
  useEffect(load,[refreshKey]);

  const resetAll=async()=>{
    if(!confirm("⚠️ WARNING: All invoices and bookkeeping entries will be deleted!\n\nThis action CANNOT be undone.\n\nContinue?")) return;
    if(!confirm(_t("confirm_reset2"))) return;
    try{
      // Use bulk delete for invoices
      const invData=await api("/invoices?limit=5000").catch(()=>({items:[]}));
      const allIds=(invData.items||[]).map(i=>i.id);
      let delCount=0;

  // Kunden-Autofill: aus früheren Einnahme-Rechnungen Name -> {Adresse, E-Mail}
  const _custMap={};(invoices||[]).forEach(i=>{if(i.invoice_type==="income"&&i.vendor){const k=String(i.vendor).trim().toLowerCase();if(k&&!_custMap[k])_custMap[k]={name:String(i.vendor).trim(),address:i.recipient_address||"",email:i.vendor_email||""};}});
  const _custList=Object.values(_custMap);
  const sendMahnungInv=async(invoiceId,withEmail)=>{try{const d=await api("/invoices/"+invoiceId+"/mahnung/send",{method:"POST",body:JSON.stringify({send_email:withEmail})});if(showToast)showToast(`✓ Mahnung Stufe ${d.level} gesendet${d.email_sent?" + E-Mail":""}`,"success");if(d.pdf_url){const tk=localStorage.getItem("atx_token");const r=await fetch(API+d.pdf_url,{headers:{Authorization:"Bearer "+tk}});if(r.ok){const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Mahnung-${invoiceId}-Stufe${d.level}.pdf`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}}reloadReminders();doSearch();}catch(e){alert(_extractErr(e)||e.message);}};
  const[editId,setEditId]=useState(null);const[editData,setEditData]=useState({});
  const[selected,setSelected]=useState(new Set());
  const[deleting,setDeleting]=useState(false);

    if(vendorQ)params.set("search",vendorQ);

    // Datum-Filter jetzt client-seitig (robust gegen ISO/US/DE) — siehe `filtered`.

    setLoading(true);
    api("/invoices?"+params.toString()).then(d=>{setInvoices(d.items);setTotal(d.total);setSelected(new Set());}).catch(()=>{}).finally(()=>setLoading(false));
  };
  const doSearch=()=>load(filter,filterCat,dateFrom,dateTo);
  // PHASE 3: quick period range → reuses server-side date_from/date_to filtering
  const _lng=getLang();
  const _pl3=(de,tr,en)=>_lng==="tr"?tr:(_lng==="en"?en:de);
  const _e3=n=>"€"+(n||0).toLocaleString(_lng==="en"?"en-US":"de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
  const _p2i=n=>String(n).padStart(2,"0");
  const _isoI=d=>d.getFullYear()+"-"+_p2i(d.getMonth()+1)+"-"+_p2i(d.getDate());
  const setRange=(p)=>{const n=new Date();const to=_isoI(n);let from;
    if(p==="today")from=to;
    else if(p==="week"){const d=new Date(n);const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);from=_isoI(d);}
    else if(p==="month")from=_isoI(new Date(n.getFullYear(),n.getMonth(),1));
    else if(p==="quarter")from=_isoI(new Date(n.getFullYear(),Math.floor(n.getMonth()/3)*3,1));

function UploadView({triggerRefresh,onNav,showToast}){
  const[files,setFiles]=useState([]);const[results,setResults]=useState([]);const[uploading,setUploading]=useState(false);const[dragOver,setDragOver]=useState(false);const fileRef=useRef(null);const resultsRef=useRef(null);
  const[invoiceType,setInvoiceType]=useState("expense");
  const uploadBtnRef=useRef(null);
  const addFiles=(nf)=>{const fa=Array.from(nf);setFiles(p=>{const ex=new Set(p.map(f=>f.name+f.size));return[...p,...fa.filter(f=>!ex.has(f.name+f.size))].slice(0,20);});
    // Scroll to upload button so user sees it
    setTimeout(()=>{uploadBtnRef.current?.scrollIntoView({behavior:"smooth",block:"center"});},200);};
  const _refreshToken=async()=>{const refresh=localStorage.getItem("atx_refresh");if(!refresh)return null;try{const r=await fetch(API+"/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:refresh})});if(r.ok){const d=await r.json();localStorage.setItem("atx_token",d.token);if(d.refresh_token)localStorage.setItem("atx_refresh",d.refresh_token);return d.token;}}catch(e){}return null;};
  const _uploadOne=async(f,tk,onWait)=>{const fd=new FormData();fd.append("file",f);fd.append("invoice_type",invoiceType);let res=await _fetchWithBackoff(API+"/invoices/upload",{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd},onWait,3);if(res.status===401){const newTk=await _refreshToken();if(newTk){const fd2=new FormData();fd2.append("file",f);fd2.append("invoice_type",invoiceType);res=await _fetchWithBackoff(API+"/invoices/upload",{method:"POST",headers:{Authorization:"Bearer "+newTk},body:fd2},onWait,3);}}return res;};
  /* --- ADDED START: Async OCR upload with polling --- */
  const _uploadAsync=async(f,tk,onWait)=>{
    const fd=new FormData();fd.append("file",f);fd.append("invoice_type",invoiceType);
    let res=await _fetchWithBackoff(API+"/invoices/upload-async",{method:"POST",headers:{Authorization:"Bearer "+tk},body:fd},onWait,3);
    if(res.status===401){const newTk=await _refreshToken();if(newTk){const fd2=new FormData();fd2.append("file",f);fd2.append("invoice_type",invoiceType);res=await _fetchWithBackoff(API+"/invoices/upload-async",{method:"POST",headers:{Authorization:"Bearer "+newTk},body:fd2},onWait,3);tk=newTk;}}
    if(!res.ok&&res.status>=500)throw new Error("Server error "+res.status);
    const d=await res.json();
    if(d.duplicate&&d.can_force)return{status:"duplicate",data:d};
    if(d.status==="done")return{status:"done",data:d};
    if(d.status==="processing"&&d.id){
      // Poll every 2s, max 30s
      for(let i=0;i<15;i++){
        await new Promise(r=>setTimeout(r,2000));
        try{
          const s=await fetch(API+"/invoices/"+d.id+"/status",{headers:{Authorization:"Bearer "+tk}});
          if(s.ok){const sd=await s.json();if(sd.status==="done")return{status:"done",data:sd};}
        }catch(e){}
      }
      return{status:"timeout",data:d};
    }
    return{status:"error",data:d};
  };
  /* --- ADDED END --- */
  /* --- ADDED START: Async upload flow (uses upload-async + polling) --- */
  const uploadAsync=async()=>{
    if(!files.length)return;
    setUploading(true);setResults([]);
    // Auto-scroll so the user sees progress immediately, not stuck on the upload zone
    setTimeout(()=>{resultsRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},250);
    let token=localStorage.getItem("atx_token");
    let okCount=0;const allResults=[];const duplicates=[];
    for(const f of files){
      allResults.push({filename:f.name,status:"processing",message:"⏳ Processing..."});
      setResults([...allResults]);
      if(triggerRefresh)triggerRefresh();
      try{
        token=localStorage.getItem("atx_token");
        const _idxNow=allResults.length-1;
        const _onWait=(ms,attempt)=>{const sec=Math.ceil(ms/1000);allResults[_idxNow]={filename:f.name,status:"processing",message:"⏳ Limit erreicht — warte "+sec+"s (Versuch "+attempt+"/3)"};setResults([...allResults]);};
        let r;
        try{r=await _uploadAsync(f,token,_onWait);}catch(asyncErr){
          try{const syncRes=await _uploadOne(f,token,_onWait);const sd=await syncRes.json();r={status:syncRes.ok?"done":(sd&&sd.duplicate&&sd.can_force?"duplicate":"error"),data:sd};}catch(syncErr){r={status:"error",data:{message:syncErr.message}};}
        }
        const idx=allResults.length-1;
        if(r.status==="duplicate"){
          duplicates.push({file:f,data:r.data});
          allResults[idx]={filename:f.name,status:"skipped",message:"⚠️ Duplikat erkannt",is_duplicate:true,id:r.data?.id};

          okCount++;

          if(triggerRefresh)triggerRefresh();
        }else if(r.status==="timeout"){
          allResults[idx]={filename:f.name,status:"warn",message:"⏱ OCR taking longer than expected",id:r.data?.id};
        }else{
          allResults[idx]={filename:f.name,status:"error",message:_extractErr(r.data),id:r.data?.id};
        }
        setResults([...allResults]);
      }catch(ex){
        allResults[allResults.length-1]={filename:f.name,status:"error",message:ex.message};
        setResults([...allResults]);
      }
    }

            const d2=await res2.json();
            const idx=allResults.findIndex(r=>r.filename===dup.file.name);
            if(idx>=0){
              if(d2.status==="done"){
                allResults[idx]={filename:dup.file.name,status:"ok",message:"✅ OK (erneut) — €"+((d2.total_amount||0).toFixed(2))+(d2.vendor?" ("+d2.vendor+")":""),id:d2.id};
                okCount++;
              }else{
                allResults[idx]={filename:dup.file.name,status:"warn",message:"⏱ verarbeitet — siehe Liste",id:d2.id};
              }
            }
          }catch(ex){}
        }
        setResults([...allResults]);
      }
    }
    setUploading(false);setFiles([]);
    if(triggerRefresh)triggerRefresh();
    // Scroll to the end of the results card so action buttons (📄/📒/⚡) are visible
    setTimeout(()=>{const node=resultsRef.current;if(node){const r=node.getBoundingClientRect();window.scrollTo({top:window.scrollY+r.bottom-window.innerHeight+40,behavior:"smooth"});}},400);
    if(okCount>0&&showToast)showToast(okCount+t("uploaded_ok"),"success");
  };
  /* --- ADDED END --- */
  const upload=async()=>{if(!files.length)return;setUploading(true);setResults([]);let token=localStorage.getItem("atx_token");
    // Scroll to results area when upload STARTS (not after it finishes)

    let okCount=0;
    try{if(files.length===1){const _onWait1=(ms,attempt)=>{const sec=Math.ceil(ms/1000);setResults([{filename:files[0].name,status:"processing",message:"⏳ Limit erreicht — warte "+sec+"s (Versuch "+attempt+"/3)"}]);};const res=await _uploadOne(files[0],token,_onWait1);const d=await res.json();
      /* --- ADDED START: duplicate force upload --- */

        const userConfirmed = await window.showDuplicateModal(files[0].name);

          setResults([{filename:files[0].name,status:res2.ok?"ok":"error",message:res2.ok?"OK (Force) — €"+(d2.total_amount?.toFixed(2)||"0.00"):d2.detail,id:d2.id}]);if(res2.ok){okCount=1;if(d2.warning&&showToast)showToast(d2.warning,"warn");}
        }else{setResults([{filename:files[0].name,status:"skipped",message:"Duplicate — skipped"}]);}

      else if(d.duplicate_deleted&&d.id){

    else{

          const res=await _uploadOne(f,token,_onWaitMulti);

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
function ExportView(){
  const[year,setYear]=useState("");
  const[exportName,setExportName]=useState("AutoTax");
  const[exportStatus,setExportStatus]=useState({});
  const exports=[{type:"pdf",label:"PDF",desc:getLang()==="de"?"Finanzbericht mit Dashboard-Werten":"Financial report with dashboard values",icon:"📕",ext:"pdf"},{type:"datev",label:"DATEV",desc:getLang()==="de"?"DATEV für Steuerberater":"DATEV for tax advisor",icon:"📊",ext:"csv"},{type:"csv",label:"CSV",desc:getLang()==="de"?"Standard CSV — Excel kompatibel":"Standard CSV — Excel compatible",icon:"📄",ext:"csv"},{type:"excel",label:"Excel",desc:getLang()==="de"?"XLSX mit Dashboard-Zusammenfassung":"XLSX with dashboard summary",icon:"📗",ext:"xlsx"},{type:"json",label:"JSON",desc:"API & Backup",icon:"🔗",ext:"json"}];

  const doExport=async(type,ext)=>{
    // Popup for filename
    const defaultName=(exportName||"AutoTax")+"_"+type+"_"+(year||"alle");
    const userInput=prompt(getLang()==="de"?"📁 Export — Dateiname eingeben:\n\nFormat: "+type.toUpperCase()+"\nJahr: "+(year||"Alle"):"📁 Export — Enter filename:\n\nFormat: "+type.toUpperCase()+"\nYear: "+(year||"All"),defaultName);
    if(!userInput)return; // cancelled
    setExportStatus(p=>({...p,[type]:"loading"}));
    try{
      const token=localStorage.getItem("atx_token");
      const res=await fetch(API+"/export/"+type+(year?"?year="+year:""),{headers:{Authorization:"Bearer "+token}});
      if(!res.ok) throw new Error(_t("export_failed")+" (Status "+res.status+")");
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      const safeName=userInput.replace(/[^a-zA-Z0-9äöüÄÖÜß_\- ]/g,"");
      a.href=url; a.download=safeName+"."+ext; a.click();
      URL.revokeObjectURL(url);
      setExportStatus(p=>({...p,[type]:"ok"}));
      if(showToast)showToast((getLang()==="de"?"📁 "+safeName+"."+ext+" gespeichert":"📁 "+safeName+"."+ext+" saved"),"success");
      setTimeout(()=>setExportStatus(p=>({...p,[type]:null})),3000);
    }catch(e){
      setExportStatus(p=>({...p,[type]:"error"}));
      alert("Export Error: "+e.message);
      setTimeout(()=>setExportStatus(p=>({...p,[type]:null})),3000);
    }
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:24}}>
    <div><h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>Export</h2><p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 0"}}>Download data — CSV works in Excel</p></div>
    <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.15)",fontSize:12,color:"#f59e0b",lineHeight:1.6}}>{getLang()==="de"?"Wichtig: Alle automatisch erkannten Daten können Fehler enthalten. Beträge und MwSt vor Verwendung prüfen. Keine Steuerberatung.":"Important: All auto-detected data may contain errors. Check amounts and VAT before use. No tax advice."}</div>
    <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
      <div><label style={{color:theme.textMuted,fontSize:13,display:"block",marginBottom:4}}>{getLang()==="de"?"Projektname:":"Project name:"}</label><input style={{...css.input,width:200}} value={exportName} onChange={e=>setExportName(e.target.value)} placeholder={getLang()==="de"?"z.B. MeineFirma_2024":"e.g. MyCompany_2024"}/></div>
      <div><label style={{color:theme.textMuted,fontSize:13,display:"block",marginBottom:4}}>{getLang()==="de"?"Jahr:":"Year:"}</label><select style={{...css.input,width:140}} value={year} onChange={e=>setYear(e.target.value)}><option value="">{getLang()==="de"?"Alle Jahre":"All Years"}</option>{[2021,2022,2023,2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}</select></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>
      {exports.map(ex=>{const st=exportStatus[ex.type];return(
        <div key={ex.type} style={{...css.card,cursor:"pointer",display:"flex",flexDirection:"column",gap:12,border:st==="ok"?"1px solid "+theme.accent:st==="error"?"1px solid "+theme.danger:"1px solid "+theme.border}} onClick={()=>doExport(ex.type,ex.ext)}>
          <div style={{fontSize:32}}>{st==="loading"?"⏳":st==="ok"?"✅":st==="error"?"❌":ex.icon}</div>
          <div style={{fontSize:16,fontWeight:600,color:theme.text}}>{ex.label}</div>
          <div style={{fontSize:13,color:theme.textMuted}}>{ex.desc}</div>
          <div style={{fontSize:11,color:theme.accent,fontWeight:600}}>{st==="loading"?_t("downloading"):st==="ok"?_t("download_started"):_t("click_to_download")}</div>
        </div>);})}
    </div>
    <div style={{...css.card,background:theme.surfaceAlt}}>
      <h3 style={{fontSize:14,fontWeight:600,color:theme.text,margin:"0 0 8px"}}>{getLang()==="de"?"💡 Tipp: CSV in Excel öffnen":"💡 Tip: Open CSV in Excel"}</h3>
      <p style={{fontSize:13,color:theme.textMuted,lineHeight:1.6,margin:0}}>
        {getLang()==="de"?"CSV direkt in Excel öffnen. Falls Spalten nicht getrennt: Excel → Daten → Aus Text/CSV → Trennzeichen Komma.":"Open CSV directly in Excel. If columns aren't separated: Excel → Data → From Text/CSV → Delimiter Comma."}
      </p>
    </div>
  </div>);
}

function ChatView(){
  const[messages,setMessages]=useState([]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const send=async()=>{if(!input.trim()||loading)return;const msg=input.trim();setInput("");setMessages(p=>[...p,{role:"user",text:msg}]);setLoading(true);
    try{const data=await api("/chat",{method:"POST",body:JSON.stringify({message:msg})});setMessages(p=>[...p,{role:"ai",text:data.reply||data.message||"..."}]);}catch(e){setMessages(p=>[...p,{role:"ai",text:"Error: "+e.message}]);}setLoading(false);};
  return(<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 120px)"}}>
    <div><h2 style={{fontSize:22,fontWeight:700,color:theme.text,margin:0}}>{t("ai_assistant")}</h2><p style={{color:theme.textMuted,fontSize:14,margin:"4px 0 16px"}}>{getLang()==="de"?"Fragen zu Rechnungen, MwSt, Kategorien":"Questions about invoices, VAT, categories"}</p></div>
    <div style={{...css.card,flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:16,marginBottom:16}}>
      {messages.length===0&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{color:theme.textDim,fontSize:14}}>Stell eine Frage...</div>
        <div style={{padding:"8px 14px",borderRadius:8,background:"rgba(245,158,11,0.05)",border:"1px solid rgba(245,158,11,0.1)",fontSize:11,color:"#f59e0b",maxWidth:400,textAlign:"center"}}>{getLang()==="de"?"KI-Assistent gibt allgemeine Infos. Keine Steuerberatung.":"AI assistant provides general info. No tax advice."}</div>
      </div>}
      {messages.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"75%",padding:"12px 16px",borderRadius:14,fontSize:14,lineHeight:1.5,background:m.role==="user"?theme.accent:theme.surfaceAlt,color:m.role==="user"?"#fff":theme.text}}>{m.text}</div>
      </div>))}
      {loading&&<div style={{display:"flex"}}><div style={{padding:"12px 16px",borderRadius:14,background:theme.surfaceAlt,color:theme.textDim,fontSize:14}}>Thinking...</div></div>}
      <div ref={endRef}/>
    </div>
    <div style={{display:"flex",gap:12}}><input maxLength={2000} style={{...css.input,flex:1}} value={input} onChange={e=>setInput(e.target.value)} placeholder="Message..." onKeyDown={e=>e.key==="Enter"&&send()}/><button style={css.btn()} onClick={send} disabled={loading}>{_t("send")}</button></div>
  </div>);
}

//  ÜBERGABE — Ein-/Auszugsprotokoll (Sprint 1)
//  Used STANDING IN THE FLAT, on a phone, with the tenant watching.
//  Therefore: one step at a time, big tap targets, the camera one tap away,
//  autosave after every step (a lost draft in a cold flat is unforgivable).
//  No business logic here — the backend derives Mängel, consumption and the lock.
// ══════════════════════════════════════════════════════════════════════
async function apiUpload(path, formData){
  const tk=localStorage.getItem("atx_token");
  const r=await fetch(API+path,{method:"POST",headers:{Authorization:"Bearer "+tk},body:formData});
  if(!r.ok){let m="HTTP "+r.status;try{const j=await r.json();if(j&&j.detail)m=j.detail;}catch(e){}throw new Error(m);}
  return r.json();
}

function SignaturePad({value,onChange,label}){
  const ref=React.useRef(null);
  const drawing=React.useRef(false);
  const [hasInk,setHasInk]=React.useState(!!value);
  React.useEffect(()=>{
    const c=ref.current; if(!c) return;
    const dpr=window.devicePixelRatio||1;
    const w=c.clientWidth, h=c.clientHeight;
    c.width=w*dpr; c.height=h*dpr;
    const ctx=c.getContext("2d");
    ctx.scale(dpr,dpr); ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#111827";
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h);
  },[]);
  const pos=(e)=>{const c=ref.current,r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=(e)=>{e.preventDefault();drawing.current=true;const ctx=ref.current.getContext("2d");const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
  const move=(e)=>{if(!drawing.current)return;e.preventDefault();const ctx=ref.current.getContext("2d");const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();setHasInk(true);};
  const end=()=>{if(!drawing.current)return;drawing.current=false;onChange(ref.current.toDataURL("image/png"));};
  const clear=()=>{const c=ref.current,ctx=c.getContext("2d");ctx.fillStyle="#ffffff";ctx.fillRect(0,0,c.width,c.height);setHasInk(false);onChange("");};
  const _L=(de,tr,en)=>getLang()==="tr"?tr:(getLang()==="en"?en:de);
  return(<div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <span style={{fontSize:12,color:theme.textMuted,fontWeight:600}}>{label}</span>
      <span style={{fontSize:12,color:theme.accent,cursor:"pointer"}} onClick={clear}>↺ {_L("Löschen","Temizle","Clear")}</span>
    </div>
    <canvas ref={ref} style={{width:"100%",height:130,background:"#fff",border:"1.5px dashed "+(hasInk?theme.accent:theme.border),borderRadius:10,touchAction:"none",display:"block"}}
      onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
      onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
    <div style={{fontSize:11,color:theme.textDim,marginTop:3}}>{_L("Mit dem Finger unterschreiben.","Parmağınızla imzalayın.","Sign with your finger.")}</div>
  </div>);
}

function UebergabeWizard({prot,onClose,onDone,showToast}){
  const _L=(de,tr,en)=>getLang()==="tr"?tr:(getLang()==="en"?en:de);
  const [p,setP]=React.useState(prot);
  const [step,setStep]=React.useState(1);
  const [busy,setBusy]=React.useState(false);
  const [err,setErr]=React.useState(null);
  const locked=!!p.gesperrt;
  const ZUST=[["neu",_L("neu","yeni","new")],["gut",_L("gut","iyi","good")],["gebraucht",_L("gebraucht","kullanılmış","used")],["beschaedigt",_L("beschädigt","hasarlı","damaged")]];
  const ZCOL={neu:theme.accent,gut:theme.accent,gebraucht:"#f59e0b",beschaedigt:theme.danger};
  const ZAEHLER=[["strom","⚡ Strom","kWh"],["wasser","💧 Wasser","m³"],["warmwasser","🚿 Warmwasser","m³"],["gas","🔥 Gas","m³"],["heizung","🌡️ Heizung","Einheiten"]];
  const _re=async()=>{const d=await api("/immo/protokolle/"+p.id);setP(d);return d;};
  const save=async(patch)=>{setErr(null);setBusy(true);try{const d=await api("/immo/protokolle/"+p.id,{method:"PATCH",body:JSON.stringify(patch)});setP(d);return d;}catch(e){setErr(e.message);throw e;}finally{setBusy(false);}};

  // ── step 2: rooms ──
  const setZustand=(ri,ei,z)=>{const r=JSON.parse(JSON.stringify(p.raeume));r[ri].elemente[ei].zustand=z;setP({...p,raeume:r});};
  const setNotiz=(ri,ei,v)=>{const r=JSON.parse(JSON.stringify(p.raeume));r[ri].elemente[ei].notiz=v;setP({...p,raeume:r});};
  const addRaum=()=>{const name=prompt(_L("Name des Raums","Oda adı","Room name"));if(!name)return;
    const std=["Wände","Boden","Decke","Türen","Fenster","Heizkörper"];
    setP({...p,raeume:[...p.raeume,{name:name,elemente:std.map(w=>({was:w,zustand:"gut",notiz:""})),notiz:""}]});};
  const delRaum=(ri)=>{if(!confirm(_L("Raum entfernen?","Oda silinsin mi?","Remove room?")))return;const r=p.raeume.filter((_,i)=>i!==ri);setP({...p,raeume:r});};
  const [openRaum,setOpenRaum]=React.useState(0);

  const foto=async(f,raum)=>{if(!f)return;setBusy(true);setErr(null);
    try{const fd=new FormData();fd.append("file",f);fd.append("raum",raum||"");
      const r=await apiUpload("/immo/protokolle/"+p.id+"/foto",fd);await _re();
      if(showToast)showToast(_L("Foto gespeichert","Fotoğraf kaydedildi","Photo saved")+" ("+Math.round(r.bytes_gespeichert/1024)+" KB)","success");
    }catch(e){setErr(e.message);}finally{setBusy(false);}};
  const delFoto=async(id)=>{setBusy(true);try{await api("/immo/protokolle/"+p.id+"/foto/"+id,{method:"DELETE"});await _re();}catch(e){setErr(e.message);}finally{setBusy(false);}};

  // ── step 3: meters ──
  const [zf,setZf]=React.useState({});
  const addZaehler=async(art)=>{const v=zf[art]||{};
    if(!(parseFloat(v.stand)>=0)){alert(_L("Bitte Zählerstand eingeben.","Sayaç değeri gir.","Enter the meter reading."));return;}
    setBusy(true);setErr(null);
    try{await api("/immo/zaehler",{method:"POST",body:JSON.stringify({unit_id:p.unit_id,art:art,stand:parseFloat(v.stand),zaehler_nr:v.nr||"",datum:p.datum,protokoll_id:p.id})});
      setZf({...zf,[art]:{}});await _re();
    }catch(e){setErr(e.message);}finally{setBusy(false);}};
  const delZaehler=async(id)=>{setBusy(true);try{await api("/immo/zaehler/"+id,{method:"DELETE"});await _re();}catch(e){setErr(e.message);}finally{setBusy(false);}};

  // ── step 4: keys ──
  const setKey=(i,n)=>{const s=JSON.parse(JSON.stringify(p.schluessel));s[i].anzahl=Math.max(0,n);setP({...p,schluessel:s});};
  const addKey=()=>{const typ=prompt(_L("Schlüsselart","Anahtar türü","Key type"));if(!typ)return;setP({...p,schluessel:[...p.schluessel,{typ:typ,anzahl:1}]});};

  // ── step 5: signatures ──
  const sign=async(rolle,png)=>{if(!png)return;setBusy(true);setErr(null);
    try{await api("/immo/protokolle/"+p.id+"/unterschrift",{method:"POST",body:JSON.stringify({rolle:rolle,png:png})});await _re();}
    catch(e){setErr(e.message);}finally{setBusy(false);}};
  const abschliessen=async()=>{
    if(!confirm(_L("Protokoll abschließen?\n\nDanach kann es NICHT mehr geändert werden.","Protokol kapatılsın mı?\n\nSonrasında DEĞİŞTİRİLEMEZ.","Complete the protocol?\n\nIt can NOT be changed afterwards.")))return;
    setBusy(true);setErr(null);
    try{const d=await api("/immo/protokolle/"+p.id+"/abschliessen",{method:"POST"});setP(d);
      if(showToast)showToast(_L("Protokoll abgeschlossen ✓","Protokol tamamlandı ✓","Protocol completed ✓"),"success");
      if(onDone)onDone();
    }catch(e){setErr(e.message);}finally{setBusy(false);}};
  const dlPdf=async()=>{try{const tk=localStorage.getItem("atx_token");
      const r=await fetch(API+"/immo/protokolle/"+p.id+"/pdf",{headers:{Authorization:"Bearer "+tk}});
      if(!r.ok){alert("PDF "+r.status);return;}
      const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement("a");
      a.href=u;a.download="Uebergabeprotokoll_"+p.art+"_"+p.id+".pdf";a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);
    }catch(e){alert(e.message);}};

  const STEPS=[_L("Start","Başlangıç","Start"),_L("Räume","Odalar","Rooms"),_L("Zähler","Sayaçlar","Meters"),_L("Schlüssel","Anahtarlar","Keys"),_L("Unterschrift","İmza","Signature")];
  const next=async()=>{
    try{
      if(step===1)await save({datum:p.datum,personen:p.personen});
      if(step===2)await save({raeume:p.raeume});
      if(step===4)await save({schluessel:p.schluessel});
      setStep(Math.min(5,step+1));
    }catch(e){/* error already shown */}
  };
  const _btn=(c,extra)=>({padding:"12px 18px",background:c,color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",...(extra||{})});
  const _in={width:"100%",boxSizing:"border-box",padding:"11px 13px",background:theme.surfaceAlt,border:"1.5px solid "+theme.border,borderRadius:10,color:theme.text,fontSize:15,fontFamily:"inherit"};

  return(<div style={{position:"fixed",inset:0,background:theme.bg,zIndex:9000,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>

      </div>}

      {err&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid "+theme.danger,color:theme.danger,borderRadius:9,padding:"9px 12px",fontSize:13,marginBottom:10}}>⚠️ {err}</div>}

        <input disabled={locked} style={{..._in,marginTop:4}} value={(p.personen&&p.personen.mieter)||""} onChange={e=>setP({...p,personen:{...(p.personen||{}),mieter:e.target.value}})}/>

      {/* ── 2 RÄUME ── */}
      {(step===2||locked)&&<div style={{marginBottom:12}}>

            </div>
          </div>
          {openRaum===ri&&<div style={{padding:"10px 15px 14px"}}>

        {!locked&&<button onClick={addRaum} style={{..._btn("transparent"),border:"1.5px dashed "+theme.border,color:theme.textMuted,width:"100%"}}>➕ {_L("Raum hinzufügen","Oda ekle","Add room")}</button>}
      </div>}

      {/* ── 3 ZÄHLER ── */}
      {(step===3||locked)&&<div style={{marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:8,color:theme.text}}>{_L("Zählerstände","Sayaç değerleri","Meter readings")}</div>
        {ZAEHLER.map(([art,lbl,einheit])=>{const saved=(p.zaehler||[]).filter(z=>z.art===art);const v=zf[art]||{};
          return(<div key={art} style={{...css.card,marginBottom:8}}>
            <div style={{fontWeight:700,color:theme.text,marginBottom:6}}>{lbl} <span style={{fontSize:12,color:theme.textDim,fontWeight:500}}>({einheit})</span></div>
            {saved.map(z=>(<div key={z.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14,padding:"6px 0"}}>
              <span style={{color:theme.text}}><b>{z.stand}</b> {z.einheit} {z.zaehler_nr?<span style={{color:theme.textDim,fontSize:12}}>· Nr. {z.zaehler_nr}</span>:null}</span>
              {!locked&&<span onClick={()=>delZaehler(z.id)} style={{color:theme.danger,cursor:"pointer"}}>×</span>}
            </div>))}
            {!locked&&saved.length===0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <input style={{..._in,flex:"1 1 130px",fontSize:14}} placeholder={_L("Zählerstand","Değer","Reading")} type="number" inputMode="decimal"

              <input style={{..._in,flex:"1 1 110px",fontSize:14}} placeholder={_L("Zähler-Nr.","Sayaç No","Meter no.")}
                value={v.nr||""} onChange={e=>setZf({...zf,[art]:{...v,nr:e.target.value}})}/>
              <button onClick={()=>addZaehler(art)} style={_btn(theme.accent,{flex:"0 0 auto"})}>✓</button>
              <label style={{display:"flex",alignItems:"center",padding:"0 12px",background:theme.surfaceAlt,border:"1.5px solid "+theme.border,borderRadius:10,fontSize:18,cursor:"pointer"}}>
                📷<input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{foto(e.target.files[0],"Zähler: "+lbl);e.target.value="";}}/>
              </label>
            </div>}
          </div>);})}
      </div>}

      {/* ── 4 SCHLÜSSEL ── */}
      {(step===4||locked)&&<div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:10}}>{_L("Übergebene Schlüssel","Teslim edilen anahtarlar","Keys handed over")}</div>
        {(p.schluessel||[]).map((k,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+theme.border}}>
          <span style={{fontSize:15,color:theme.text}}>{k.typ}</span>
          {locked?<b style={{fontSize:16}}>{k.anzahl}</b>:
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setKey(i,(k.anzahl||0)-1)} style={{width:40,height:40,borderRadius:10,border:"1.5px solid "+theme.border,background:"transparent",color:theme.text,fontSize:20,cursor:"pointer"}}>−</button>
            <b style={{fontSize:17,minWidth:24,textAlign:"center",color:theme.text}}>{k.anzahl||0}</b>
            <button onClick={()=>setKey(i,(k.anzahl||0)+1)} style={{width:40,height:40,borderRadius:10,border:"1.5px solid "+theme.border,background:"transparent",color:theme.text,fontSize:20,cursor:"pointer"}}>+</button>
          </div>}
        </div>))}
        {!locked&&<button onClick={addKey} style={{...css.btnOutline,marginTop:10,width:"100%"}}>➕ {_L("Schlüsselart hinzufügen","Anahtar türü ekle","Add key type")}</button>}
      </div>}

      {/* ── 5 UNTERSCHRIFT ── */}
      {(step===5||locked)&&<div style={{...css.card,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{_L("Unterschriften","İmzalar","Signatures")}</div>
        <div style={{fontSize:12,color:theme.textMuted,marginBottom:12}}>
          {_L("Beide Parteien bestätigen den oben festgehaltenen Zustand.","Her iki taraf yukarıdaki durumu onaylar.","Both parties confirm the condition recorded above.")}
        </div>
        {locked?
          <div style={{fontSize:14,color:theme.text}}>
            ✍️ {_L("Unterschrieben am","İmza tarihi","Signed on")} <b>{p.abgeschlossen_am?String(p.abgeschlossen_am).slice(0,10):p.datum}</b>
          </div>
          :<div>
            <SignaturePad label={_L("Vermieter","Ev sahibi","Landlord")+(p.unterschrift_vermieter_da?" ✓":"")} onChange={(png)=>sign("vermieter",png)}/>
            <SignaturePad label={_L("Mieter","Kiracı","Tenant")+(p.unterschrift_mieter_da?" ✓":"")} onChange={(png)=>sign("mieter",png)}/>
            <button disabled={busy||!p.unterschrift_vermieter_da||!p.unterschrift_mieter_da} onClick={abschliessen}
              style={{..._btn(theme.accent),width:"100%",marginTop:6,opacity:(busy||!p.unterschrift_vermieter_da||!p.unterschrift_mieter_da)?0.5:1}}>
              🔒 {_L("Protokoll abschließen","Protokolü tamamla","Complete the protocol")}
            </button>
            <div style={{fontSize:11,color:theme.textDim,marginTop:6,textAlign:"center"}}>
              {_L("Danach nicht mehr änderbar.","Sonrasında değiştirilemez.","Not editable afterwards.")}
            </div>
          </div>}
        <button onClick={dlPdf} style={{...css.btnOutline,width:"100%",marginTop:10}}>📄 {_L("PDF herunterladen","PDF indir","Download PDF")}</button>
      </div>}

      {/* ── footer nav ── */}
      {!locked&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:theme.card,borderTop:"1px solid "+theme.border,padding:"10px 14px",display:"flex",gap:10,justifyContent:"center"}}>
        <div style={{maxWidth:640,width:"100%",display:"flex",gap:10}}>
          {step>1&&<button onClick={()=>setStep(step-1)} style={{...css.btnOutline,flex:"0 0 auto",padding:"12px 18px"}}>←</button>}
          {step<5?<button disabled={busy} onClick={next} style={{..._btn(theme.accent),flex:1,opacity:busy?0.6:1}}>{busy?"…":_L("Weiter","Devam","Next")+" →"}</button>
                 :<button onClick={onClose} style={{...css.btnOutline,flex:1,padding:"12px 18px"}}>{_L("Schließen","Kapat","Close")}</button>}
        </div>
      </div>}
      {locked&&<div style={{textAlign:"center",marginTop:10}}>
        <button onClick={onClose} style={{...css.btnOutline,padding:"12px 24px"}}>{_L("Schließen","Kapat","Close")}</button>
      </div>}
    </div>
  </div>);
}

// ── MIETER (tenant-centric main view) — landlord günlük ana ekranı ──
function MieterView({onNav,showToast}){
  const _gl=getLang();
  const _L=(de,tr,en)=>_gl==="tr"?tr:(_gl==="en"?en:de);
  const _e=n=>"€"+(Number(n)||0).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});

  const load=()=>{setLoading(true);api("/immo/mieter").then(d=>{setRows(d.mieter||[]);setLoading(false);}).catch(()=>setLoading(false));};
  React.useEffect(()=>{load();},[]);
  // ── Tek-sayfa Erfassung: daire + adres + kiracı bir kerede ──
  const _erf0=()=>({daire:"",adresse:"",qm:"",name:"",von:new Date().toISOString().slice(0,10),kalt:"",nk:""});
  const [showErf,setShowErf]=React.useState(false);
